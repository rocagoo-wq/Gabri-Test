                    hostId: currentUser.uid, 
                    timeLeft: GAME_DURATION_SEC, 
                    
                    ball_x: 2200, ball_y: 1500, ball_vx: 0, ball_vy: 0, ball_owner: null, ball_ts: 0, lastScoreTs: 0,
                    boss_active: false, boss_hp: 500, boss_x: 1500, boss_y: 3000, boss_tx: 1500, boss_ty: 3000,
                    sword1_owner: null, sword2_owner: null, sword3_owner: null, sword4_owner: null,
                    mg_dropped: false, mg_owner: null, mg_x: 0, mg_y: 0, last_laser: null, dead_npcs: {} 
                });

                for(let id of activeIds) {
                    updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', id), { timeAsGabri: 0, lastSeen: Date.now() }).catch(()=>{});
                }
            } catch (error) { 
                alert("Start Fehler: " + error.message); 
            }
        });

        document.getElementById('btnRestart').addEventListener('click', () => {
            document.getElementById('screen-leaderboard').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('game-hud').style.display = 'none';
            isGameRunning = false;
            
            if (currentRoom) {
                updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoom), { isPlaying: false }).catch(()=>{});
                currentRoom = null;
            }
        });

        // Background Heartbeat
        setInterval(() => {
            if (currentUser && currentRoom && isGameRunning && Date.now() - lastHeartbeatTs > 2000) {
                lastHeartbeatTs = Date.now();
                updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', currentUser.uid), { lastSeen: lastHeartbeatTs }).catch(()=>{});
            }
        }, 2000);

        function checkGameOverState() {
            if (gameState.isPlaying && gameState.timeLeft !== undefined) {
                localTimeLeft = gameState.timeLeft;
            }

            if (gameState.isPlaying && localTimeLeft <= 0) { 
                // GAME OVER
                document.getElementById('game-hud').style.display = 'none';
                document.getElementById('screen-leaderboard').style.display = 'flex';
                document.body.classList.remove('game-running');
                isGameRunning = false;
                
                let results = [];
                for (let id in serverPlayers) {
                    let total = serverPlayers[id].timeAsGabri || 0; 
                    if (localCurrentGabri === id) total += (Date.now() - localGabriSince);
                    results.push({ name: serverPlayers[id].name, time: total });
                }
                results.sort((a, b) => b.time - a.time);
                
                const list = document.getElementById('leaderboardList'); 
                list.innerHTML = '';
                
                results.forEach((r, index) => {
                    let rowClass = "rank-row"; let medal = "";
                    if (index === 0) { 
                        rowClass += " rank-loser"; medal = "💀 VERLIERER"; 
                    } else if (index === results.length - 1 && results.length > 1) { 
                        rowClass += " rank-winner"; medal = "👑 GEWINNER"; 
                    }
                    list.innerHTML += `<div class="${rowClass}"><span>${index + 1}. ${r.name} <span class="text-xs ml-2 opacity-80">${medal}</span></span><span>${(r.time/1000).toFixed(1)}s</span></div>`;
                });
            }
        }

        // ============================================================================
        // 10. GAME LOOP 
        // ============================================================================
        function gameLoop(timestamp) {
            if (!isGameRunning) return;
            
            const dt = Math.min((timestamp - lastUpdateTime) / 1000, 0.1); 
            lastUpdateTime = timestamp; 
            const now = Date.now();

            if (currentUser) {
                // CLEANUP OFFLINE PLAYERS
                const localNow = performance.now(); 
                let dirtyLobby = false;
                for (let id in serverPlayers) { 
                    if (id !== currentUser.uid && localNow - serverPlayers[id].localLastUpdate > 15000) { 
                        delete serverPlayers[id]; 
                        delete gameEntities[id]; 
                        dirtyLobby = true; 
                    } 
                }
                if (dirtyLobby) UIManager.updateLobby();

                // HOST TASKS (Timer Sync & Boss Logic)
                if (gameState.isPlaying && localTimeLeft > 0) {
                    if (gameState.hostId === currentUser.uid && now - lastHostTick > 1000) {
                        lastHostTick = now; 
                        let updates = { timeLeft: Math.max(0, gameState.timeLeft - 1) };
                        
                        if (updates.timeLeft <= 60 && !gameState.boss_active && gameState.boss_hp > 0 && !gameState.mg_dropped) { 
                            updates.boss_active = true; 
                            sfx.sfxAlert(); 
                        }
                        
                        if (gameState.boss_active && gameState.boss_hp <= 0 && !gameState.mg_dropped) {
                            updates.boss_active = false; 
                            updates.mg_dropped = true; 
                            updates.mg_x = gameState.boss_x + 60; 
                            updates.mg_y = gameState.boss_y + 60; 
                            sfx.playTone(200, 'square', 1.0);
                        }
                        
                        if (gameState.boss_active && gameState.boss_hp > 0) {
                            let nearestId = null; let minDist = 9999;
                            for (let id in serverPlayers) {
                                if (serverPlayers[id].y > 2000 && !serverPlayers[id].isStealth) {
                                    let d = Math.hypot(serverPlayers[id].x - gameState.boss_x, serverPlayers[id].y - gameState.boss_y); 
                                    if (d < minDist) { minDist = d; nearestId = id; }
                                }
                            }
                            if (nearestId) {
                                const target = serverPlayers[nearestId]; 
                                const angle = Math.atan2(target.y - gameState.boss_y, target.x - gameState.boss_x);
                                updates.boss_tx = gameState.boss_x + Math.cos(angle) * 180; 
                                updates.boss_ty = gameState.boss_y + Math.sin(angle) * 180; 
                                updates.boss_x = updates.boss_tx; 
                            }
                        }
                        
                        if (Object.keys(updates).length > 0) {
                            updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoom), updates).catch(()=>{});
                        }
                    }
                }

                // GAMEPLAY TASKS (Warmup & Playing)
                const move = Input.getVector();
                if (dashSpeedMult > 1.0) { dashSpeedMult -= dt * 6; if (dashSpeedMult < 1.0) dashSpeedMult = 1.0; }
                if (now > energyDrinkEndTime) activeSpeedMult = 1.0;

                let mx = (move.dx * BASE_SPEED * activeSpeedMult * dashSpeedMult + kb_vx) * dt;
                let my = (move.dy * BASE_SPEED * activeSpeedMult * dashSpeedMult + kb_vy) * dt;
                kb_vx *= 0.85; kb_vy *= 0.85; 

                // Stealth Mode
                if (Math.abs(move.dx) < 0.1 && Math.abs(move.dy) < 0.1 && Math.abs(kb_vx) < 10 && Math.abs(kb_vy) < 10) {
                    timeStandingStill += dt;
                } else {
                    timeStandingStill = 0; 
                    const len = Math.hypot(move.dx, move.dy); 
                    if (len > 0) myFacing = { x: move.dx/len, y: move.dy/len };
                }
                
                let newStealth = timeStandingStill > 2.0;
                if (newStealth !== isStealthMode) { 
                    isStealthMode = newStealth; 
                    updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', currentUser.uid), { isStealth: isStealthMode }).catch(()=>{}); 
                }

                // ANTI STUCK COLLISION SYSTEM
                let steps = 5; 
                let stepX = mx / steps; 
                let stepY = my / steps;
                
                for(let i=0; i<steps; i++) {
                    if (!Physics.checkWall(myLocalPlayer.x + stepX, myLocalPlayer.y)) {
                        myLocalPlayer.x += stepX; 
                    } else { kb_vx = 0; }
                    
                    if (!Physics.checkWall(myLocalPlayer.x, myLocalPlayer.y + stepY)) {
                        myLocalPlayer.y += stepY; 
                    } else { kb_vy = 0; }
                }
                
                // Check Stairs
                if (now - lastStairTime >= 1000) {
                    for (let s of stairs) {
                        if (myLocalPlayer.x < s.x + s.w && myLocalPlayer.x + PLAYER_SIZE > s.x && myLocalPlayer.y < s.y + s.h && myLocalPlayer.y + PLAYER_SIZE > s.y) {
                            myLocalPlayer.y = s.targetY; 
                            lastStairTime = now; 
                            Physics.spawnParticles(myLocalPlayer.x, myLocalPlayer.y, '#00ffcc'); 
                            sfx.sfxDash(); 
                            break;
                        }
                    }
                }

                // Boss Knockback (Physics FIX)
                if (gameState.boss_active && gameState.boss_hp > 0 && myLocalPlayer.y > 2000) {
                    if (Math.hypot(myLocalPlayer.x - gameState.boss_x, myLocalPlayer.y - gameState.boss_y) < 100 && !isStealthMode) {
                        const angleFromBoss = Math.atan2(myLocalPlayer.y - gameState.boss_y, myLocalPlayer.x - gameState.boss_x);
                        kb_vx = Math.cos(angleFromBoss) * 3000; 
                        kb_vy = Math.sin(angleFromBoss) * 3000; 
                        Physics.spawnParticles(myLocalPlayer.x + 20, myLocalPlayer.y + 20, '#ff0000'); 
                        sfx.playNoise(0.3, 1.0);
                    }
                }

                // LOCAL BALL PHYSICS
                if (!gameState.ball_owner && localBall.active) {
                    let bnx = localBall.x + localBall.vx * dt; 
                    let bny = localBall.y + localBall.vy * dt;
                    let hitX = Physics.checkWall(bnx, localBall.y); 
                    let hitY = Physics.checkWall(localBall.x, bny);
                    
                    if (hitX) { localBall.vx *= -0.7; sfx.sfxBounce(); } else localBall.x = bnx;
                    if (hitY) { localBall.vy *= -0.7; sfx.sfxBounce(); } else localBall.y = bny;
                    
                    localBall.vx *= 0.98; localBall.vy *= 0.98; 
                    localBall.vz -= 800 * dt; 
                    localBall.z += localBall.vz * dt;
                    
                    if (localBall.z < 0) {
                        localBall.z = 0; 
                        if (localBall.vz < -50) { 
                            localBall.vz *= -0.6; 
                            sfx.sfxBounce(); 
                        } else { 
                            localBall.vz = 0; localBall.vx *= 0.9; localBall.vy *= 0.9; 
                        }
                    }

                    if (localBall.z > 80 && Math.hypot(localBall.x - (hoop.x + hoop.w/2), localBall.y - (hoop.y + 10)) < 40) {
                        if (now - lastConfettiTs > 1000) {
                            Physics.spawnConfetti(hoop.x + hoop.w/2, hoop.y + 10); 
                            lastConfettiTs = now; 
                            lastScoreTs = now; 
                            updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoom), { lastScoreTs: now }).catch(()=>{}); 
                        }
                    }
                }

                // CAMERA LERP
                const targetCamX = myLocalPlayer.x + PLAYER_SIZE/2 - canvas.width/2; 
                const targetCamY = myLocalPlayer.y + PLAYER_SIZE/2 - canvas.height/2;
                camera.x += (targetCamX - camera.x) * 10 * dt;
                if (Math.abs(targetCamY - camera.y) > 1000) camera.y = targetCamY; 
                else camera.y += (targetCamY - camera.y) * 10 * dt;
                
                camera.x = Math.max(0, Math.min(camera.x, MAP_WIDTH - canvas.width)); 
                camera.y = Math.max(0, Math.min(camera.y, MAP_HEIGHT - canvas.height));

                // ENTITY INTERPOLATION
                for(let id in serverPlayers) {
                    if (id !== currentUser.uid && gameEntities[id]) {
                        if (Math.abs(serverPlayers[id].y - gameEntities[id].y) > 1000) {
                            gameEntities[id].y = serverPlayers[id].y;
                        } else {
                            gameEntities[id].y += (serverPlayers[id].y - gameEntities[id].y) * 15 * dt;
                        }
                        gameEntities[id].x += (serverPlayers[id].x - gameEntities[id].x) * 15 * dt;
                    }
                }

                // SYNC POS
                if (now - lastSyncTime > 100) { 
                    lastSyncTime = now;
                    updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', currentUser.uid), { 
                        x: Math.round(myLocalPlayer.x), y: Math.round(myLocalPlayer.y)
                    }).catch(()=>{});
                }

                // TAG CHECK
                if (gameState.isPlaying && localCurrentGabri === currentUser.uid && now >= localGabriSince + TAG_COOLDOWN_MS) {
                    for (let id in serverPlayers) {
                        if (id === currentUser.uid) continue;
                        const p = gameEntities[id] || serverPlayers[id]; 
                        if (serverPlayers[id].isStealth) continue; 
                        
                        if (Math.hypot((p.x+PLAYER_SIZE/2) - (myLocalPlayer.x+PLAYER_SIZE/2), (p.y+PLAYER_SIZE/2) - (myLocalPlayer.y+PLAYER_SIZE/2)) < PLAYER_SIZE * 0.9) { 
                            Physics.spawnParticles(p.x, p.y, '#ff3366'); 
                            try {
                                Promise.all([
                                    updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', currentUser.uid), { timeAsGabri: increment(now - localGabriSince) }),
                                    updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoom), { currentGabri: id, tagCounter: increment(1) })
                                ]);
                            } catch(e) {}
                            break;
                        }
                    }
                }

                // UPDATE HUD
                if (gameState.isPlaying) {
                    const min = Math.floor(localTimeLeft / 60); 
                    const sec = localTimeLeft % 60;
                    document.getElementById('timerDisplay').innerText = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
                }
                
                let myTotal = serverPlayers[currentUser.uid]?.timeAsGabri || 0; 
                if (gameState.isPlaying && localCurrentGabri === currentUser.uid) myTotal += (now - localGabriSince);
                document.getElementById('myTimeDisplay').innerText = `Zeit als Gabri: ${(myTotal/1000).toFixed(1)}s`;
                
                document.getElementById('floorDisplay').innerText = myLocalPlayer.y > 2000 ? "OBERGESCHOSS (OG)" : "ERDGESCHOSS (EG)";
            
                drawFrame(dt, now);
            }
            
            if(isGameRunning) requestAnimationFrame(gameLoop);
        }

        // ============================================================================
        // 11. RENDERER
        // ============================================================================
        function drawFrame(dt, nowTime) {
            // Update NPC Physics
            npcs.forEach(npc => {
                if (gameState.dead_npcs && gameState.dead_npcs[npc.id]) return;
                
                let s = npc.speed; 
                if (gameState.isPlaying && localTimeLeft > 0 && localTimeLeft <= 30 && npc.type === 'student') s *= 3; // Zombies are fast
                
                let nx = npc.currentX + npc.dirX * s * dt * 1000;
                let ny = npc.currentY + npc.dirY * s * dt * 1000;
                
                if (!Physics.checkWall(nx, npc.currentY)) { 
                    npc.currentX = nx; 
                } else { 
                    npc.dirX *= -1; 
                    npc.dirY = (Math.random()>0.5?1:-1); 
                }
                
                if (!Physics.checkWall(npc.currentX, ny)) { 
                    npc.currentY = ny; 
                } else { 
                    npc.dirY *= -1; 
                    npc.dirX = (Math.random()>0.5?1:-1); 
                }
            });

            const isInOG = camera.y > 1500;
            ctx.fillStyle = isInOG ? '#0b111a' : '#0d0d12'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save(); 
            ctx.translate(-camera.x, -camera.y);

            // Floor Grid
            ctx.strokeStyle = 'rgba(255,255,255,0.03)'; 
            ctx.lineWidth = 2; 
            const gridSize = 100;
            const startX = Math.floor(camera.x / gridSize) * gridSize; 
            const startY = Math.floor(camera.y / gridSize) * gridSize;
            
            ctx.beginPath();
            for(let x = startX; x < camera.x + canvas.width; x += gridSize) {
                if(x >= 0 && x <= MAP_WIDTH) { ctx.moveTo(x, 0); ctx.lineTo(x, MAP_HEIGHT); }
            }
            for(let y = startY; y < camera.y + canvas.height; y += gridSize) {
                if(y >= 0 && y <= MAP_HEIGHT) { ctx.moveTo(0, y); ctx.lineTo(MAP_WIDTH, y); }
            }
            ctx.stroke();

            // Stairs
            for(let s of stairs) {
                if ((isInOG && s.y < 2000) || (!isInOG && s.y > 2000)) continue;
                ctx.fillStyle = '#222'; 
                ctx.fillRect(s.x, s.y, s.w, s.h); 
                ctx.strokeStyle = '#ffcc00'; 
                ctx.lineWidth = 4; 
                ctx.strokeRect(s.x, s.y, s.w, s.h);
                
                ctx.beginPath(); 
                for(let i=0; i<10; i++) { 
                    ctx.moveTo(s.x, s.y + (i * s.h/10)); 
                    ctx.lineTo(s.x + s.w, s.y + (i * s.h/10)); 
                } 
                ctx.stroke();
                
                ctx.fillStyle = 'rgba(0,0,0,0.7)'; 
                ctx.fillRect(s.x, s.y + s.h/2 - 15, s.w, 30);
                ctx.fillStyle = '#ffcc00'; 
                ctx.font = '14px "Press Start 2P"'; 
                ctx.textAlign = 'center'; 
                ctx.textBaseline = 'middle'; 
                ctx.fillText(s.label, s.x + s.w/2, s.y + s.h/2);
            }

            // Static Objects
            for(let obs of obstacles) {
                if (obs.x + (obs.w||0) < camera.x - 200 || obs.x > camera.x + canvas.width + 200 || obs.y + (obs.h||0) < camera.y - 200 || obs.y > camera.y + canvas.height + 200) continue;
                if (obs.isWall) {
                    ctx.fillStyle = '#1a1a24'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h); 
                    ctx.strokeStyle = 'rgba(0, 255, 204, 0.4)'; ctx.lineWidth = 2; ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
                } else if (obs.isTable) {
                    ctx.fillStyle = '#5D4037'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h); 
                    ctx.strokeStyle = '#3E2723'; ctx.lineWidth = 3; ctx.strokeRect(obs.x+1, obs.y+1, obs.w-2, obs.h-2);
                } else if (obs.isChair) {
                    ctx.fillStyle = '#4E342E'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h); 
                    ctx.fillStyle = '#3E2723';
                    if (obs.dir === 'up') ctx.fillRect(obs.x, obs.y, obs.w, 5); else ctx.fillRect(obs.x, obs.y + obs.h - 5, obs.w, 5);
                }
            }

            // Interactive Map Objects (Drinks & Pallets)
            for(let d of spawnDrinks) {
                if (gameState.energy_drinks && gameState.energy_drinks[d.id]) continue;
                if ((isInOG && d.y < 2000) || (!isInOG && d.y > 2000)) continue;
                ctx.fillStyle = '#0055ff'; ctx.fillRect(d.x, d.y, 8, 12); 
                ctx.fillStyle = '#silver'; ctx.fillRect(d.x, d.y - 2, 8, 2);
            }
            
            for(let p of mapPallets) {
                const pState = gameState['pallet_'+p.id] || 0;
                if (pState === 0) { 
                    ctx.fillStyle = '#5c3a21'; ctx.fillRect(p.upRect.x, p.upRect.y, p.upRect.w, p.upRect.h); 
                } else if (pState === 1) { 
                    ctx.fillStyle = '#8b5a2b'; ctx.fillRect(p.dropRect.x, p.dropRect.y, p.dropRect.w, p.dropRect.h); 
                    ctx.fillStyle = '#5c3a21';
                    if (p.dropRect.w > p.dropRect.h) { 
                        for(let i=0; i<5; i++) ctx.fillRect(p.dropRect.x + i*40 + 10, p.dropRect.y, 10, p.dropRect.h); 
                    } else { 
                        for(let i=0; i<5; i++) ctx.fillRect(p.dropRect.x, p.dropRect.y + i*40 + 10, p.dropRect.w, 10); 
                    }
                } else if (pState === 2) { 
                    ctx.fillStyle = '#8b5a2b'; 
                    ctx.fillRect(p.dropRect.x + 10, p.dropRect.y + 10, 20, 10); 
                    ctx.fillRect(p.dropRect.x + p.dropRect.w - 30, p.dropRect.y + p.dropRect.h - 20, 20, 10);
                }
            }

            // Hoop & Labels
            if (!isInOG) { 
                ctx.fillStyle = '#ffffff'; ctx.fillRect(hoop.x, hoop.y - 10, hoop.w, 10); 
                ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(hoop.x + hoop.w/2, hoop.y + 10, 30, 0, Math.PI*2); ctx.stroke(); 
            }

            for(let l of labels) {
                if (l.x < camera.x - 200 || l.x > camera.x + canvas.width + 200 || l.y < camera.y - 200 || l.y > camera.y + canvas.height + 200) continue;
                ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.font = 'bold 36px "Outfit"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(l.text, l.x, l.y);
            }

            // NPCs
            for(let npc of npcs) {
                if (gameState.dead_npcs && gameState.dead_npcs[npc.id]) continue; 
                if ((isInOG && npc.currentY < 2000) || (!isInOG && npc.currentY > 2000)) continue;

                ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 10; ctx.imageSmoothingEnabled = false;
                
                let isMoving = Math.abs(npc.dirX) > 0 || Math.abs(npc.dirY) > 0;
                let isDancing = npc.type === 'cheerleader' && (nowTime - lastScoreTs < 3000); 
                
                let frame = (isMoving || isDancing) ? Math.floor(nowTime / (isDancing ? 100 : 150)) % 2 : 0;
                let sprite = texStudent[frame];
                
                if (gameState.isPlaying && localTimeLeft > 0 && localTimeLeft <= 30 && npc.type === 'student') sprite = texZombie[frame];
                else if (npc.type === 'teacher') sprite = texTeacher[frame];
                else if (npc.type === 'cheerleader') sprite = texCheer[frame];

                let renderY = npc.currentY;
                if (isDancing) {
                    renderY -= Math.abs(Math.sin(nowTime / 100)) * 10; 
                    if (Math.random() < 0.05) Physics.spawnParticles(npc.currentX + 20, npc.currentY + 40, '#ff66b2', 2); 
                }
                ctx.drawImage(sprite, npc.currentX, renderY, PLAYER_SIZE, PLAYER_SIZE); ctx.shadowBlur = 0;
            }

            // Items (Swords & MG)
            if (isInOG) {
                for(let i=1; i<=4; i++) {
                    let sKey = 'sword'+i;
                    if (!gameState[sKey+'_owner']) {
                        let sx = gameState[sKey+'_x'] !== undefined ? gameState[sKey+'_x'] : swordBases[sKey].x; 
                        let sy = gameState[sKey+'_y'] !== undefined ? gameState[sKey+'_y'] : swordBases[sKey].y;
                        ctx.fillStyle = '#aaaaaa'; ctx.fillRect(sx, sy, 6, 30); 
                        ctx.fillStyle = '#ffcc00'; ctx.fillRect(sx-6, sy+20, 18, 6); 
                    }
                }
            }

            if (isInOG && gameState.mg_dropped && !gameState.mg_owner) { 
                ctx.fillStyle = '#444'; ctx.fillRect(gameState.mg_x - 15, gameState.mg_y, 30, 8); 
                ctx.fillStyle = '#222'; ctx.fillRect(gameState.mg_x - 5, gameState.mg_y + 8, 10, 10); 
            }

            // Boss Ishin
            if (isInOG && gameState.boss_active && gameState.boss_hp > 0) {
                let bx = gameState.boss_x; let by = gameState.boss_y;
                if (gameEntities['boss']) {
                    gameEntities['boss'].x += (gameState.boss_tx - gameEntities['boss'].x) * 5 * dt;
                    gameEntities['boss'].y += (gameState.boss_ty - gameEntities['boss'].y) * 5 * dt;
                    bx = gameEntities['boss'].x; by = gameEntities['boss'].y;
                } else { gameEntities['boss'] = {x: bx, y: by}; }

                ctx.imageSmoothingEnabled = false; 
                let bFrame = Math.floor(nowTime / 250) % 2; 
                ctx.drawImage(texBoss[bFrame], bx, by, 120, 120); 
                
                if (gameState.isPlaying && localTimeLeft > 55) { 
                    ctx.fillStyle = 'rgba(255,0,0,0.5)'; ctx.font = 'bold 60px "Press Start 2P"'; ctx.textAlign = 'center'; 
                    ctx.fillText("ISHIN IST ERWACHT!", camera.x + canvas.width/2, camera.y + 200); 
                }
                
                ctx.fillStyle = '#ff0000'; ctx.fillRect(bx, by - 20, 120, 12); 
                ctx.fillStyle = '#00ffcc'; ctx.fillRect(bx, by - 20, 120 * (Math.max(0, gameState.boss_hp)/500), 12);
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 16px "Outfit"'; ctx.textAlign = 'center'; ctx.fillText("ISHIN", bx + 60, by - 30);
            }

            // Lasers
            if (gameState.last_laser && nowTime - gameState.last_laser.ts < 150) {
                ctx.strokeStyle = 'rgba(255, 51, 102, 0.8)'; ctx.lineWidth = 6; ctx.beginPath(); 
                ctx.moveTo(gameState.last_laser.x1, gameState.last_laser.y1); ctx.lineTo(gameState.last_laser.x2, gameState.last_laser.y2); ctx.stroke();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke(); 
            }

            // Basketball
            let drawBallX = localBall.x; let drawBallY = localBall.y; let drawBallZ = localBall.z;
            if (gameState.ball_owner) {
                const owner = serverPlayers[gameState.ball_owner] || (gameState.ball_owner === currentUser.uid ? myLocalPlayer : null);
                if (owner) { drawBallX = owner.x + 20; drawBallY = owner.y - 20; drawBallZ = 0; } 
            }
            if ((isInOG && drawBallY > 2000) || (!isInOG && drawBallY < 2000)) {
                ctx.fillStyle = '#ff6600'; ctx.beginPath(); ctx.arc(drawBallX, drawBallY - drawBallZ, 16, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
            }

            // Particles
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
                if(p.isConfetti) p.vy += 600 * dt; 
                if(p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fillRect(p.x, p.y, 8, 8); ctx.globalAlpha = 1.0;
            }

            // PLAYERS
            for(let id in serverPlayers) {
                const sp = serverPlayers[id]; const isMe = (id === currentUser?.uid); const isGabri = (id === localCurrentGabri);
                let px = isMe ? myLocalPlayer.x : (gameEntities[id]?.x || sp.x); let py = isMe ? myLocalPlayer.y : (gameEntities[id]?.y || sp.y);

                if (!isMe && ((isInOG && py < 2000) || (!isInOG && py > 2000))) continue;

                if (isGabri && gameState.isPlaying) { ctx.shadowColor = '#ff3366'; ctx.shadowBlur = 20 + Math.abs(Math.sin(nowTime * 0.005)) * 10; } 
                else { ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 10; }

                ctx.imageSmoothingEnabled = false;
                
                let isMoving = isMe ? (Math.abs(Input.getVector().dx) > 0 || Math.abs(Input.getVector().dy) > 0) : (Math.hypot(sp.x - px, sp.y - py) > 5);
                let frame = isMoving ? Math.floor(nowTime / 150) % 2 : 0;
                
                let stealth = isMe ? isStealthMode : sp.isStealth;
                if (stealth) { 
                    ctx.globalAlpha = 0.3; 
                    ctx.drawImage((isGabri && gameState.isPlaying) ? texGabri[frame] : texNormal[frame], px, py + 15, PLAYER_SIZE, PLAYER_SIZE - 15); 
                } else { 
                    ctx.drawImage((isGabri && gameState.isPlaying) ? texGabri[frame] : texNormal[frame], px, py, PLAYER_SIZE, PLAYER_SIZE); 
                }
                ctx.shadowBlur = 0; ctx.globalAlpha = 1.0;

                let playerHeldItem = null;
                if (isMe) playerHeldItem = myHeldItem;
                else { 
                    for(let i=1; i<=4; i++) if (gameState['sword'+i+'_owner'] === id) playerHeldItem = 'sword'; 
                    if (gameState.mg_owner === id) playerHeldItem = 'mg'; 
                }
                
                if (playerHeldItem && playerHeldItem.startsWith('sword')) {
                    let swingTs = isMe ? lastSwordAttack : sp.action_ts;
                    let isSwinging = (sp.action_type === 'sword' || isMe) && (nowTime - swingTs < 200);
                    if (isSwinging) {
                        let prog = (nowTime - swingTs) / 200; let angle = isMe ? swordStartAngle : sp.action_angle;
                        ctx.save(); ctx.translate(px + 20, py + 20); ctx.rotate(angle + (prog * Math.PI)); 
                        ctx.fillStyle = '#aaaaaa'; ctx.fillRect(15, -3, 30, 6); ctx.fillStyle = '#ffcc00'; ctx.fillRect(10, -9, 6, 18); ctx.restore();
                    } else { 
                        ctx.fillStyle = '#aaaaaa'; ctx.fillRect(px + 35, py - 5, 6, 30); ctx.fillStyle = '#ffcc00'; ctx.fillRect(px + 31, py + 20, 14, 6); 
                    }
                } else if (playerHeldItem === 'mg') { ctx.fillStyle = '#444'; ctx.fillRect(px + 10, py + 15, 30, 6); }

                if (isGabri && gameState.isPlaying && nowTime < localGabriSince + TAG_COOLDOWN_MS) {
                    const progress = (nowTime - localGabriSince) / TAG_COOLDOWN_MS;
                    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 3; ctx.beginPath();
                    ctx.arc(px + PLAYER_SIZE/2, py + PLAYER_SIZE/2, PLAYER_SIZE*0.8, -Math.PI/2, (-Math.PI/2) + (Math.PI*2*progress)); ctx.stroke();
                }

                if (!stealth) {
                    ctx.fillStyle = (isGabri && gameState.isPlaying) ? '#ff99aa' : (isMe ? '#00ffcc' : 'white'); ctx.font = '600 14px "Outfit"'; ctx.textAlign = 'center';
                    const textWidth = ctx.measureText(sp.name).width; ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(px + PLAYER_SIZE/2 - textWidth/2 - 4, py - 24, textWidth + 8, 18);
                    ctx.fillStyle = (isGabri && gameState.isPlaying) ? '#ff99aa' : (isMe ? '#00ffcc' : 'white'); ctx.fillText(sp.name, px + PLAYER_SIZE/2, py - 10);
                }
            }

            // NIGHT MODE ANOMALY
            if (gameState.isPlaying && localTimeLeft > 0 && localTimeLeft <= 30) {
                let flickerAlpha = 0.96; 
                if (Math.random() < 0.05) flickerAlpha = 0.8; 
                if (localTimeLeft === 30 && (nowTime % 1000 < 500)) flickerAlpha = 0.4; 
                
                ctx.fillStyle = `rgba(2, 2, 5, ${flickerAlpha})`; ctx.fillRect(camera.x, camera.y, canvas.width, canvas.height);
                ctx.globalCompositeOperation = 'destination-out';
                
                // My Flashlight
                let myFlicker = 200 + Math.random() * 15;
                let myRad = ctx.createRadialGradient(myLocalPlayer.x + 20, myLocalPlayer.y + 20, 10, myLocalPlayer.x + 20, myLocalPlayer.y + 20, myFlicker);
                myRad.addColorStop(0, 'rgba(255,255,255,1)'); myRad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = myRad; ctx.beginPath(); ctx.arc(myLocalPlayer.x + 20, myLocalPlayer.y + 20, myFlicker, 0, Math.PI*2); ctx.fill();

                // Other Flashlights
                for(let id in serverPlayers) {
                    if (id === currentUser?.uid) continue; 
                    const sp = serverPlayers[id]; let px = gameEntities[id]?.x || sp.x; let py = gameEntities[id]?.y || sp.y;
                    if (!((isInOG && py < 2000) || (!isInOG && py > 2000))) {
                        let otherFlicker = 180 + Math.random() * 10;
                        let rad = ctx.createRadialGradient(px + 20, py + 20, 10, px + 20, py + 20, otherFlicker);
                        rad.addColorStop(0, 'rgba(255,255,255,0.8)'); rad.addColorStop(1, 'rgba(255,255,255,0)');
                        ctx.fillStyle = rad; ctx.beginPath(); ctx.arc(px + 20, py + 20, otherFlicker, 0, Math.PI*2); ctx.fill();
                    }
                }
                ctx.globalCompositeOperation = 'source-over';
                
                if (localTimeLeft === 30 || localTimeLeft === 29) { 
                    ctx.fillStyle = 'rgba(255,0,0,0.8)'; ctx.font = 'bold 40px "Press Start 2P"'; ctx.textAlign = 'center'; ctx.fillText("STROMAUSFALL!", camera.x + canvas.width/2, camera.y + 150); 
                }
            }
            
            ctx.restore(); 

            // UI LAYER DRAWING
            ctx.save();
            ctx.beginPath(); ctx.arc(Input.joyBase.x, Input.joyBase.y, Input.joyBase.r, 0, Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(Input.joystick.nx, Input.joystick.ny, 25, 0, Math.PI*2); ctx.fillStyle = 'rgba(0, 255, 204, 0.4)'; ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 15; ctx.fill();
            
            ctx.beginPath(); ctx.arc(Input.btnA.x, Input.btnA.y, Input.btnA.r, 0, Math.PI*2); ctx.fillStyle = Input.btnA.active ? 'rgba(255,51,102,0.6)' : 'rgba(255,51,102,0.2)'; ctx.strokeStyle = 'rgba(255,51,102,0.4)'; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = 'bold 16px "Outfit"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText("A", Input.btnA.x, Input.btnA.y-8); ctx.font = '10px "Outfit"'; ctx.fillText("(SPACE)", Input.btnA.x, Input.btnA.y+8);

            ctx.beginPath(); ctx.arc(Input.btnB.x, Input.btnB.y, Input.btnB.r, 0, Math.PI*2); ctx.fillStyle = Input.btnB.active ? 'rgba(0,255,204,0.6)' : 'rgba(0,255,204,0.2)'; ctx.strokeStyle = 'rgba(0,255,204,0.4)'; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = 'bold 16px "Outfit"'; ctx.fillText("B", Input.btnB.x, Input.btnB.y-8); ctx.font = '10px "Outfit"'; ctx.fillText("(SHIFT)", Input.btnB.x, Input.btnB.y+8);

            ctx.beginPath(); ctx.arc(Input.btnC.x, Input.btnC.y, Input.btnC.r, 0, Math.PI*2); ctx.fillStyle = Input.btnC.active ? 'rgba(255,204,0,0.6)' : 'rgba(255,204,0,0.2)'; ctx.strokeStyle = 'rgba(255,204,0,0.4)'; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = 'bold 14px "Outfit"'; ctx.fillText("DROP", Input.btnC.x, Input.btnC.y-8); ctx.font = '9px "Outfit"'; ctx.fillText("(C)", Input.btnC.x, Input.btnC.y+8);
            ctx.restore();
        }
    </script>
</body>
