<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#07070d">
    <title>GABRI-FLUCHT.io - Elite Edition</title>

    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Grotesk:wght@500;700&family=Rubik+Mono+One&display=swap" rel="stylesheet">
    
    <style>
        /* ========================================================================
           1. CSS VARIABLES & BASE RESET
           ======================================================================== */
        :root {
            --bg: #07070d;
            --bg-deep: #02020a;
            --ink: #f3f3ff;
            --dim: #6d6d8a;
            --accent: #00ffcc; /* Cyberpunk Cyan */
            --danger: #ff3366; /* Gabri Red */
            --good: #6bff7a;
            --floor1: #12121c;
            --floor2: #17172a;
            --wall: #1e1e30;
            --wall-edge: #3a3a5c;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg-deep); color: var(--ink);
            font-family: 'Space Grotesk', system-ui, sans-serif;
            overflow: hidden; overscroll-behavior: none;
            -webkit-user-select: none; user-select: none;
        }

        /* ========================================================================
           2. VISUAL EFFECTS & CANVAS
           ======================================================================== */
        .crt {
            position: fixed; inset: 0; pointer-events: none; z-index: 200;
            background: repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,.15) 3px, rgba(0,0,0,0) 4px);
            mix-blend-mode: multiply; opacity: .7;
        }
        .crt::after {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.8) 100%);
        }

        #gameCanvas {
            display: none; width: 100vw; height: 100vh;
            image-rendering: pixelated; image-rendering: crisp-edges;
            background: var(--bg);
        }
        .game-running #gameCanvas { display: block; }
        .game-running #ui-menus { display: none !important; }

        /* ========================================================================
           3. UI MENUS
           ======================================================================== */
        #ui-menus {
            position: fixed; inset: 0; z-index: 50;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #1a1a24 0%, var(--bg-deep) 100%);
            padding: 24px;
        }

        .panel {
            width: 100%; max-width: 500px;
            background: rgba(10, 10, 20, .9); backdrop-filter: blur(14px);
            border: 2px solid var(--ink);
            box-shadow: 8px 8px 0 var(--accent), 8px 8px 0 2px var(--ink);
            padding: 30px; position: relative;
        }

        .screen { display: none; }
        .screen.active { display: block; animation: bootIn .3s ease-out; }
        @keyframes bootIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: none; } }

        h1 {
            font-family: 'Rubik Mono One', 'VT323', monospace;
            font-size: 42px; line-height: 1; margin: 0 0 10px;
            color: var(--accent); text-shadow: 3px 3px 0 var(--danger), 5px 5px 0 var(--ink);
            letter-spacing: -1px; text-align: center;
        }

        .terminal {
            background: #000; border: 1px solid var(--wall-edge);
            padding: 12px; font-family: 'VT323', monospace; font-size: 18px;
            color: var(--good); margin-bottom: 20px; line-height: 1.4;
        }

        .input-box {
            width: 100%; background: #000; color: var(--accent);
            border: 2px solid var(--ink); padding: 14px; font-family: 'VT323', monospace;
            font-size: 22px; letter-spacing: 2px; text-transform: uppercase;
            margin-bottom: 15px; outline: none; transition: 0.2s;
        }
        .input-box:focus { border-color: var(--accent); box-shadow: inset 0 0 15px rgba(0,255,204,.2); }
        select.input-box { appearance: none; cursor: pointer; }

        .btn {
            width: 100%; background: var(--accent); color: #000;
            border: 2px solid var(--ink); padding: 16px; margin-top: 5px; cursor: pointer;
            font-family: 'Rubik Mono One', monospace; font-size: 16px; text-transform: uppercase;
            box-shadow: 4px 4px 0 var(--ink); transition: 0.1s;
        }
        .btn:hover:not(:disabled) { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
        .btn:active:not(:disabled) { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--ink); }
        .btn:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; box-shadow: none; transform: none; }
        .btn.danger { background: var(--danger); color: white; }

        .player-list { background: #000; border: 1px solid var(--wall-edge); max-height: 200px; overflow-y: auto; margin-bottom: 15px; }
        .p-row { display: flex; justify-content: space-between; padding: 10px; font-family: 'VT323', monospace; font-size: 20px; border-bottom: 1px solid var(--wall); }
        .p-row .me { color: var(--accent); }

        /* ========================================================================
           4. IN-GAME HUD
           ======================================================================== */
        #game-hud {
            position: fixed; inset: 0; pointer-events: none; z-index: 20;
            display: none; padding: 15px; flex-direction: column; justify-content: space-between;
        }
        .game-running #game-hud { display: flex; }

        .hud-top { display: flex; justify-content: space-between; width: 100%; }
        .hud-card { background: rgba(5,5,12,.85); border: 2px solid var(--ink); box-shadow: 4px 4px 0 var(--accent); padding: 12px 20px; }
        .hud-card.danger { border-color: var(--danger); box-shadow: 4px 4px 0 var(--danger); animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { box-shadow: 4px 4px 0 var(--danger); } to { box-shadow: 4px 4px 0 var(--danger), 0 0 20px rgba(255,51,102,.6); } }

        .timer { font-family: 'Rubik Mono One', monospace; font-size: 26px; color: var(--accent); margin-bottom: 5px; }
        .role { font-family: 'VT323', monospace; font-size: 22px; color: var(--ink); }

        .floor-tag {
            align-self: center; background: #000; border: 2px solid var(--accent); color: var(--accent);
            padding: 8px 20px; font-family: 'VT323', monospace; font-size: 20px; border-radius: 20px;
        }

        #banner {
            position: fixed; top: 20%; left: 50%; transform: translateX(-50%);
            background: #000; border: 3px solid var(--accent); color: var(--accent);
            padding: 15px 30px; font-family: 'Rubik Mono One', monospace; font-size: 20px;
            z-index: 30; display: none; box-shadow: 0 0 30px rgba(0,255,204,.5); text-align: center;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body>

<div class="crt"></div>

<!-- ========================================================================
     UI MENUS
     ======================================================================== -->
<div id="ui-menus">
    
    <!-- 1. LOGIN SCREEN -->
    <div id="screen-login" class="screen active">
        <div class="panel">
            <h1>GABRI<br>FLUCHT.IO</h1>
            <div class="terminal">
                <span class="dim">> init system...</span><br>
                <span class="good" id="connStatus">> connecting to firebase...</span>
            </div>
            
            <!-- Controls Hint -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-family: 'VT323'; font-size: 18px; margin-bottom: 20px; color: var(--ink);">

            <select id="inputRoom" class="input-box">
                <option value="solo">SOLO vs BOTS (Offline)</option>

            <button id="btnJoin" class="btn" disabled>SYSTEM LÄDT...</button>

    <!-- 2. LOBBY SCREEN (Multiplayer Only) -->
    <div id="screen-lobby" class="screen">
        <div class="panel">

            <div class="terminal">
                <span class="dim">> Warte auf Spieler...</span><br>
                <span class="good">> Jeder kann starten.</span>
            </div>
            <div class="player-list" id="lobbyList"></div>
            <button id="btnStartMulti" class="btn">RUNDE STARTEN</button>
            <button id="btnLeave" class="btn" style="background: transparent; color: white; margin-top: 10px; border-color: #555;">ZURÜCK</button>

    <!-- 3. GAMEOVER SCREEN -->
    <div id="screen-over" class="screen">
        <div class="panel">
            <h2 style="font-family: 'Rubik Mono One'; color: var(--danger); font-size: 24px; margin-bottom: 15px;">RUNDE BEENDET</h2>
            <div class="terminal" id="overText"></div>
            <div class="player-list" id="leaderboardList" style="margin-bottom: 20px;"></div>
            <button id="btnRestart" class="btn danger">ZURÜCK INS MENÜ</button>
        </div>
    </div>

</div>

<!-- ========================================================================
     GAME HUD & CANVAS
     ======================================================================== -->
<canvas id="gameCanvas"></canvas>

<div id="game-hud">
    <div class="hud-top">
        <div class="hud-card" id="statusCard">
            <div class="timer" id="timerDisplay">03:00</div>
            <div class="role" id="roleDisplay">LÄDT...</div>
            <div class="role" id="timeAsGabriDisplay" style="color: var(--dim); font-size: 16px; margin-top: 5px;">ZEIT: 0.0s</div>
        </div>
        <div class="hud-card" style="min-width: 200px;">
            <div style="font-family: 'Rubik Mono One'; font-size: 12px; color: var(--accent); border-bottom: 1px solid #555; padding-bottom: 5px; margin-bottom: 5px;">SPIELER</div>
            <div id="miniLeaderboard" style="font-family: 'VT323'; font-size: 18px; color: white;"></div>
        </div>
    </div>
    <div class="floor-tag" id="floorDisplay">EG - ERDGESCHOSS</div>
</div>

<div id="banner"></div>

<!-- ========================================================================
     MAIN ENGINE SCRIPT
     ======================================================================== -->
<script type="module">
    // ----------------------------------------------------------------------
    // 1. FIREBASE INIT (Mit deinen exakten Daten!)
    // ----------------------------------------------------------------------
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD96dILjyTPxKmm0AFgrCeo9OToIRy8294",
        authDomain: "gabri-game-f55cf.firebaseapp.com",
        projectId: "gabri-game-f55cf",
        storageBucket: "gabri-game-f55cf.firebasestorage.app",
        messagingSenderId: "264922930578",
        appId: "1:264922930578:web:65a583545f58c09219b54b"
    };

    let app, auth, db;
    let isFirebaseReady = false;

    try {
        app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        isFirebaseReady = true;
    } catch (e) {
        console.error("Firebase Fehler:", e);
        document.getElementById('connStatus').innerHTML = `<span class="err" style="color:var(--danger)">> Datenbank Offline. Nur Solo-Modus.</span>`;
    }

    // ----------------------------------------------------------------------
    // 2. AUDIO ENGINE
    // ----------------------------------------------------------------------
    class AudioSystem {
        constructor() {
            this.ctx = null; this.gain = null; this.enabled = false;
        }
        enable() {
            if (this.ctx) { if (this.ctx.state === "suspended") this.ctx.resume(); this.enabled = true; return; }
            const AC = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AC(); this.gain = this.ctx.createGain(); this.gain.gain.value = 0.2; this.gain.connect(this.ctx.destination); this.enabled = true;
        }
        tone(f, t, dur, vol = 1, slide = null) {
            if (!this.enabled) return;
            const o = this.ctx.createOscillator(), g = this.ctx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, this.ctx.currentTime);
            if (slide) o.frequency.exponentialRampToValueAtTime(slide, this.ctx.currentTime + dur);
            g.gain.setValueAtTime(vol, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
            o.connect(g); g.connect(this.gain); o.start(); o.stop(this.ctx.currentTime + dur);
        }
        noise(dur, vol = 1, lp = 1200) {
            if (!this.enabled) return;
            const bs = this.ctx.sampleRate * dur; const b = this.ctx.createBuffer(1, bs, this.ctx.sampleRate); const d = b.getChannelData(0);
            for (let i = 0; i < bs; i++) d[i] = Math.random() * 2 - 1;
            const s = this.ctx.createBufferSource(); s.buffer = b;
            const f = this.ctx.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = lp;
            const g = this.ctx.createGain(); g.gain.setValueAtTime(vol, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
            s.connect(f); f.connect(g); g.connect(this.gain); s.start();
        }
        tag()    { this.tone(180,"square",.08,.9,60); setTimeout(()=>this.tone(90,"square",.2,.9,40),70); }
        dash()   { this.tone(440,"sine",.15,.5,160); this.noise(.12,.25,800); }
        pickup() { this.tone(520,"square",.08,.4); setTimeout(()=>this.tone(820,"square",.08,.4),60); }
        drop()   { this.tone(280,"sine",.1,.4,180); }
        hit()    { this.noise(.08,.6,1800); this.tone(520,"sine",.1,.3,200); }
        bounce() { this.tone(140,"sine",.08,.4,80); }
        score()  { [400,560,740,940].forEach((f,i)=>setTimeout(()=>this.tone(f,"square",.12,.5),i*75)); }
        bossIn() { this.tone(60,"sawtooth",1.0,.9,30); this.noise(1.0,.4,200); }
        shoot()  { this.tone(900,"sawtooth",.08,.4,200); }
        alert()  { this.tone(800,"sawtooth",0.1,0.5); }
    }
    const sfx = new AudioSystem();

    // ----------------------------------------------------------------------
    // 3. GLOBAL STATE & CONSTANTS
    // ----------------------------------------------------------------------
    const CFG = { MAP_W: 3000, MAP_H: 4000, P_SIZE: 40, SPEED: 350, DASH: 3.5, ROUND_SEC: 180, BOSS_SEC: 60 };
    
    let S = {
        mode: "solo", roomId: null, myId: null, myName: "RUNNER", isHost: false,
        running: false, loopActive: false,
        players: {}, // Local representation of all players
        bots: [], 
        gabriId: null, tagCd: 0,
        ball: { active: true, x: 2200, y: 1500, z: 0, vx: 0, vy: 0, vz: 0, owner: null },
        boss: null, mg: null, swords: [], pallets: [],
        timeLeft: CFG.ROUND_SEC, lastTick: 0,
        cam: { x: 0, y: 0 }, particles: [], bannerTimer: null
    };

    let myPlayer = { x: 1300, y: 1000, facingX: 1, facingY: 0, heldItem: null, isStealth: false, stillT: 0, dashT: 0, swingT: 0, kbX: 0, kbY: 0, timeAsGabri: 0 };
    let netUnsubs = [];

    const DOM = {
        screens: document.getElementById('ui-menus'),
        sLogin: document.getElementById('screen-login'),
        sLobby: document.getElementById('screen-lobby'),
        sOver: document.getElementById('screen-over'),
        btnJoin: document.getElementById('btnJoin'),
        btnStartMulti: document.getElementById('btnStartMulti'),
        banner: document.getElementById('banner')
    };

    function showScreen(name) {
        DOM.sLogin.classList.remove('active'); DOM.sLobby.classList.remove('active'); DOM.sOver.classList.remove('active');
        if (name) { DOM.screens.style.display = 'flex'; document.getElementById('screen-'+name).classList.add('active'); document.body.classList.remove('game-running'); } 
        else { DOM.screens.style.display = 'none'; document.body.classList.add('game-running'); }
    }

    function flashBanner(text, time=2000) {
        DOM.banner.innerText = text; DOM.banner.style.display = 'block'; sfx.alert();
        clearTimeout(S.bannerTimer); S.bannerTimer = setTimeout(() => DOM.banner.style.display = 'none', time);
    }

    // ----------------------------------------------------------------------
    // 4. MAP & SPRITE GENERATION
    // ----------------------------------------------------------------------
    const MAP = { walls: [], labels: [], stairs: [] };
    const HOOP = { x: 2200, y: 1220, w: 100, h: 20 };

    function buildMap() {
        // Borders
        MAP.walls.push({x:-50, y:-50, w:CFG.MAP_W+100, h:50}, {x:-50, y:CFG.MAP_H, w:CFG.MAP_W+100, h:50});
        MAP.walls.push({x:-50, y:-50, w:50, h:CFG.MAP_H+100}, {x:CFG.MAP_W, y:-50, w:50, h:CFG.MAP_H+100});
        MAP.walls.push({x:-50, y:1980, w:CFG.MAP_W+100, h:40}); // EG/OG Divider

        function addRoom(rx, ry, rw, rh, doorEdge, doorOffset, doorWidth, labelText) {
            const T = 20; 
            if (doorEdge === 'top') { MAP.walls.push({x: rx, y: ry, w: doorOffset, h: T}); MAP.walls.push({x: rx + doorOffset + doorWidth, y: ry, w: rw - doorOffset - doorWidth, h: T}); } else { MAP.walls.push({x: rx, y: ry, w: rw, h: T}); }
            if (doorEdge === 'bottom') { MAP.walls.push({x: rx, y: ry + rh - T, w: doorOffset, h: T}); MAP.walls.push({x: rx + doorOffset + doorWidth, y: ry + rh - T, w: rw - doorOffset - doorWidth, h: T}); } else { MAP.walls.push({x: rx, y: ry + rh - T, w: rw, h: T}); }
            if (doorEdge === 'left') { MAP.walls.push({x: rx, y: ry, w: T, h: doorOffset}); MAP.walls.push({x: rx, y: ry + doorOffset + doorWidth, w: T, h: rh - doorOffset - doorWidth}); } else { MAP.walls.push({x: rx, y: ry, w: T, h: rh}); }
            if (doorEdge === 'right') { MAP.walls.push({x: rx + rw - T, y: ry, w: T, h: doorOffset}); MAP.walls.push({x: rx + rw - T, y: ry + doorOffset + doorWidth, w: T, h: rh - doorOffset - doorWidth}); } else { MAP.walls.push({x: rx + rw - T, y: ry, w: T, h: rh}); }
            MAP.labels.push({x: rx + rw/2, y: ry + rh/2, text: labelText});
        }

        // EG
        addRoom(100, 100, 1000, 800, 'right', 300, 200, 'MATHE (EG)');
        addRoom(1500, 100, 1400, 800, 'left', 300, 200, 'BIOLOGIE (EG)');
        addRoom(100, 1200, 1000, 700, 'top', 400, 200, 'MENSA (EG)');
        addRoom(1500, 1200, 1400, 700, 'top', 500, 200, 'TURNHALLE (EG)'); 
        // OG
        addRoom(100, 2100, 1000, 800, 'right', 300, 200, 'CHEMIE (OG)');
        addRoom(1500, 2100, 1400, 800, 'left', 300, 200, 'PHYSIK (OG)');
        addRoom(100, 3200, 1000, 700, 'top', 400, 200, 'LEHRERZIMMER (OG)');
        addRoom(1500, 3200, 1400, 700, 'top', 500, 200, 'BIBLIOTHEK (OG)');

        MAP.stairs.push({ x: 1225, y: 400, w: 150, h: 150, ty: 2400, lbl: 'OG' });
        MAP.stairs.push({ x: 1225, y: 2400, w: 150, h: 150, ty: 400, lbl: 'EG' });
        MAP.stairs.push({ x: 1225, y: 1500, w: 150, h: 150, ty: 3500, lbl: 'OG' });
        MAP.stairs.push({ x: 1225, y: 3500, w: 150, h: 150, ty: 1500, lbl: 'EG' });

        // Pallets
        const pts = [{x: 1060, y: 400, dir:'v'}, {x: 1500, y: 400, dir:'v'}, {x: 500, y: 1160, dir:'h'}, {x: 2000, y: 1160, dir:'h'}, {x: 1060, y: 2400, dir:'v'}, {x: 1500, y: 2400, dir:'v'}, {x: 500, y: 3160, dir:'h'}, {x: 2000, y: 3160, dir:'h'}];
        S.pallets = pts.map((p,i) => ({ id: i, x: p.x, y: p.y, dir: p.dir, state: 0 }));
    }
    buildMap();

    function genSprite(type, f=0) {
        const c=document.createElement('canvas'); c.width=12; c.height=12; const x=c.getContext('2d');
        let sk='#ffcba4', sh='#00ffcc', pt='#1a1a24', hr='#1a1a24';
        if (type==='gabri') { sk='#ff99aa'; sh='#ff3366'; } else if (type==='boss') { sk='#ff4444'; sh='#220000'; pt='#110000'; hr='#ffaa00'; } else if (type==='zombie') { sk='#4caf50'; sh='#673ab7'; pt='#111'; hr='#00ff00'; }
        let l=[[0,0,0,0,6,6,6,6,0,0,0,0],[0,0,0,6,2,2,2,2,6,0,0,0],[0,0,6,2,0,2,2,0,2,6,0,0],[0,0,6,2,2,2,2,2,2,6,0,0],[0,0,0,6,2,2,2,2,6,0,0,0],[0,0,3,3,3,3,3,3,3,3,0,0],[0,3,3,3,3,3,3,3,3,3,3,0],[0,3,3,3,3,3,3,3,3,3,3,0],[0,3,0,4,4,4,4,4,4,0,3,0],[0,0,0,4,4,0,0,4,4,0,0,0],[0,0,5,5,0,0,0,0,5,5,0,0]];
        if(f===1) { l[9]=[0,0,0,4,4,0,0,0,0,0,0,0]; l[10]=[0,0,5,5,0,0,0,4,4,0,0,0]; }
        for(let i=0;i<11;i++) for(let j=0;j<12;j++) { let p=l[i][j]; if(p) { if(p===6) x.fillStyle=hr; else if(p===1||p===4) x.fillStyle=pt; else if(p===2) x.fillStyle=sk; else if(p===3) x.fillStyle=sh; else x.fillStyle='#111'; x.fillRect(j,i,1,1); } }
        return c;
    }
    const SPR = { norm: [genSprite('normal',0), genSprite('normal',1)], gabri: [genSprite('gabri',0), genSprite('gabri',1)], boss: [genSprite('boss',0), genSprite('boss',1)], zomb: [genSprite('zombie',0), genSprite('zombie',1)] };

    // ----------------------------------------------------------------------
    // 5. INPUT & CONTROLS
    // ----------------------------------------------------------------------
    const IN = {
        k: {}, joy: {a:false, id:null, bx:120, by:window.innerHeight-120, nx:120, ny:window.innerHeight-120, r:60},
        bA: {x:window.innerWidth-90, y:window.innerHeight-90, r:45, a:false, j:false},
        bB: {x:window.innerWidth-180, y:window.innerHeight-140, r:45, a:false, j:false},
        bC: {x:window.innerWidth-100, y:window.innerHeight-200, r:35, a:false, j:false}
    };
    window.addEventListener('resize', () => { 
        canvas.width=window.innerWidth; canvas.height=window.innerHeight; 
        IN.joy.by=window.innerHeight-120; IN.bA.x=window.innerWidth-90; IN.bA.y=window.innerHeight-90; IN.bB.x=window.innerWidth-180; IN.bB.y=window.innerHeight-140; IN.bC.x=window.innerWidth-100; IN.bC.y=window.innerHeight-200;
    });
    window.dispatchEvent(new Event('resize'));

    window.addEventListener('keydown', e => { let k=e.key.toLowerCase(); IN.k[k]=true; if(k===' ') { IN.bA.j=true; IN.bA.a=true; } if(k==='shift') { IN.bB.j=true; IN.bB.a=true; } if(k==='c') { IN.bC.j=true; IN.bC.a=true; } });
    window.addEventListener('keyup', e => { let k=e.key.toLowerCase(); IN.k[k]=false; if(k===' ') IN.bA.a=false; if(k==='shift') IN.bB.a=false; if(k==='c') IN.bC.a=false; });

    canvas.addEventListener('touchstart', e => { e.preventDefault(); for(let t of e.changedTouches) {
        if(Math.hypot(t.clientX-IN.joy.bx, t.clientY-IN.joy.by)<IN.joy.r*2 && !IN.joy.a) { IN.joy.a=true; IN.joy.id=t.identifier; IN.joy.nx=t.clientX; IN.joy.ny=t.clientY; }
        else if(Math.hypot(t.clientX-IN.bA.x, t.clientY-IN.bA.y)<IN.bA.r*1.5) { IN.bA.a=true; IN.bA.j=true; }
        else if(Math.hypot(t.clientX-IN.bB.x, t.clientY-IN.bB.y)<IN.bB.r*1.5) { IN.bB.a=true; IN.bB.j=true; }
        else if(Math.hypot(t.clientX-IN.bC.x, t.clientY-IN.bC.y)<IN.bC.r*1.5) { IN.bC.a=true; IN.bC.j=true; }
    }}, {passive:false});
    canvas.addEventListener('touchmove', e => { e.preventDefault(); for(let t of e.changedTouches) if(t.identifier===IN.joy.id) {
        let dx=t.clientX-IN.joy.bx, dy=t.clientY-IN.joy.by, d=Math.hypot(dx,dy);
        if(d>IN.joy.r) { IN.joy.nx=IN.joy.bx+dx/d*IN.joy.r; IN.joy.ny=IN.joy.by+dy/d*IN.joy.r; } else { IN.joy.nx=t.clientX; IN.joy.ny=t.clientY; }
    }}, {passive:false});
    const endTouch = e => { e.preventDefault(); for(let t of e.changedTouches) {
        if(t.identifier===IN.joy.id) { IN.joy.a=false; IN.joy.id=null; IN.joy.nx=IN.joy.bx; IN.joy.ny=IN.joy.by; }
        if(Math.hypot(t.clientX-IN.bA.x, t.clientY-IN.bA.y)<IN.bA.r*2) IN.bA.a=false;
        if(Math.hypot(t.clientX-IN.bB.x, t.clientY-IN.bB.y)<IN.bB.r*2) IN.bB.a=false;
        if(Math.hypot(t.clientX-IN.bC.x, t.clientY-IN.bC.y)<IN.bC.r*2) IN.bC.a=false;
    }};
    canvas.addEventListener('touchend', endTouch, {passive:false}); canvas.addEventListener('touchcancel', endTouch, {passive:false});

    function getDir() {
        let x=0, y=0; if(IN.k.w||IN.k.arrowup) y-=1; if(IN.k.s||IN.k.arrowdown) y+=1; if(IN.k.a||IN.k.arrowleft) x-=1; if(IN.k.d||IN.k.arrowright) x+=1;
        if(x!==0 && y!==0) { let l=Math.hypot(x,y); x/=l; y/=l; }
        if(IN.joy.a) { let dx=IN.joy.nx-IN.joy.bx, dy=IN.joy.ny-IN.joy.by, d=Math.hypot(dx,dy); if(d>10) return {x:dx/IN.joy.r, y:dy/IN.joy.r}; }
        return {x,y};
    }

    // ----------------------------------------------------------------------
    // 6. PHYSICS & LOGIC
    // ----------------------------------------------------------------------
    function hitsWall(x, y) {
        if(x<0||y<0||x+CFG.P_SIZE>CFG.MAP_W||y+CFG.P_SIZE>CFG.MAP_H) return true;
        for(let w of MAP.walls) if(x<w.x+w.w && x+CFG.P_SIZE>w.x && y<w.y+w.h && y+CFG.P_SIZE>w.y) return true;
        for(let p of S.pallets) {
            let pw = p.dir==='v'?40:200, ph = p.dir==='v'?200:40;
            if(p.state===1 && x<p.x+pw && x+CFG.P_SIZE>p.x && y<p.y+ph && y+CFG.P_SIZE>p.y) return true;
        }
        for(let b of S.bots) if(x<b.x+CFG.P_SIZE && x+CFG.P_SIZE>b.x && y<b.y+CFG.P_SIZE && y+CFG.P_SIZE>b.y) return true;
        return false;
    }

    function doAction() {
        if(!S.running) return;
        const cx = myPlayer.x+CFG.P_SIZE/2, cy = myPlayer.y+CFG.P_SIZE/2;
        const now = Date.now();

        // Drop Ball
        if(myPlayer.heldItem==='ball') {
            myPlayer.heldItem = null; S.ball.owner = null; S.ball.x = cx; S.ball.y = cy; S.ball.z = 20;
            S.ball.vx = myPlayer.facingX * 1000; S.ball.vy = myPlayer.facingY * 1000; S.ball.vz = 400;
            sfx.pickup(); syncAction({type:'throw_ball', x:S.ball.x, y:S.ball.y, vx:S.ball.vx, vy:S.ball.vy}); return;
        }
        // Shoot MG
        if(myPlayer.heldItem==='mg') {
            if(now - lastMgShot < 200) return; lastMgShot = now; sfx.shoot();
            let lx=cx, ly=cy, hit=null;
            for(let i=0;i<20;i++) {
                lx += myPlayer.facingX*40; ly += myPlayer.facingY*40;
                if(hitsWall(lx,ly)) break;
                if(S.boss && S.boss.hp>0 && Math.hypot(lx-(S.boss.x+60), ly-(S.boss.y+60))<80) { hit='boss'; break; }
                for(let b of S.bots) if(Math.hypot(lx-(b.x+20), ly-(b.y+20))<30) { hit='bot_'+b.id; break; }
                for(let id in S.players) if(id!==S.myId && Math.hypot(lx-(S.players[id].x+20), ly-(S.players[id].y+20))<30) { hit='player_'+id; break; }
                if(hit) break;
            }
            S.mgLaser = {x1:cx, y1:cy, x2:lx, y2:ly, t:0.1};
            if(hit==='boss') S.boss.hp -= 25;
            else if(hit && hit.startsWith('bot_')) { let bid = parseInt(hit.split('_')[1]); S.bots = S.bots.filter(b=>b.id!==bid); }
            syncAction({type:'shoot_mg', lx, ly, hit}); return;
        }
        // Swing Sword
        if(myPlayer.heldItem==='sword') {
            myPlayer.swingT = 0.2; sfx.sfxSword();
            if(S.boss && S.boss.hp>0 && Math.hypot(cx-(S.boss.x+60), cy-(S.boss.y+60))<120) S.boss.hp -= 50;
            let deadBots = [];
            for(let b of S.bots) if(Math.hypot(cx+myPlayer.facingX*40-(b.x+20), cy+myPlayer.facingY*40-(b.y+20))<50) deadBots.push(b.id);
            S.bots = S.bots.filter(b => !deadBots.includes(b.id));
            syncAction({type:'swing_sword'}); return;
        }

        // Pallets
        for(let p of S.pallets) {
            let px = p.dir==='v'?p.x+20:p.x+100, py = p.dir==='v'?p.y+100:p.y+20;
            if(Math.hypot(cx-px, cy-py)<80) {
                if(p.state===0) { p.state=1; sfx.bounce(); syncAction({type:'pallet', id:p.id, state:1}); return; }
                if(p.state===1) {
                    if(S.gabriId === S.myId) { p.state=2; sfx.hit(); syncAction({type:'pallet', id:p.id, state:2}); return; }
                    else { 
                        if(p.dir==='v') myPlayer.x = myPlayer.x<p.x ? p.x+50 : p.x-50;
                        else myPlayer.y = myPlayer.y<p.y ? p.y+50 : p.y-50;
                        sfx.dash(); return;
                    }
                }
            }
        }

        // Pickup
        if(!S.ball.owner && Math.hypot(cx-S.ball.x, cy-S.ball.y)<80) { myPlayer.heldItem='ball'; S.ball.owner=S.myId; sfx.pickup(); syncAction({type:'pickup', item:'ball'}); return; }
        if(S.mg && !S.mg.owner && Math.hypot(cx-S.mg.x, cy-S.mg.y)<80) { myPlayer.heldItem='mg'; S.mg.owner=S.myId; sfx.pickup(); syncAction({type:'pickup', item:'mg'}); return; }
        for(let i=0;i<S.swords.length;i++) { let sw=S.swords[i]; if(!sw.owner && Math.hypot(cx-sw.x, cy-sw.y)<80) { myPlayer.heldItem='sword'; sw.owner=S.myId; sfx.pickup(); syncAction({type:'pickup', item:'sword', i}); return; } }
    }

    function doDash() {
        if(Date.now() - myPlayer.dashT > 2000 && (Math.abs(myPlayer.facingX)>0 || Math.abs(myPlayer.facingY)>0)) {
            myPlayer.dashT = Date.now(); sfx.dash();
            for(let i=0;i<10;i++) S.particles.push({x:myPlayer.x+20, y:myPlayer.y+20, vx:(Math.random()-.5)*400, vy:(Math.random()-.5)*400, life:1, color:'#00ffcc'});
        }
    }

    function doDrop() {
        if(!myPlayer.heldItem) return;
        const cx = myPlayer.x+20, cy = myPlayer.y+20;
        let t = myPlayer.heldItem; myPlayer.heldItem = null; sfx.drop();
        if(t==='ball') { S.ball.owner=null; S.ball.x=cx; S.ball.y=cy; S.ball.vx=0; S.ball.vy=0; }
        else if(t==='mg') { S.mg.owner=null; S.mg.x=cx; S.mg.y=cy; }
        else if(t==='sword') { let sw=S.swords.find(s=>s.owner===S.myId); if(sw) { sw.owner=null; sw.x=cx; sw.y=cy; } }
        syncAction({type:'drop', item:t, x:cx, y:cy});
    }

    // ----------------------------------------------------------------------
    // 7. FIREBASE & MULTIPLAYER
    // ----------------------------------------------------------------------
    async function initFirebase() {
        if (!isFirebaseReady) return;
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
            else await signInAnonymously(auth);
            
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    S.myId = user.uid;
                    document.getElementById('connStatus').innerText = "> SERVER ONLINE 🟢";
                    document.getElementById('btnJoin').innerText = "SPIELEN";
                    document.getElementById('btnJoin').disabled = false;
                }
            });
        } catch (e) {
            console.error("Auth:", e);
            document.getElementById('connStatus').innerHTML = `<span class="err">> Firebase Error: ${e.code}</span>`;
            // Fallback for visual testing
            S.myId = "test_user_123";
            document.getElementById('btnJoin').innerText = "OFFLINE SPIELEN";
            document.getElementById('btnJoin').disabled = false;
        }
    }
    initFirebase();

    document.getElementById('btnJoin').addEventListener('click', async () => {
        const name = document.getElementById('inputName').value.trim() || "GUEST";
        const mode = document.getElementById('inputRoom').value;
        S.myName = name.substring(0, 10).toUpperCase();
        S.mode = mode;
        sfx.enable();

        if (mode === "solo" || !isFirebaseReady) {
            // SOLO MODE -> Direkt ins Spiel (Keine Lobby)
            S.roomId = "local"; S.isHost = true; S.players = {}; S.bots = [];
            for(let i=0; i<30; i++) {
                let bx = 100+Math.random()*1000, by = 100+Math.random()*1500;
                S.bots.push({ id: i, x: bx, y: by, vx: (Math.random()-.5)*100, vy: (Math.random()-.5)*100 });
            }
            startRound();
        } else {
            // MULTIPLAYER
            S.roomId = mode;
            document.getElementById('lobbyTitle').innerText = mode;
            showScreen('lobby');
            
            // Register Player
            await setDoc(doc(db, 'gabri-2026', S.roomId, 'players', S.myId), { name: S.myName, x: myPlayer.x, y: myPlayer.y, isStealth: false, lastSeen: Date.now() });
            
            // Listeners
            onSnapshot(collection(db, 'gabri-2026', S.roomId, 'players'), snap => {
                const now = Date.now();
                snap.docChanges().forEach(c => {
                    const d = c.doc.data(); const id = c.doc.id;
                    if (c.type === 'added' || c.type === 'modified') {
                        if(now - d.lastSeen > 10000) { delete S.players[id]; }
                        else { S.players[id] = d; }
                    }
                    if (c.type === 'removed') delete S.players[id];
                });
                
                // Update Lobby UI
                let html = "";
                let ids = Object.keys(S.players).sort();
                if (ids.length > 0 && ids[0] === S.myId) S.isHost = true; else S.isHost = false;

                for(let id in S.players) {
                    html += `<div class="p-row"><span><span style="color:${id===S.myId?'var(--primary)':'white'}">${S.players[id].name} ${id===S.myId?'(DU)':''}</span></span></div>`;
                }
                document.getElementById('lobbyList').innerHTML = html;
            });

            onSnapshot(doc(db, 'gabri-2026', S.roomId), docSnap => {
                if(docSnap.exists()) {
                    let d = docSnap.data();
                    if(d.running && !S.running) { startRoundLocally(d); }
                    else if(!d.running && S.running) { endRound(d); }
                    else if(d.running && S.running) { syncStateFromServer(d); }
                }
            });

            // Heartbeat
            setInterval(() => {
                if(S.running) updateDoc(doc(db, 'gabri-2026', S.roomId, 'players', S.myId), { x: Math.round(myPlayer.x), y: Math.round(myPlayer.y), isStealth: myPlayer.isStealth, lastSeen: Date.now() }).catch(()=>{});
            }, 100);
        }
    });

    document.getElementById('btnStartMulti').addEventListener('click', async () => {
        if(S.mode === "solo") return;
        const ids = Object.keys(S.players);
        const gabri = ids[Math.floor(Math.random() * ids.length)];
        await setDoc(doc(db, 'gabri-2026', S.roomId), { 
            running: true, startTime: Date.now(), gabriId: gabri, 
            ball: { owner: null, x: 2200, y: 1500, vx: 0, vy: 0 }, pallets: S.pallets,
            boss: null, mg: null, swords: [], actions: []
        });
    });

    document.getElementById('btnRestart').addEventListener('click', () => { showScreen('main'); });

    // ----------------------------------------------------------------------
    // 8. GAME LOOP & SYNC
    // ----------------------------------------------------------------------
    function startRound() {
        S.running = true; S.timeLeft = CFG.ROUND_SEC; S.boss = null; S.mg = null; S.swords = [];
        myPlayer.x = 1300; myPlayer.y = 1000;
        if(S.mode === 'solo') S.gabriId = S.bots.length > 0 ? 'bot_0' : S.myId;
        showScreen(null); // Shows Canvas
        S.lastTick = performance.now();
        if(!S.loopActive) { S.loopActive = true; requestAnimationFrame(mainLoop); }
        flashBanner("RUNDE STARTET!", 2000); sfx.score();
    }

    function startRoundLocally(d) {
        S.running = true; S.gabriId = d.gabriId; S.boss = d.boss; S.mg = d.mg; S.swords = d.swords || []; S.pallets = d.pallets || S.pallets;
        S.timeLeft = Math.max(0, CFG.ROUND_SEC - Math.floor((Date.now() - d.startTime)/1000));
        showScreen(null);
        S.lastTick = performance.now();
        if(!S.loopActive) { S.loopActive = true; requestAnimationFrame(mainLoop); }
        flashBanner(S.gabriId === S.myId ? "DU BIST GABRI!" : "LAUF!", 2000);
    }

    function syncStateFromServer(d) {
        S.gabriId = d.gabriId;
        if(d.ball && d.ball.owner !== S.myId) { S.ball.x = d.ball.x; S.ball.y = d.ball.y; S.ball.vx = d.ball.vx; S.ball.vy = d.ball.vy; S.ball.owner = d.ball.owner; }
        S.boss = d.boss; S.mg = d.mg; S.swords = d.swords || [];
        if(d.pallets) S.pallets = d.pallets;
        S.timeLeft = Math.max(0, CFG.ROUND_SEC - Math.floor((Date.now() - d.startTime)/1000));
    }

    function syncAction(act) {
        if(S.mode==='solo') return;
        updateDoc(doc(db, 'gabri-2026', S.roomId), { actions: act }).catch(()=>{});
    }

    function mainLoop(timestamp) {
        if(!S.running) { S.loopActive = false; return; }
        const dt = Math.min((timestamp - S.lastTick) / 1000, 0.1); S.lastTick = timestamp;

        // Player Movement
        if (IN.bA.j) { IN.bA.j = false; doAction(); }
        if (IN.bB.j) { IN.bB.j = false; doDash(); }
        if (IN.bC.j) { IN.bC.j = false; doDrop(); }

        const move = getDir();
        myPlayer.facingX = move.x || myPlayer.facingX; myPlayer.facingY = move.y || myPlayer.facingY;
        
        let spd = CFG.SPEED;
        if(Date.now() - myPlayer.dashT < 200) spd *= CFG.DASH;
        
        let mx = move.x * spd * dt; let my = move.y * spd * dt;
        
        if (move.x===0 && move.y===0) { myPlayer.stillT += dt; } else { myPlayer.stillT = 0; }
        myPlayer.isStealth = myPlayer.stillT > 2.0;

        // Anti-Stuck Collisions
        for(let i=0; i<3; i++) {
            if(!hitsWall(myPlayer.x + mx/3, myPlayer.y)) myPlayer.x += mx/3;
            if(!hitsWall(myPlayer.x, myPlayer.y + my/3)) myPlayer.y += my/3;
        }

        // Stairs
        for(let s of MAP.stairs) {
            if(myPlayer.x < s.x+s.w && myPlayer.x+CFG.P_SIZE > s.x && myPlayer.y < s.y+s.h && myPlayer.y+CFG.P_SIZE > s.y) {
                myPlayer.y = s.ty; sfx.dash(); break;
            }
        }

        // Ball Physics
        if(!S.ball.owner) {
            let bx = S.ball.x + S.ball.vx * dt; let by = S.ball.y + S.ball.vy * dt;
            if(hitsWall(bx, S.ball.y)) { S.ball.vx *= -0.7; sfx.bounce(); } else S.ball.x = bx;
            if(hitsWall(S.ball.x, by)) { S.ball.vy *= -0.7; sfx.bounce(); } else S.ball.y = by;
            S.ball.vx *= 0.98; S.ball.vy *= 0.98; S.ball.vz -= 800 * dt; S.ball.z += S.ball.vz * dt;
            if(S.ball.z < 0) { S.ball.z = 0; if(S.ball.vz < -50) { S.ball.vz *= -0.6; sfx.bounce(); } else { S.ball.vz = 0; S.ball.vx *= 0.9; S.ball.vy *= 0.9; } }
            if(S.ball.z > 50 && Math.hypot(S.ball.x - (HOOP.x+50), S.ball.y - (HOOP.y+10)) < 40 && Date.now() - S.lastScoreTs > 2000) {
                S.lastScoreTs = Date.now(); sfx.score(); flashBanner("KORB!", 1500);
                for(let i=0;i<40;i++) S.particles.push({x:HOOP.x+50, y:HOOP.y+10, vx:(Math.random()-.5)*600, vy:(Math.random()-.5)*600, life:1.5, color:['#ff3366','#00ffcc','#fcee0a'][Math.floor(Math.random()*3)], isConfetti:true});
            }
        } else if (S.ball.owner === S.myId) {
            S.ball.x = myPlayer.x + 20; S.ball.y = myPlayer.y; S.ball.z = 20;
        }

        // Solo Bots Logic
        if(S.mode === 'solo') {
            S.timeLeft -= dt;
            if(S.timeLeft <= CFG.BOSS_SEC && !S.boss) {
                S.boss = { x: 1500, y: 3000, hp: 500, active: true };
                S.swords = [{x: 1300, y: 2900, owner:null}, {x: 1700, y: 2900, owner:null}];
                sfx.bossIn(); flashBanner("ISHIN SPAWNT!", 3000);
            }
            if(S.boss && S.boss.active) {
                let dx = myPlayer.x - S.boss.x, dy = myPlayer.y - S.boss.y, d = Math.hypot(dx, dy);
                if(d > 0) { S.boss.x += (dx/d) * 120 * dt; S.boss.y += (dy/d) * 120 * dt; }
                if(d < 80 && !myPlayer.isStealth) {
                    myPlayer.x += (dx/d)*3000*dt; myPlayer.y += (dy/d)*3000*dt; // Push away
                    sfx.hit(); for(let i=0;i<10;i++) S.particles.push({x:myPlayer.x+20,y:myPlayer.y+20,vx:(Math.random()-.5)*400,vy:(Math.random()-.5)*400,life:1,color:'#ff0000'});
                }
                if(S.boss.hp <= 0) { S.boss.active = false; S.mg = {x:S.boss.x, y:S.boss.y, owner:null}; sfx.score(); flashBanner("MG GEDROPPT!", 3000); }
            }

            for(let b of S.bots) {
                b.x += b.vx*dt; b.y += b.vy*dt;
                if(hitsWall(b.x, b.y)) { b.vx*=-1; b.vy*=-1; }
                if(S.gabriId === S.myId && Math.hypot(myPlayer.x-b.x, myPlayer.y-b.y)<40 && Date.now()-S.tagCd>2000) {
                    S.gabriId = 'bot_'+b.id; S.tagCd = Date.now(); sfx.tag(); flashBanner("BOT IST GABRI!");
                } else if(S.gabriId === 'bot_'+b.id && Math.hypot(myPlayer.x-b.x, myPlayer.y-b.y)<40 && !myPlayer.isStealth && Date.now()-S.tagCd>2000) {
                    S.gabriId = S.myId; S.tagCd = Date.now(); sfx.tag(); flashBanner("DU BIST GABRI!");
                }
            }
        } else {
            // Multiplayer Tag Check
            if(S.gabriId === S.myId && Date.now() - S.tagCd > 2000) {
                for(let id in S.players) {
                    if(id === S.myId || S.players[id].isStealth) continue;
                    if(Math.hypot(myPlayer.x - S.players[id].x, myPlayer.y - S.players[id].y) < 40) {
                        S.tagCd = Date.now(); sfx.tag(); flashBanner("GETAGGT!");
                        updateDoc(doc(db, 'gabri-2026', S.roomId), { gabriId: id }).catch(()=>{}); break;
                    }
                }
            }
        }

        if(S.gabriId === S.myId) myPlayer.timeAsGabri += dt*1000;

        // Camera
        S.cam.x += ((myPlayer.x + 20 - canvas.width/2) - S.cam.x) * 10 * dt;
        S.cam.y += ((myPlayer.y + 20 - canvas.height/2) - S.cam.y) * 10 * dt;
        S.cam.x = Math.max(0, Math.min(S.cam.x, CFG.MAP_W - canvas.width));
        S.cam.y = Math.max(0, Math.min(S.cam.y, CFG.MAP_H - canvas.height));

        render(dt, now);
        requestAnimationFrame(mainLoop);
    }

    // ----------------------------------------------------------------------
    // 9. RENDER
    // ----------------------------------------------------------------------
    function render(dt, now) {
        const inOG = S.cam.y > 1500;
        ctx.fillStyle = inOG ? '#0a0a14' : '#050508'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.translate(-S.cam.x, -S.cam.y);

        // Grid
        ctx.strokeStyle = 'rgba(0,255,204,0.05)'; ctx.lineWidth = 2; const gs = 100;
        ctx.beginPath();
        for(let x=Math.floor(S.cam.x/gs)*gs; x<S.cam.x+canvas.width; x+=gs) { ctx.moveTo(x,0); ctx.lineTo(x,CFG.MAP_H); }
        for(let y=Math.floor(S.cam.y/gs)*gs; y<S.cam.y+canvas.height; y+=gs) { ctx.moveTo(0,y); ctx.lineTo(CFG.MAP_W,y); }
        ctx.stroke();

        // Stairs
        for(let s of MAP.stairs) {
            if((inOG && s.y<2000) || (!inOG && s.y>2000)) continue;
            ctx.fillStyle='#111'; ctx.fillRect(s.x, s.y, s.w, s.h); ctx.strokeStyle='#00ffcc'; ctx.lineWidth=4; ctx.strokeRect(s.x, s.y, s.w, s.h);
            ctx.fillStyle='rgba(0,255,204,0.2)'; ctx.fillRect(s.x, s.y+s.h/2-15, s.w, 30);
            ctx.fillStyle='#00ffcc'; ctx.font='16px "Press Start 2P"'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(s.lbl, s.x+s.w/2, s.y+s.h/2);
        }

        // Walls
        for(let w of MAP.walls) {
            if(w.x>S.cam.x+canvas.width || w.x+w.w<S.cam.x || w.y>S.cam.y+canvas.height || w.y+w.h<S.cam.y) continue;
            ctx.fillStyle='#0f101a'; ctx.fillRect(w.x, w.y, w.w, w.h); ctx.strokeStyle='rgba(0,255,204,0.4)'; ctx.lineWidth=2; ctx.strokeRect(w.x, w.y, w.w, w.h);
        }

        // Pallets
        for(let p of S.pallets) {
            let px = p.dir==='v'?p.x:p.x-80, py = p.dir==='v'?p.y-80:p.y, pw = p.dir==='v'?40:200, ph = p.dir==='v'?200:40;
            if(p.state===0) { ctx.fillStyle='#555'; ctx.fillRect(p.x, p.y, p.dir==='v'?20:40, p.dir==='v'?40:20); }
            else if(p.state===1) { ctx.fillStyle='rgba(255,51,102,0.6)'; ctx.fillRect(px, py, pw, ph); } // Laser Gate
        }

        // Hoop
        if(!inOG) { ctx.fillStyle='#fff'; ctx.fillRect(HOOP.x, HOOP.y-10, HOOP.w, 10); ctx.strokeStyle='#ff00ff'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(HOOP.x+50, HOOP.y+10, 30, 0, Math.PI*2); ctx.stroke(); }
        for(let l of MAP.labels) { ctx.fillStyle='rgba(0,255,204,0.2)'; ctx.font='bold 36px "Outfit"'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(l.text, l.x, l.y); }

        // Players & Bots
        let drawEntities = [{id:S.myId, x:myPlayer.x, y:myPlayer.y, isMe:true, s:myPlayer.isStealth}];
        for(let b of S.bots) drawEntities.push({id:'bot_'+b.id, x:b.x, y:b.y, isMe:false, s:false, isBot:true});
        for(let id in S.players) if(id!==S.myId) drawEntities.push({id, x:S.players[id].x, y:S.players[id].y, isMe:false, s:S.players[id].isStealth, name:S.players[id].name});

        for(let e of drawEntities) {
            if((inOG && e.y<2000) || (!inOG && e.y>2000)) continue;
            let isG = S.gabriId === e.id;
            ctx.shadowColor = isG ? '#ff3366' : 'rgba(0,0,0,0.5)'; ctx.shadowBlur = isG ? 20 : 10;
            ctx.globalAlpha = e.s ? 0.3 : 1.0;
            let spr = isG ? SPR.gabri[Math.floor(now/150)%2] : (e.isBot ? SPR.zomb[Math.floor(now/150)%2] : SPR.norm[Math.floor(now/150)%2]);
            ctx.drawImage(spr, e.x, e.y, CFG.P_SIZE, CFG.P_SIZE); ctx.shadowBlur=0; ctx.globalAlpha=1.0;
            
            if(!e.s && e.name) {
                ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(e.x-10, e.y-24, 60, 18);
                ctx.fillStyle = isG ? '#ff99aa' : '#00ffcc'; ctx.font='bold 12px "Outfit"'; ctx.textAlign='center'; ctx.fillText(e.name, e.x+20, e.y-10);
            }
        }

        // Ball
        if(S.ball.active && !S.ball.owner && ((inOG && S.ball.y>2000) || (!inOG && S.ball.y<2000))) {
            ctx.fillStyle='#ff00ff'; ctx.beginPath(); ctx.arc(S.ball.x, S.ball.y-S.ball.z, 12, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.stroke();
        }

        // Boss
        if(S.boss && S.boss.active && inOG) {
            ctx.drawImage(SPR.boss[Math.floor(now/250)%2], S.boss.x, S.boss.y, 100, 100);
            ctx.fillStyle='#333'; ctx.fillRect(S.boss.x, S.boss.y-15, 100, 10); ctx.fillStyle='#ff3366'; ctx.fillRect(S.boss.x, S.boss.y-15, 100*(S.boss.hp/500), 10);
            ctx.fillStyle='#fff'; ctx.font='bold 14px "Outfit"'; ctx.textAlign='center'; ctx.fillText("ISHIN", S.boss.x+50, S.boss.y-25);
        }

        // Particles
        for(let i=S.particles.length-1; i>=0; i--) {
            let p=S.particles[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; if(p.isConfetti) p.vy+=600*dt;
            if(p.life<=0) { S.particles.splice(i,1); continue; }
            ctx.fillStyle=p.color; ctx.globalAlpha=p.life; ctx.fillRect(p.x, p.y, 6, 6); ctx.globalAlpha=1.0;
        }

        // Flashlight (Last 30s)
        if(S.timeLeft > 0 && S.timeLeft <= 30) {
            ctx.fillStyle = `rgba(2,2,5,${Math.random()<0.05 ? 0.8 : 0.98})`; ctx.fillRect(S.cam.x, S.cam.y, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'destination-out';
            let r = ctx.createRadialGradient(myPlayer.x+20, myPlayer.y+20, 10, myPlayer.x+20, myPlayer.y+20, 200+Math.random()*10);
            r.addColorStop(0, 'rgba(255,255,255,1)'); r.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle=r; ctx.beginPath(); ctx.arc(myPlayer.x+20, myPlayer.y+20, 250, 0, Math.PI*2); ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
        }

        ctx.restore();

        // UI HUD
        document.getElementById('timerDisplay').innerText = `${Math.floor(S.timeLeft/60).toString().padStart(2,'0')}:${Math.floor(S.timeLeft%60).toString().padStart(2,'0')}`;
        document.getElementById('timeAsGabriDisplay').innerText = `ZEIT: ${(myPlayer.timeAsGabri/1000).toFixed(1)}s`;
        if(S.gabriId === S.myId) { document.getElementById('statusCard').classList.add('danger'); document.getElementById('roleDisplay').innerText = "DU BIST GABRI!"; }
        else { document.getElementById('statusCard').classList.remove('danger'); document.getElementById('roleDisplay').innerText = "LAUF!"; }
        document.getElementById('floorDisplay').innerText = inOG ? "OBERGESCHOSS (OG)" : "ERDGESCHOSS (EG)";

        // Mobile Controls Draw
        ctx.save();
        ctx.beginPath(); ctx.arc(IN.joy.bx, IN.joy.by, IN.joy.r, 0, Math.PI*2); ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=2; ctx.stroke();
        ctx.beginPath(); ctx.arc(IN.joy.nx, IN.joy.ny, 20, 0, Math.PI*2); ctx.fillStyle='rgba(0,255,204,0.5)'; ctx.fill();
        const drawBtn = (b, l, c) => { ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fillStyle=b.a?c:'rgba(0,0,0,0.5)'; ctx.fill(); ctx.strokeStyle=c; ctx.stroke(); ctx.fillStyle='#fff'; ctx.font='bold 16px "Outfit"'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(l, b.x, b.y); };
        drawBtn(IN.bA, "A", 'rgba(255,51,102,0.8)'); drawBtn(IN.bB, "B", 'rgba(0,255,204,0.8)'); drawBtn(IN.bC, "C", 'rgba(255,204,0,0.8)');
        ctx.restore();

        if(S.timeLeft <= 0) {
            S.running = false; document.body.classList.remove('game-running'); showScreen('over');
            document.getElementById('overText').innerHTML = `> GABRI: ${S.gabriId===S.myId ? S.myName : "JEMAND"}<br>> ZEIT: ${(myPlayer.timeAsGabri/1000).toFixed(1)}s`;
        }
    }
</script>
</body>
</html>
