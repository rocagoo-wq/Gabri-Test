<html lang="de">
<head>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        :root {
            --primary: #00ffcc;
            --gabri: #ff3366;
            --glass-bg: rgba(15, 15, 20, 0.85);
            --glass-border: rgba(0, 255, 204, 0.2);
        }

        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            -webkit-touch-callout: none; 
            font-family: 'Outfit', sans-serif; 
            touch-action: none; 
        }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #0d0d12; 
            overflow: hidden; 
            position: fixed; 
            overscroll-behavior: none; 
        }

        /* ------------------------------------------- */
        /* CRT Scanline & Vignette Effect              */
        /* ------------------------------------------- */
        .crt-overlay {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; 
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
            z-index: 100; 
            pointer-events: none; 
            opacity: 0.5; 
            mix-blend-mode: overlay;
        }

        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
            opacity: 0; 
            transition: opacity 0.8s ease-in; 
            image-rendering: pixelated; 
        }
        
        .game-running canvas { 
            opacity: 1; 
        }

        /* ------------------------------------------- */
        /* UI Panels & Modals                          */
        /* ------------------------------------------- */
        .glass-panel {
            background: var(--glass-bg); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0,255,204,0.05); 
            border-radius: 16px;
        }

        /* .io Style Login Screen */
        #login-screen {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a24 0%, #050508 100%);
            z-index: 50; 
            transition: opacity 0.5s ease;
        }
        
        .login-box {
            background: rgba(15, 15, 20, 0.9); 
            border: 2px solid rgba(0, 255, 204, 0.3);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(0,255,204,0.05);
            padding: 40px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 480px;
            display: flex; 
            flex-direction: column; 
            gap: 20px;
        }

        h1 { 
            font-family: 'Press Start 2P', cursive; 
            text-align: center; 
            color: white; 
            text-shadow: 0 4px 15px var(--primary); 
            font-size: 32px; 
            margin: 0; 
            line-height: 1.4; 
        }
        
        .input-io {
            width: 100%; 
            background: rgba(0,0,0,0.8); 
            border: 2px solid rgba(255,255,255,0.1);
            color: var(--primary); 
            padding: 18px; 
            border-radius: 12px; 
            font-size: 20px; 
            font-weight: 800;
            text-align: center; 
            outline: none; 
            transition: all 0.3s;
        }

        .input-io:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 25px rgba(0,255,204,0.4); 
            transform: scale(1.02); 
        }

        select.input-io { 
            appearance: none; 
            cursor: pointer; 
            color: white; 
        }

        .btn-play {
            width: 100%; 
            background: linear-gradient(135deg, #00ffcc 0%, #00997a 100%);
            color: #000; 
            font-weight: 800; 
            font-size: 22px; 
            padding: 20px; 
            border-radius: 12px;
            border: none; 
            cursor: pointer; 
            transition: all 0.2s; 
            text-transform: uppercase; 
            box-shadow: 0 6px 20px rgba(0, 255, 204, 0.4);
        }

        .btn-play:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 8px 30px rgba(0, 255, 204, 0.6); 
        }

        .btn-play:active { 
            transform: scale(0.95); 
        }

        .btn-play:disabled { 
            opacity: 0.5; 
            filter: grayscale(1); 
            cursor: not-allowed; 
            transform: none; 
        }

        /* ------------------------------------------- */
        /* Game HUD                                    */
        /* ------------------------------------------- */
        #game-hud {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 10;
            display: none; 
            padding: 20px;
        }

        .hud-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            width: 100%; 
            pointer-events: auto; 
        }
        
        .leaderboard-box {
            background: rgba(0,0,0,0.8); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; 
            padding: 15px; 
            width: 250px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .leaderboard-title { 
            color: var(--primary); 
            font-size: 14px; 
            font-weight: bold; 
            margin-bottom: 10px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: 5px; 
        }

        .lb-row { 
            display: flex; 
            justify-content: space-between; 
            color: white; 
            font-size: 14px; 
            margin-bottom: 8px; 
            font-weight: 600;
        }
        
        .status-box {
            background: rgba(0,0,0,0.8); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; 
            padding: 20px; 
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .timer { 
            font-family: 'Press Start 2P', cursive; 
            font-size: 26px; 
            color: var(--primary); 
            margin-bottom: 5px; 
            text-shadow: 0 0 10px var(--primary); 
        }

        .room-name { 
            color: #888; 
            font-size: 12px; 
            font-weight: bold; 
            margin-top: 5px;
        }

        .btn-start-round {
            background: var(--primary); 
            color: black; 
            border: none; 
            padding: 12px 20px; 
            font-weight: bold; 
            border-radius: 8px; 
            margin-top: 15px; 
            cursor: pointer; 
            width: 100%;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-start-round:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        .is-gabri-alert { 
            animation: pulse-gabri 0.8s infinite alternate; 
            border-color: var(--gabri) !important; 
        }
        
        @keyframes pulse-gabri { 
            from { box-shadow: 0 0 10px rgba(255,51,102,0.3); } 
            to { box-shadow: 0 0 30px rgba(255,51,102,0.8), inset 0 0 15px rgba(255,51,102,0.4); } 
        }

        #floorDisplay {
            position: absolute; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(10,10,15,0.95); 
            border: 2px solid var(--primary); 
            color: var(--primary);
            padding: 12px 24px; 
            border-radius: 30px; 
            font-family: 'Press Start 2P', cursive; 
            font-size: 12px; 
            text-shadow: 0 0 8px var(--primary); 
            box-shadow: 0 0 20px rgba(0,255,204,0.4); 
            pointer-events: none;
        }

        /* ------------------------------------------- */
        /* Post-Game Leaderboard Screen                */
        /* ------------------------------------------- */
        #screen-leaderboard {
            position: absolute;

            display: none;

        .leaderboard-container {
            background: rgba(15, 15, 20, 0.95);
            border: 2px solid rgba(255, 51, 102, 0.3);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            width: 100%;

        .rank-row {
            display: flex;

            margin-bottom: 10px;

            font-weight: 600; 
            color: white; 
            font-size: 16px;
        }
        
        .rank-loser { 
            background: rgba(255, 51, 102, 0.2); 
            border: 1px solid var(--gabri); 
            color: #ff99aa;
        }
        
        .rank-winner { 
            background: rgba(0, 255, 204, 0.1); 
            border: 1px solid var(--primary); 
            color: var(--primary);
        }
        
        ::-webkit-scrollbar { width: 8px; } 
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; } 
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
    </style>
</head>

        // ----------------------------------------------------------------------
        // 2. AUDIO SYNTHESIS ENGINE (8-Bit Sound System)
        // ----------------------------------------------------------------------
        class AudioSystem {
            constructor() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.masterGain = this.ctx.createGain(); 
                this.masterGain.gain.value = 0.3; 
                this.masterGain.connect(this.ctx.destination);
                this.enabled = false;
            }
            
            enable() { 
                if(this.ctx.state === 'suspended') {
                    this.ctx.resume(); 
                }
                this.enabled = true; 
            }
            
            playTone(freq, type, duration, vol=1, slideFreq=null) {
                if(!this.enabled) return;
                const osc = this.ctx.createOscillator(); 
                const gain = this.ctx.createGain();
                
                osc.type = type; 
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                
                if(slideFreq) {
                    osc.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + duration);
                }
                
                gain.gain.setValueAtTime(vol, this.ctx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                
                osc.connect(gain); 
                gain.connect(this.masterGain); 
                osc.start(); 
                osc.stop(this.ctx.currentTime + duration);
            }
            
            playNoise(duration, vol=1) {
                if(!this.enabled) return;
                const bufferSize = this.ctx.sampleRate * duration; 
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0); 
                
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                const noise = this.ctx.createBufferSource(); 
                noise.buffer = buffer;
                
                const filter = this.ctx.createBiquadFilter(); 
                filter.type = 'lowpass'; 
                filter.frequency.value = 1000;
                
                const gain = this.ctx.createGain(); 
                gain.gain.setValueAtTime(vol, this.ctx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                
                noise.connect(filter); 
                filter.connect(gain); 
                gain.connect(this.masterGain); 
                noise.start();
            }
            
            sfxDash() { this.playTone(300, 'sine', 0.2, 0.5, 100); this.playNoise(0.2, 0.3); }
            sfxTag() { this.playTone(400, 'square', 0.1, 0.8, 800); setTimeout(()=>this.playTone(600, 'square', 0.2, 0.8, 1200), 100); }
            sfxLaser() { this.playTone(800, 'sawtooth', 0.15, 0.5, 200); }
            sfxSword() { this.playNoise(0.1, 0.6); this.playTone(800, 'sine', 0.1, 0.3, 200); }
            sfxBounce() { this.playTone(150, 'sine', 0.1, 0.5, 50); }
            sfxScore() {

                setTimeout(()=>this.playTone(659.25, 'square', 0.1, 0.5), 100); 
                setTimeout(()=>this.playTone(783.99, 'square', 0.3, 0.5), 200); 
            }
            sfxCheer() { 
                for(let i=0; i<5; i++) {
                    setTimeout(()=>this.playNoise(0.4, 0.4), i*100);
                }
            }
        }

                this.buildRoom(1500, 2100, 1400, 800, 'left', 300, 200, 'PHYSIK (OG)');
                this.buildRoom(100, 3200, 1000, 700, 'top', 400, 200, 'LEHRERZIMMER (OG)');
                this.buildRoom(1500, 3200, 1400, 700, 'top', 500, 200, 'BIBLIOTHEK (OG)');
                
                // Treppen
                stairs.push({ x: 1225, y: 400, w: 150, h: 150, targetY: 2400, label: 'ZUM OG' });
                stairs.push({ x: 1225, y: 2400, w: 150, h: 150, targetY: 400, label: 'ZUM EG' });
                stairs.push({ x: 1225, y: 1500, w: 150, h: 150, targetY: 3500, label: 'ZUM OG' });
                stairs.push({ x: 1225, y: 3500, w: 150, h: 150, targetY: 1500, label: 'ZUM EG' });

                this.spawnNPCs();
            }
            
            static buildBorders() {
                obstacles.push({x: -50, y: -50, w: MAP_WIDTH+100, h: 50, isWall: true});
                obstacles.push({x: -50, y: -50, w: 50, h: 2000+100, isWall: true});
                obstacles.push({x: MAP_WIDTH, y: -50, w: 50, h: 2000+100, isWall: true});
                obstacles.push({x: -50, y: 1980, w: MAP_WIDTH+100, h: 40, isWall: true}); 
                obstacles.push({x: -50, y: MAP_HEIGHT, w: MAP_WIDTH+100, h: 50, isWall: true});
                obstacles.push({x: -50, y: 2000, w: 50, h: 2000+100, isWall: true});
                obstacles.push({x: MAP_WIDTH, y: 2000, w: 50, h: 2000+100, isWall: true});
            }
            
            static buildRoom(rx, ry, rw, rh, doorEdge, doorOffset, doorWidth, labelText, isEmptyRoom=false) {
                const wall = 20; 
                
                if (doorEdge === 'top') { 
                    obstacles.push({x: rx, y: ry, w: doorOffset, h: wall, isWall: true}); 
                    obstacles.push({x: rx + doorOffset + doorWidth, y: ry, w: rw - doorOffset - doorWidth, h: wall, isWall: true}); 
                } else { 
                    obstacles.push({x: rx, y: ry, w: rw, h: wall, isWall: true}); 
                }
                
                if (doorEdge === 'bottom') { 
                    obstacles.push({x: rx, y: ry + rh - wall, w: doorOffset, h: wall, isWall: true}); 
                    obstacles.push({x: rx + doorOffset + doorWidth, y: ry + rh - wall, w: rw - doorOffset - doorWidth, h: wall, isWall: true}); 
                } else { 
                    obstacles.push({x: rx, y: ry + rh - wall, w: rw, h: wall, isWall: true}); 
                }
                
                if (doorEdge === 'left') { 
                    obstacles.push({x: rx, y: ry, w: wall, h: doorOffset, isWall: true}); 
                    obstacles.push({x: rx, y: ry + doorOffset + doorWidth, w: wall, h: rh - doorOffset - doorWidth, isWall: true}); 
                } else { 
                    obstacles.push({x: rx, y: ry, w: wall, h: rh, isWall: true}); 
                }
                
                if (doorEdge === 'right') { 
                    obstacles.push({x: rx + rw - wall, y: ry, w: wall, h: doorOffset, isWall: true}); 
                    obstacles.push({x: rx + rw - wall, y: ry + doorOffset + doorWidth, w: wall, h: rh - doorOffset - doorWidth, isWall: true}); 
                } else { 
                    obstacles.push({x: rx + rw - wall, y: ry, w: wall, h: rh, isWall: true}); 
                }

                if (labelText) {
                    labels.push({x: rx + rw/2, y: ry + rh/2, text: labelText});
                }

                // Tische & Stühle generieren
                if (!isEmptyRoom) {
                    let cols = Math.floor((rw - wall*2) / 220); 
                    let rows = Math.floor((rh - wall*2) / 220);
                    let padX = (rw - wall*2 - (cols * 220)) / 2; 
                    let padY = (rh - wall*2 - (rows * 220)) / 2;
                    
                    for (let r=0; r<rows; r++) {
                        for (let c=0; c<cols; c++) {
                            let tx = rx + wall + padX + c*220 + 70; 
                            let ty = ry + wall + padY + r*220 + 70;
                            
                            obstacles.push({x: tx, y: ty, w: 80, h: 40, isTable: true});
                            obstacles.push({x: tx + 10, y: ty - 25, w: 20, h: 20, isChair: true, dir: 'up'});
                            obstacles.push({x: tx + 50, y: ty - 25, w: 20, h: 20, isChair: true, dir: 'up'});
                            obstacles.push({x: tx + 10, y: ty + 45, w: 20, h: 20, isChair: true, dir: 'down'});
                            obstacles.push({x: tx + 50, y: ty + 45, w: 20, h: 20, isChair: true, dir: 'down'});
                            
                            // Energy Drink Spawns
                            if (c % 3 === 0 && r % 2 === 0) {
                                spawnDrinks.push({ id: 'ed_'+tx+'_'+ty, x: tx+30, y: ty+10 });
                            }
                        }
                    }
                }
            }
            
            static spawnNPCs() {
                // Deterministischer Zufallsgenerator
                function mulberry32(a) { 
                    return function() { 
                        var t = a += 0x6D2B79F5; 
                        t = Math.imul(t ^ t >>> 15, t | 1); 
                        t ^= t + Math.imul(t ^ t >>> 7, t | 61); 
                        return ((t ^ t >>> 14) >>> 0) / 4294967296; 
                    } 
                }
                const prng = mulberry32(12345); 

                for (let i = 0; i < 100; i++) {
                    let type, sx, sy, mx, my, spd;
                    if (i < 5) { 
                        type = 'teacher'; 
                        sx = 1250 + prng() * 150; 
                        sy = 200 + prng() * 1600;
                        mx = 0; 
                        my = (prng() > 0.5 ? 1 : -1); 
                        spd = 100 + prng() * 50;
                    } else if (i < 15) { 
                        type = 'cheerleader'; 
                        sx = 1600 + prng() * 1200; 
                        sy = 1300 + prng() * 500;
                        mx = 0; 
                        my = 0; 
                        spd = 0;
                    } else { 
                        type = 'student'; 
                        let inOG = prng() > 0.5; 
                        sx = 1150 + prng() * 200; 
                        sy = (inOG ? 2100 : 100) + prng() * 1700;
                        mx = 0; 
                        my = (prng() > 0.5 ? 1 : -1); 
                        spd = 80 + prng() * 40;
                    }
                    npcs.push({ 
                        id: i, 
                        startX: sx, 
                        startY: sy, 
                        dirX: mx, 
                        dirY: my, 
                        speed: spd, 
                        type: type, 
                        currentX: sx, 
                        currentY: sy 
                    });
                }
            }
        }
        MapGenerator.init();

        // ----------------------------------------------------------------------
        // 5. GRAPHICS & SPRITES GENERATOR
        // ----------------------------------------------------------------------
        function createPixelSprite(type, frame=0) {
            const sc = document.createElement('canvas'); 
            sc.width = 12; 
            sc.height = 12; 
            const ctx = sc.getContext('2d');
            
            let skin = '#ffcba4', shirt = '#00ffcc', pants = '#1a1a24', hair = '#1a1a24';

            if (type === 'gabri') { skin = '#ff99aa'; shirt = '#ff3366'; }
            else if (type === 'teacher') { skin = '#eebb99'; shirt = '#555555'; hair = '#cccccc'; }
            else if (type === 'boss') { skin = '#ff4444'; shirt = '#220000'; pants = '#110000'; hair = '#ffaa00'; }
            else if (type === 'cheerleader') { skin = '#ffcba4'; shirt = '#ff66b2'; pants = '#ffffff'; hair = '#ffee66'; }
            else if (type === 'student') { shirt = '#3366ff'; pants = '#444444'; hair = '#5c3a21'; } 
            else if (type === 'zombie') { skin = '#4caf50'; shirt = '#673ab7'; pants = '#3e2723'; hair = '#1b5e20'; } 

            let layout = [
                [0,0,0,0,6,6,6,6,0,0,0,0], 
                [0,0,0,6,2,2,2,2,6,0,0,0], 
                [0,0,6,2,0,2,2,0,2,6,0,0],
                [0,0,6,2,2,2,2,2,2,6,0,0], 
                [0,0,0,6,2,2,2,2,6,0,0,0], 
                [0,0,3,3,3,3,3,3,3,3,0,0],
                [0,3,3,3,3,3,3,3,3,3,3,0], 
                [0,3,3,3,3,3,3,3,3,3,3,0], 
                [0,3,0,4,4,4,4,4,4,0,3,0],
                [0,0,0,4,4,0,0,4,4,0,0,0], 
                [0,0,5,5,0,0,0,0,5,5,0,0]
            ];

            // Cheerleader Pom-Poms
            if (type === 'cheerleader') { 
                layout[5][0] = 3; layout[5][11] = 3; layout[6][0] = 3; layout[6][11] = 3; 
            }

            // Animation (Beine verschieben)
            if (frame === 1) { 
                layout[9] = [0,0,0,4,4,0,0,0,0,0,0,0]; 
                layout[10]= [0,0,5,5,0,0,0,4,4,0,0,0]; 
            }

            // Zeichnen
            for(let y=0; y<11; y++) {
                for(let x=0; x<12; x++) {
                    let p = layout[y][x];
                    if(p!==0){
                        switch(p){
                            case 6: ctx.fillStyle = hair; break; 
                            case 1: case 4: ctx.fillStyle = pants; break; 
                            case 2: ctx.fillStyle = skin; break; 
                            case 3: ctx.fillStyle = shirt; break; 
                            case 5: ctx.fillStyle = '#111'; break;
                        }
                        ctx.fillRect(x, y, 1, 1);
                    }
                }
            }
            return sc;
        }
        
        const texNormal = [createPixelSprite('normal', 0), createPixelSprite('normal', 1)];
        const texGabri = [createPixelSprite('gabri', 0), createPixelSprite('gabri', 1)];
        const texTeacher = [createPixelSprite('teacher', 0), createPixelSprite('teacher', 1)];
        const texStudent = [createPixelSprite('student', 0), createPixelSprite('student', 1)];
        const texCheer = [createPixelSprite('cheerleader', 0), createPixelSprite('cheerleader', 1)];
        const texBoss = [createPixelSprite('boss', 0), createPixelSprite('boss', 1)];
        const texZombie = [createPixelSprite('zombie', 0), createPixelSprite('zombie', 1)];

        // ----------------------------------------------------------------------
        // 6. INPUT CONTROLLER (Touch & Keyboard)
        // ----------------------------------------------------------------------
        const Input = {
            joyBase: { x: 120, y: window.innerHeight - 120, r: 70 },
            btnA: { x: window.innerWidth - 90, y: window.innerHeight - 90, r: 45, active: false },
            btnB: { x: window.innerWidth - 180, y: window.innerHeight - 140, r: 45, active: false },
            btnC: { x: window.innerWidth - 100, y: window.innerHeight - 200, r: 35, active: false },
            
            joystick: { active: false, id: null, nx: 120, ny: window.innerHeight - 120, dx: 0, dy: 0 },
            keys: { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false },
            
            init() {
                // Resize Observer für mobile Bildschirme
                window.addEventListener('resize', () => { 
                    canvas.width = window.innerWidth; 
                    canvas.height = window.innerHeight; 
                    
                    this.joyBase = { x: 120, y: window.innerHeight - 120, r: 70 };
                    this.btnA = { x: window.innerWidth - 90, y: window.innerHeight - 90, r: 45, active: false };
                    this.btnB = { x: window.innerWidth - 180, y: window.innerHeight - 140, r: 45, active: false };
                    this.btnC = { x: window.innerWidth - 100, y: window.innerHeight - 200, r: 35, active: false };
                });
                
                window.addEventListener('keydown', (e) => {
                    if(!isGameRunning) return;
                    let key = e.key.toLowerCase();
                    if (this.keys.hasOwnProperty(key)) this.keys[key] = true;
                    
                    if (key === ' ' || key === 'spacebar') { 
                        if(!this.btnA.active) Actions.doA(); 
                        this.btnA.active = true; 
                    }
                    if (key === 'shift') { 
                        if(!this.btnB.active) Actions.doB(); 
                        this.btnB.active = true; 
                    }
                    if (key === 'c' || key === 'y' || key === 'q') { 
                        if(!this.btnC.active) Actions.doC(); 
                        this.btnC.active = true; 
                    }
                });
                
                window.addEventListener('keyup', (e) => {
                    let key = e.key.toLowerCase();
                    if (this.keys.hasOwnProperty(key)) this.keys[key] = false;
                    
                    if (key === ' ' || key === 'spacebar') this.btnA.active = false;
                    if (key === 'shift') this.btnB.active = false;
                    if (key === 'c' || key === 'y' || key === 'q') this.btnC.active = false;
                });

                // Touch Implementation
                canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault(); 
                    if(!isGameRunning) return;
                    
                    for(let t of e.changedTouches) {
                        if (Math.hypot(t.clientX - this.joyBase.x, t.clientY - this.joyBase.y) < this.joyBase.r * 2.5 && !this.joystick.active) {
                            this.joystick.active = true; 
                            this.joystick.id = t.identifier; 
                            this.joystick.nx = t.clientX; 
                            this.joystick.ny = t.clientY; 
                            this.clampJoy();
                        } else if (Math.hypot(t.clientX - this.btnA.x, t.clientY - this.btnA.y) < this.btnA.r * 1.5) { 
                            this.btnA.active = true; 
                            Actions.doA(); 
                        } else if (Math.hypot(t.clientX - this.btnB.x, t.clientY - this.btnB.y) < this.btnB.r * 1.5) { 
                            this.btnB.active = true; 
                            Actions.doB(); 
                        } else if (Math.hypot(t.clientX - this.btnC.x, t.clientY - this.btnC.y) < this.btnC.r * 1.5) { 
                            this.btnC.active = true; 
                            Actions.doC(); 
                        }
                    }
                }, {passive: false});

                canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault(); 
                    if(!isGameRunning) return;
                    
                    for(let t of e.changedTouches) {
                        if(t.identifier === this.joystick.id) { 
                            this.joystick.nx = t.clientX; 
                            this.joystick.ny = t.clientY; 
                            this.clampJoy(); 
                        }
                    }
                }, {passive: false});

                const endTouch = (e) => {
                    e.preventDefault();
                    for(let t of e.changedTouches) {
                        if(t.identifier === this.joystick.id) { 
                            this.joystick.active = false; 
                            this.joystick.id = null; 
                            this.joystick.nx = this.joyBase.x; 
                            this.joystick.ny = this.joyBase.y; 
                            this.joystick.dx = 0; 
                            this.joystick.dy = 0; 
                        }
                        if (Math.hypot(t.clientX - this.btnA.x, t.clientY - this.btnA.y) < this.btnA.r * 2) this.btnA.active = false;
                        if (Math.hypot(t.clientX - this.btnB.x, t.clientY - this.btnB.y) < this.btnB.r * 2) this.btnB.active = false;
                        if (Math.hypot(t.clientX - this.btnC.x, t.clientY - this.btnC.y) < this.btnC.r * 2) this.btnC.active = false;
                    }
                };
                
                canvas.addEventListener('touchend', endTouch, {passive: false}); 
                canvas.addEventListener('touchcancel', endTouch, {passive: false});
            },
            
            clampJoy() {
                const dist = Math.hypot(this.joystick.nx - this.joyBase.x, this.joystick.ny - this.joyBase.y);
                if (dist > this.joyBase.r) { 
                    const angle = Math.atan2(this.joystick.ny - this.joyBase.y, this.joystick.nx - this.joyBase.x); 
                    this.joystick.nx = this.joyBase.x + Math.cos(angle) * this.joyBase.r; 
                    this.joystick.ny = this.joyBase.y + Math.sin(angle) * this.joyBase.r; 
                }
                
                if (dist > 10) { 
                    this.joystick.dx = (this.joystick.nx - this.joyBase.x) / this.joyBase.r; 
                    this.joystick.dy = (this.joystick.ny - this.joyBase.y) / this.joyBase.r; 
                } else { 
                    this.joystick.dx = 0; 
                    this.joystick.dy = 0; 
                }
            },
            
            getVector() {
                let kx = 0; let ky = 0;
                if (this.keys.w || this.keys.arrowup) ky -= 1; 
                if (this.keys.s || this.keys.arrowdown) ky += 1;
                if (this.keys.a || this.keys.arrowleft) kx -= 1; 
                if (this.keys.d || this.keys.arrowright) kx += 1;
                
                if (kx !== 0 && ky !== 0) { 
                    const len = Math.hypot(kx, ky); 
                    kx /= len; 
                    ky /= len; 
                }
                return { 
                    dx: this.joystick.active ? this.joystick.dx : kx, 
                    dy: this.joystick.active ? this.joystick.dy : ky 
                };
            }
        };
        
        // Init the Input System
        Input.init();

        // ----------------------------------------------------------------------
        // 7. PHYSICS & ACTIONS MODULE
        // ----------------------------------------------------------------------
        const Physics = {
            checkWall(nx, ny) {
                // Out of Bounds
                if (nx < 0 || ny < 0 || nx + PLAYER_SIZE > MAP_WIDTH || ny + PLAYER_SIZE > MAP_HEIGHT) return true;
                
                // Static Obstacles
                for (let obs of obstacles) {
                    if (nx < obs.x + obs.w && nx + PLAYER_SIZE > obs.x && ny < obs.y + obs.h && ny + PLAYER_SIZE > obs.y) return true;
                }
                
                // Dropped Pallets
                for (let p of mapPallets) {
                    if (gameState['pallet_'+p.id] === 1) {
                        if (nx < p.dropRect.x + p.dropRect.w && nx + PLAYER_SIZE > p.dropRect.x && ny < p.dropRect.y + p.dropRect.h && ny + PLAYER_SIZE > p.dropRect.y) return true;
                    }
                }
                
                // Living NPCs (Avoid walking through them)
                for (let npc of npcs) {
                    if (gameState.dead_npcs && gameState.dead_npcs[npc.id]) continue;
                    if (nx < npc.currentX + PLAYER_SIZE && nx + PLAYER_SIZE > npc.currentX && ny < npc.currentY + PLAYER_SIZE && ny + PLAYER_SIZE > npc.currentY) return true;
                }
                return false;
            },
            
            spawnParticles(x, y, color, count=15) { 
                for(let i=0; i<count; i++) {
                    particles.push({ 
                        x: x, 
                        y: y, 
                        vx: (Math.random() - 0.5) * 400, 
                        vy: (Math.random() - 0.5) * 400, 
                        life: 1.0, 
                        color: color 
                    }); 
                }
            },
            
            spawnConfetti(cx, cy) {
                const colors = ['#ff3366', '#00ffcc', '#ffcc00', '#3366ff'];
                for(let i=0; i<60; i++) {
                    particles.push({ 
                        x: cx, 
                        y: cy, 
                        vx: (Math.random() - 0.5) * 800, 
                        vy: (Math.random() - 1.0) * 800, 
                        life: 1.5, 
                        color: colors[Math.floor(Math.random() * colors.length)], 
                        isConfetti: true 
                    });
                }
            }
        };

        const Actions = {
            doA() {
                if (!currentRoom) return;
                
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoom);
                const myRef = doc(db, 'artifacts', appId, 'public', 'data', 'players', currentUser.uid);
                
                const cx = myLocalPlayer.x + PLAYER_SIZE/2; 
                const cy = myLocalPlayer.y + PLAYER_SIZE/2;
                
                const isGabri = (localCurrentGabri === currentUser.uid); 
                const now = Date.now();
                
                // PRIO 1: PALLETS (DbD Style)
                let nearestPallet = null; 
                let minDistP = 120;
                
                for (let p of mapPallets) {
                    let pcx = p.dropRect.x + p.dropRect.w/2; 
                    let pcy = p.dropRect.y + p.dropRect.h/2;
                    let d = Math.hypot(cx - pcx, cy - pcy); 
                    if (d < minDistP) { minDistP = d; nearestPallet = p; }
                }

                if (nearestPallet) {
                    const pState = gameState['pallet_'+nearestPallet.id] || 0;
                    
                    if (pState === 0) {
                        let up = {}; 
                        up['pallet_'+nearestPallet.id] = 1; 
                        updateDoc(roomRef, up).catch(()=>{});
                        Physics.spawnParticles(nearestPallet.dropRect.x + nearestPallet.dropRect.w/2, nearestPallet.dropRect.y + nearestPallet.dropRect.h/2, '#8b5a2b');
                        sfx.playNoise(0.2, 0.7); 
                        return; 
                        
                    } else if (pState === 1) {
                        const moveVec = Input.getVector();
                        
                        // Zerstören oder Vaulting
                        if (isGabri || (Math.abs(moveVec.dx) < 0.1 && Math.abs(moveVec.dy) < 0.1)) {
                            // Zerstören
                            let up = {}; 
                            up['pallet_'+nearestPallet.id] = 2; 
                            updateDoc(roomRef, up).catch(()=>{});
                            Physics.spawnParticles(nearestPallet.dropRect.x + nearestPallet.dropRect.w/2, nearestPallet.dropRect.y + nearestPallet.dropRect.h/2, '#ffcc00');
                            sfx.playNoise(0.3, 0.9); 
                            return;
                        } else {
                            // Vaulting (Darüber springen)
                            const isVert = nearestPallet.dir === 'v';
                            if (isVert) { 
                                if (myLocalPlayer.x < nearestPallet.dropRect.x) {
                                    myLocalPlayer.x = nearestPallet.dropRect.x + nearestPallet.dropRect.w + 10; 
                                } else {
                                    myLocalPlayer.x = nearestPallet.dropRect.x - PLAYER_SIZE - 10; 
                                }
                            } else { 
                                if (myLocalPlayer.y < nearestPallet.dropRect.y) {
                                    myLocalPlayer.y = nearestPallet.dropRect.y + nearestPallet.dropRect.h + 10; 
                                } else {
                                    myLocalPlayer.y = nearestPallet.dropRect.y - PLAYER_SIZE - 10; 
                                }
                            }
                            Physics.spawnParticles(cx, cy, '#00ffcc'); 
                            sfx.sfxDash(); 
                            return;
                        }
                    }
                }

                // PRIO 2: ITEMS BENUTZEN
                if (myHeldItem === 'ball') {
                    myHeldItem = null; 
                    sfx.playTone(300, 'sine', 0.1);
                    
                    updateDoc(roomRef, { 
                        'ball_owner': null, 
                        'ball_x': cx, 
                        'ball_y': cy, 
                        'ball_vx': myFacing.x * 1200, 
                        'ball_vy': myFacing.y * 1200, 
                        'ball_ts': now 
                    }).catch(()=>{});
                    return;
                    
                } else if (myHeldItem === 'mg') {
                    if (now - lastMgShot < 150) return; 
                    
                    lastMgShot = now; 
                    sfx.sfxLaser();
                    
                    let hitTarget = null; 
                    let lx = cx; 
                    let ly = cy;
                    
                    // Hitscan Raycast
                    for(let i=0; i<20; i++) {
                        lx += myFacing.x * 40; 
                        ly += myFacing.y * 40;
                        
                        if (Physics.checkWall(lx, ly)) break; 
                        
                        // Boss Check
                        if (gameState.boss_active && gameState.boss_hp > 0 && cy > 2000) {
                            if (Math.hypot(lx - (gameState.boss_x+60), ly - (gameState.boss_y+60)) < 70) { 
                                hitTarget = 'boss'; break; 
                            }
                        }
                        
                        // NPC Check
                        for(let npc of npcs) {
                            if (gameState.dead_npcs && gameState.dead_npcs[npc.id]) continue;
                            let sameFloor = (cy > 2000 && npc.currentY > 2000) || (cy < 2000 && npc.currentY < 2000);
                            if (sameFloor && Math.hypot(lx - (npc.currentX+20), ly - (npc.currentY+20)) < 30) { 
                                hitTarget = 'npc_' + npc.id; break; 
                            }
                        }
                        
                        // Player Check
                        for(let id in serverPlayers) {
                            if (id === currentUser.uid) continue; 
                            let p = serverPlayers[id];
                            let sameFloor = (cy > 2000 && p.y > 2000) || (cy < 2000 && p.y < 2000);
                            if (sameFloor && Math.hypot(lx - (p.x+20), ly - (p.y+20)) < 30) { 
                                hitTarget = id; break; 
                            }
                        }
                        
                        if (hitTarget) break;
                    }

                    let updates = { last_laser: { x1: cx, y1: cy, x2: lx, y2: ly, ts: now } };
                    
                    if (hitTarget) {
                        if (hitTarget === 'boss') {
                            updates.boss_hp = increment(-50); 
                        } else if (hitTarget.startsWith('npc_')) {
                            updates['dead_npcs.' + hitTarget.split('_')[1]] = true;
                        } else {
                            updates[`knockback_${hitTarget}`] = { vx: myFacing.x * 2000, vy: myFacing.y * 2000, ts: now }; 
                        }
                    }
                    
                    updateDoc(myRef, { action_ts: now, action_type: 'shoot' }).catch(()=>{}); 
                    updateDoc(roomRef, updates).catch(()=>{}); 
                    return;

                } else if (myHeldItem && myHeldItem.startsWith('sword')) {
                    lastSwordAttack = now; 
                    swordStartAngle = Math.atan2(myFacing.y, myFacing.x) - Math.PI/2;
                    Physics.spawnParticles(cx + myFacing.x*30, cy + myFacing.y*30, '#ffffff'); 
                    sfx.sfxSword();
                    
                    let updates = {};
                    
                    if (gameState.boss_active && gameState.boss_hp > 0) {
                        if (Math.hypot(cx - (gameState.boss_x + 60), cy - (gameState.boss_y + 60)) < 150) {
                            updates.boss_hp = increment(-50); 
                            Physics.spawnParticles(gameState.boss_x + 60, gameState.boss_y + 60, '#ffcc00'); 
                        }
                    }
                    
                    for(let npc of npcs) {
                        if (gameState.dead_npcs && gameState.dead_npcs[npc.id]) continue;
                        let sameFloor = (cy > 2000 && npc.currentY > 2000) || (cy < 2000 && npc.currentY < 2000);
                        if (sameFloor && Math.hypot(cx + myFacing.x*50 - (npc.currentX+20), cy + myFacing.y*50 - (npc.currentY+20)) < 60) {
                            updates['dead_npcs.' + npc.id] = true; 
                            Physics.spawnParticles(npc.currentX + 20, npc.currentY + 20, '#ff0000');
                        }
                    }
                    
                    updateDoc(myRef, { action_ts: now, action_type: 'sword', action_angle: swordStartAngle }).catch(()=>{});
                    if (Object.keys(updates).length > 0) updateDoc(roomRef, updates).catch(()=>{}); 
                    return;
                }

                // PRIO 3: ITEMS AUFHEBEN
                if (!gameState.ball_owner && localBall.active && Math.hypot(cx - localBall.x, cy - localBall.y) < 100) {
                    myHeldItem = 'ball'; 
                    sfx.playTone(400, 'sine', 0.1); 
                    updateDoc(roomRef, { 'ball_owner': currentUser.uid, 'ball_x': localBall.x, 'ball_y': localBall.y }).catch(()=>{}); 
                    return;
                }
                
                if (gameState.mg_dropped && !gameState.mg_owner && Math.hypot(cx - gameState.mg_x, cy - gameState.mg_y) < 100) {
                    myHeldItem = 'mg'; 
                    sfx.playTone(400, 'sine', 0.1); 
                    updateDoc(roomRef, { mg_owner: currentUser.uid }).catch(()=>{}); 
                    return;
                }
                
                for (let i = 1; i <= 4; i++) {
                    const sKey = 'sword' + i; 
                    let sx = gameState[sKey+'_x'] !== undefined ? gameState[sKey+'_x'] : swordBases[sKey].x; 
                    let sy = gameState[sKey+'_y'] !== undefined ? gameState[sKey+'_y'] : swordBases[sKey].y;
                    
                    if (!gameState[sKey+'_owner'] && Math.hypot(cx - sx, cy - sy) < 100) {
                        myHeldItem = sKey; 
                        let update = {}; 
                        update[sKey+'_owner'] = currentUser.uid; 
                        updateDoc(roomRef, update).catch(()=>{}); 
                        sfx.playTone(400, 'sine', 0.1); 
                        return;
                    }
                }
                
                // Energy Drinks
                for(let d of spawnDrinks) {
                    if (gameState.energy_drinks && gameState.energy_drinks[d.id]) continue;
                    
                    if (Math.hypot(cx - d.x, cy - d.y) < 60) {
                        let up = {}; 
                        up['energy_drinks.' + d.id] = true; 
                        updateDoc(roomRef, up).catch(()=>{});
                        
                        activeSpeedMult = 1.8; 
                        energyDrinkEndTime = now + 5000; 
                        
                        Physics.spawnParticles(cx, cy, '#00ffcc'); 
                        sfx.playTone(600, 'square', 0.2); 
                        return;
                    }
                }
            },
            
            doB() {
                const now = Date.now();
                if (now - lastDashTime > 2000 && (Math.abs(myFacing.x) > 0 || Math.abs(myFacing.y) > 0)) {
                    dashSpeedMult = 4.0; 
                    lastDashTime = now;
                    Physics.spawnParticles(myLocalPlayer.x + PLAYER_SIZE/2, myLocalPlayer.y + PLAYER_SIZE/2, '#00ffcc'); 
                    sfx.sfxDash();
                }
            },
            
            doC() { 
                // Drop Item Mechanism
                if (!currentRoom || !myHeldItem) return;
                
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoom);
                const cx = myLocalPlayer.x + PLAYER_SIZE/2; 
                const cy = myLocalPlayer.y + PLAYER_SIZE/2;
                
                let updates = {};
                
                if (myHeldItem === 'ball') { 
                    updates.ball_owner = null; 
                    updates.ball_x = cx; 
                    updates.ball_y = cy; 
                    updates.ball_vx = 0; 
                    updates.ball_vy = 0; 
                    updates.ball_ts = Date.now(); 
                } else if (myHeldItem === 'mg') { 
                    updates.mg_owner = null; 
                    updates.mg_x = cx; 
                    updates.mg_y = cy; 
                } else if (myHeldItem.startsWith('sword')) { 
                    updates[myHeldItem+'_owner'] = null; 
                    updates[myHeldItem+'_x'] = cx; 
                    updates[myHeldItem+'_y'] = cy; 
                }
                
                myHeldItem = null; 
                updateDoc(roomRef, updates).catch(()=>{}); 
                sfx.playTone(200, 'sine', 0.1);
            }
        };

        // ============================================================================
        // 8. LOGIN & NETWORK LOGIC (.IO STYLE)
        // ============================================================================

        // ----------------------------------------------------------------------
        // 9. FIREBASE SYNC LISTENERS
        // ----------------------------------------------------------------------
        let playersUnsubscribe = null;
        let roomUnsubscribe = null;
        
        function setupFirebaseListeners() {
            if (!currentUser || !currentRoom) return; 
            
            const playersRef = collection(db, 'artifacts', appId, 'public', 'data', 'players');
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoom);

            // 1. SYNC PLAYERS
            if (playersUnsubscribe) playersUnsubscribe();
            playersUnsubscribe = onSnapshot(playersRef, (snapshot) => {
                const localNow = performance.now();
                snapshot.docChanges().forEach(change => {
                    const docData = change.doc.data(); 
                    const docId = change.doc.id;
                    
                    if (docData.roomId === currentRoom) {
                        if (change.type === 'added' || change.type === 'modified') {
                            if (!serverPlayers[docId]) {
                                serverPlayers[docId] = docData;
                                if (docId !== currentUser.uid) {
                                    gameEntities[docId] = { x: docData.x, y: docData.y };
                                }
                            } else {
                                Object.assign(serverPlayers[docId], docData);
                            }
                            serverPlayers[docId].localLastUpdate = localNow; 
                        }
                        if (change.type === 'removed') { 
                            delete serverPlayers[docId]; 
                            delete gameEntities[docId]; 
                        }
                    }
                });
                
                // Update Leaderboard HUD
                let activeIds = Object.keys(serverPlayers).sort();
                let lbContent = "";
                for(let id in serverPlayers) {
                    const p = serverPlayers[id];
                    let t = (p.timeAsGabri || 0); 
                    if (localCurrentGabri === id && gameState.isPlaying) t += (Date.now() - localGabriSince);
                    lbContent += `<div class="lb-row"><span style="color:${id===currentUser.uid?'#00ffcc':'white'}">${p.name}</span><span>${(t/1000).toFixed(1)}s</span></div>`;
                }
                document.getElementById('lb-content').innerHTML = lbContent;
                
                // Allow anyone to start the game
                let isHost = true; // Make it so ANYONE can click start in .io mode
                const btnStart = document.getElementById('btnStartRound');
                if (gameState.isPlaying) {
                    btnStart.style.display = 'none';
                } else {
                    btnStart.style.display = 'block';
                    btnStart.innerText = "RUNDE STARTEN";
                    btnStart.disabled = false;
                }
            });

            // 2. SYNC ROOM / GAME STATE
            if (roomUnsubscribe) roomUnsubscribe();
            roomUnsubscribe = onSnapshot(roomRef, (docSnap) => {
                if (docSnap.exists()) {
                    const newState = docSnap.data();
                    
                    // Host Migration 
                    if (newState.isPlaying && newState.hostId !== currentUser.uid) {
                        const hostAlive = serverPlayers[newState.hostId] && (performance.now() - serverPlayers[newState.hostId].localLastUpdate < 20000);
                        if (!hostAlive) {
                            const activeIds = Object.keys(serverPlayers).sort();
                            if (activeIds[0] === currentUser.uid) {
                                updateDoc(roomRef, { hostId: currentUser.uid }).catch(()=>{});
                            }
                        }
                    }

                    if (newState.isPlaying && newState.roundId !== currentRoundId) {
                        currentRoundId = newState.roundId; 
                        localCurrentGabri = newState.currentGabri; 
                        localGabriSince = Date.now(); 
                        
                        myLocalPlayer.x = 1300 + Math.random()*100; 
                        myLocalPlayer.y = 1000 + Math.random()*100;
                        
                    } else if (newState.isPlaying && newState.currentGabri !== localCurrentGabri) {
                        localCurrentGabri = newState.currentGabri; 
                        localGabriSince = Date.now(); 
                        sfx.sfxTag(); 
                    }
                    
                    if (newState.lastScoreTs !== gameState.lastScoreTs && newState.lastScoreTs > lastScoreTs) {
                        lastScoreTs = newState.lastScoreTs; 
                        sfx.sfxScore(); 
                        sfx.sfxCheer();
                    }

                    if (newState[`knockback_${currentUser.uid}`] && newState[`knockback_${currentUser.uid}`].ts !== lastKnockbackTs) {
                        lastKnockbackTs = newState[`knockback_${currentUser.uid}`].ts;
                        kb_vx = newState[`knockback_${currentUser.uid}`].vx; 
                        kb_vy = newState[`knockback_${currentUser.uid}`].vy; 
                        Physics.spawnParticles(myLocalPlayer.x, myLocalPlayer.y, '#ff0000'); 
                        sfx.playNoise(0.2, 0.8);
                    }

                    // Item Sync Check
                    if (myHeldItem === 'ball' && newState.ball_owner !== currentUser.uid) myHeldItem = null;
                    if (myHeldItem === 'mg' && newState.mg_owner !== currentUser.uid) myHeldItem = null;
                    if (myHeldItem && myHeldItem.startsWith('sword') && newState[myHeldItem+'_owner'] !== currentUser.uid) myHeldItem = null;

                    if (newState.ball_ts !== lastBallTs) {
                        lastBallTs = newState.ball_ts; 
                        localBall.active = true;
                        localBall.x = newState.ball_x; 
                        localBall.y = newState.ball_y;
                        localBall.vx = newState.ball_vx || 0; 
                        localBall.vy = newState.ball_vy || 0;
                        localBall.z = 40; 
                        localBall.vz = 350; 
                    } else if (newState.ball_owner == null && !localBall.active) {
                        localBall.active = true; 
                        localBall.x = newState.ball_x; 
                        localBall.y = newState.ball_y; 
                        localBall.z = 0; 
                        localBall.vx = 0; 
                        localBall.vy = 0;
                    }

                    gameState = newState;
                    
                    // UI Update
                    if (gameState.isPlaying) {
                        document.getElementById('btnStartRound').style.display = 'none';
                        if (localCurrentGabri === currentUser.uid) {
                            document.getElementById('hudStatusBox').classList.add('is-gabri-alert'); 
                            document.getElementById('roleDisplay').innerText = "DU BIST GABRI!";
                        } else {
                            document.getElementById('hudStatusBox').classList.remove('is-gabri-alert');
                            const gName = serverPlayers[localCurrentGabri]?.name || "Jemand"; 
                            document.getElementById('roleDisplay').innerHTML = `<span style="color:var(--primary)">LAUF! ${gName} ist Gabri!</span>`;
                        }
                    } else {
                        document.getElementById('gameTimer').innerText = "WARMUP";
                        document.getElementById('roleDisplay').innerText = "Erkunde die Map";
                        document.getElementById('hudStatusBox').classList.remove('is-gabri-alert');
                    }
                    
                } else { 
                    gameState.isPlaying = false; 
                }
                
                checkGameOverState();
            });
        }

        document.getElementById('btnStartRound').addEventListener('click', async () => {
            if (!currentUser || !currentRoom) return;
            try {
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoom);
                const activeIds = Object.keys(serverPlayers); 
                if(activeIds.length === 0) activeIds.push(currentUser.uid);
                
                const randomGabri = activeIds[Math.floor(Math.random() * activeIds.length)];

                let initialItems = {};
                mapPallets.forEach(p => initialItems['pallet_'+p.id] = 0);
                spawnDrinks.forEach(d => initialItems['drink_'+d.id] = true);
                
                initialItems['sword1_x'] = swordBases['sword1'].x; initialItems['sword1_y'] = swordBases['sword1'].y;
                initialItems['sword2_x'] = swordBases['sword2'].x; initialItems['sword2_y'] = swordBases['sword2'].y;
                initialItems['sword3_x'] = swordBases['sword3'].x; initialItems['sword3_y'] = swordBases['sword3'].y;
                initialItems['sword4_x'] = swordBases['sword4'].x; initialItems['sword4_y'] = swordBases['sword4'].y;

                await setDoc(roomRef, {

                    isPlaying: true,
