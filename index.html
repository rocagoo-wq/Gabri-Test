<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d0d12">
    <title>Gabri-Flucht - Elite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #00ffcc;
            --gabri: #ff3366;
            --glass-bg: rgba(20, 20, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            font-family: 'Outfit', sans-serif;
            touch-action: none; 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0d12;
            overflow: hidden;
            position: fixed; 
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            opacity: 0; 
            transition: opacity 0.5s;
        }

        .game-running canvas {
            opacity: 1;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border-radius: 16px;
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: env(safe-area-inset-top, 20px) 20px 20px 20px;
            z-index: 10;
        }

        #screens-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0d12; 
            z-index: 50;
            transition: opacity 0.3s ease;
        }

        .screen { display: none; width: 100%; max-width: 400px; padding: 20px; pointer-events: auto; }
        .screen.active { display: block; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            color: white;
            text-shadow: 0 0 10px var(--primary);
            font-size: 24px;
            margin-bottom: 10px; 
            line-height: 1.4;
        }

        .input-elite {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1);
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            text-align: center;
            outline: none;
            transition: all 0.2s;
        }
        .input-elite:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,255,204,0.3); }

        .btn-elite {
            width: 100%;
            background: linear-gradient(135deg, #00ffcc 0%, #00b38f 100%);
            color: #000;
            font-weight: 800;
            font-size: 18px;
            padding: 15px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.1s, box-shadow 0.1s;
            pointer-events: auto;
        }
        .btn-elite:active { transform: scale(0.96); }
        .btn-elite:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .btn-danger { background: linear-gradient(135deg, #ff3366 0%, #cc0033 100%); color: white; }

        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: auto;
        }

        .hud-box {
            padding: 10px 20px;
            border-radius: 12px;
            color: white;
        }

        .timer-text { font-family: 'Press Start 2P', cursive; font-size: 18px; color: var(--primary); }
        .status-text { font-size: 16px; font-weight: 600; text-align: right; }
        
        .is-gabri-alert {
            animation: pulse-gabri 1s infinite alternate;
            color: var(--gabri) !important;
            text-shadow: 0 0 10px var(--gabri);
        }

        @keyframes pulse-gabri {
            from { box-shadow: 0 0 10px var(--gabri), inset 0 0 10px var(--gabri); border-color: var(--gabri); }
            to { box-shadow: 0 0 30px var(--gabri), inset 0 0 20px var(--gabri); border-color: transparent; }
        }

        .player-list { max-height: 200px; overflow-y: auto; margin-bottom: 20px; pointer-events: auto; }
        .player-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #ccc;
        }
        .player-item:last-child { border: none; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #00ffcc; box-shadow: 0 0 8px #00ffcc; }

        .rank-row {
            display: flex; justify-content: space-between; padding: 12px;
            background: rgba(255,255,255,0.05); margin-bottom: 8px; border-radius: 8px;
            font-weight: 600; color: white;
        }
        .rank-loser { background: rgba(255, 51, 102, 0.2); border: 1px solid var(--gabri); color: #ff99aa;}
        .rank-winner { background: rgba(0, 255, 204, 0.1); border: 1px solid var(--primary); color: var(--primary);}

        #floorDisplay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            text-shadow: 0 0 5px var(--primary);
            pointer-events: none;
            display: none;
        }
        .game-running #floorDisplay { display: block; }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gabri-elite-game';
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            firebaseConfig = {
                apiKey: "AIzaSyDWM2Dnq72MeWuZcV3uT4YXg0G9nyZIVAc",
                authDomain: "gabri-4f94c.firebaseapp.com",
                projectId: "gabri-4f94c",
                storageBucket: "gabri-4f94c.firebasestorage.app",
                messagingSenderId: "415746495575",
                appId: "1:415746495575:web:c9730e19c9ac3e6d923f12"
            };
        }
        
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (error) {
            console.error("Firebase:", error);
        }

        const GAME_DURATION_SEC = 180; 
        const MAP_WIDTH = 3000;
        const MAP_HEIGHT = 4000; 
        const PLAYER_SIZE = 40;
        const BASE_SPEED = 350; 
        const TAG_COOLDOWN_MS = 2000;

        let user = null;
        let myName = "Player";
        let currentRoomId = null; 
        
        let serverPlayers = {}; 
        let gameEntities = {};  
        let gameState = { 
            isPlaying: false, timeLeft: 0, currentGabri: null, hostId: null, roundId: null, tagCounter: 0,
            ball_x: 2200, ball_y: 1500, ball_vx: 0, ball_vy: 0, ball_owner: null, ball_ts: 0,
            boss_active: false, boss_hp: 500, boss_x: 1500, boss_y: 3000, boss_tx: 1500, boss_ty: 3000,
            sword1_owner: null, sword2_owner: null, sword3_owner: null, sword4_owner: null,
            mg_dropped: false, mg_owner: null, mg_x: 0, mg_y: 0, last_laser: null,
            dead_npcs: {} // Array zum Speichern der getöteten NPCs
        };
        
        let currentRoundId = null;
        let localCurrentGabri = null;
        let localGabriSince = 0;
        let localTagCounter = 0;
        let lastHostTick = 0;
        let lastStairTime = 0; 
        let lastConfettiTs = 0;

        // Lokale Ball-Physik für perfekte Sync
        let localBall = { active: false, x: 2200, y: 1500, z: 0, vx: 0, vy: 0, vz: 0 };
        let lastBallTs = 0;

        let myLocalPlayer = { x: 0, y: 0, vx: 0, vy: 0 };
        let myFacing = { x: 1, y: 0 }; 
        let myHeldItem = null; 
        
        let dashSpeedMult = 1.0;
        let lastDashTime = 0;
        let lastMgShot = 0;
        let lastSwordAttack = 0;
        let swordStartAngle = 0;
        
        let kb_vx = 0;
        let kb_vy = 0;
        let lastKnockbackTs = 0;

        let lastUpdateTime = performance.now();
        let lastSyncTime = 0;
        let particles = [];

        const screensLayer = document.getElementById('screens-layer');
        const uiLayer = document.getElementById('ui-layer');
        const floorDisplay = document.getElementById('floorDisplay');
        const canvasElement = document.getElementById('gameCanvas');
        let camera = { x: 0, y: 0 };

        // --- MAP BUILDER ---
        let obstacles = [];
        let labels = [];
        let stairs = [];
        let npcs = []; // Die 100 Charaktere
        
        const hoop = { x: 2200, y: 1220, w: 100, h: 20 };

        const swordBases = {
            sword1: {x: 1300, y: 2900},
            sword2: {x: 1700, y: 2900},
            sword3: {x: 1300, y: 3100},
            sword4: {x: 1700, y: 3100}
        };

        const mapPallets = [
            { id: 'p1', dropRect: {x: 1060, y: 400, w: 40, h: 200}, upRect: {x: 1070, y: 380, w: 20, h: 20}, dir: 'v' }, 
            { id: 'p2', dropRect: {x: 1500, y: 400, w: 40, h: 200}, upRect: {x: 1510, y: 380, w: 20, h: 20}, dir: 'v' }, 
            { id: 'p3', dropRect: {x: 500, y: 1160, w: 200, h: 40}, upRect: {x: 480, y: 1170, w: 20, h: 20}, dir: 'h' }, 
            { id: 'p4', dropRect: {x: 2000, y: 1160, w: 200, h: 40}, upRect: {x: 1980, y: 1170, w: 20, h: 20}, dir: 'h' }, 
            { id: 'p5', dropRect: {x: 1060, y: 2400, w: 40, h: 200}, upRect: {x: 1070, y: 2380, w: 20, h: 20}, dir: 'v' }, 
            { id: 'p6', dropRect: {x: 1500, y: 2400, w: 40, h: 200}, upRect: {x: 1510, y: 2380, w: 20, h: 20}, dir: 'v' }, 
            { id: 'p7', dropRect: {x: 500, y: 3160, w: 200, h: 40}, upRect: {x: 480, y: 3170, w: 20, h: 20}, dir: 'h' }, 
            { id: 'p8', dropRect: {x: 2000, y: 3160, w: 200, h: 40}, upRect: {x: 1980, y: 3170, w: 20, h: 20}, dir: 'h' }  
        ];

        obstacles.push({x: -50, y: -50, w: MAP_WIDTH+100, h: 50, isWall: true});
        obstacles.push({x: -50, y: -50, w: 50, h: 2000+100, isWall: true});
        obstacles.push({x: MAP_WIDTH, y: -50, w: 50, h: 2000+100, isWall: true});
        obstacles.push({x: -50, y: 1980, w: MAP_WIDTH+100, h: 40, isWall: true});
        obstacles.push({x: -50, y: MAP_HEIGHT, w: MAP_WIDTH+100, h: 50, isWall: true});
        obstacles.push({x: -50, y: 2000, w: 50, h: 2000+100, isWall: true});
        obstacles.push({x: MAP_WIDTH, y: 2000, w: 50, h: 2000+100, isWall: true});

        function buildRoom(rx, ry, rw, rh, doorEdge, doorOffset, doorWidth, labelText, isEmptyRoom=false) {
            const wall = 20; 
            if (doorEdge === 'top') {
                obstacles.push({x: rx, y: ry, w: doorOffset, h: wall, isWall: true});
                obstacles.push({x: rx + doorOffset + doorWidth, y: ry, w: rw - doorOffset - doorWidth, h: wall, isWall: true});
            } else { obstacles.push({x: rx, y: ry, w: rw, h: wall, isWall: true}); }

            if (doorEdge === 'bottom') {
                obstacles.push({x: rx, y: ry + rh - wall, w: doorOffset, h: wall, isWall: true});
                obstacles.push({x: rx + doorOffset + doorWidth, y: ry + rh - wall, w: rw - doorOffset - doorWidth, h: wall, isWall: true});
            } else { obstacles.push({x: rx, y: ry + rh - wall, w: rw, h: wall, isWall: true}); }

            if (doorEdge === 'left') {
                obstacles.push({x: rx, y: ry, w: wall, h: doorOffset, isWall: true});
                obstacles.push({x: rx, y: ry + doorOffset + doorWidth, w: wall, h: rh - doorOffset - doorWidth, isWall: true});
            } else { obstacles.push({x: rx, y: ry, w: wall, h: rh, isWall: true}); }

            if (doorEdge === 'right') {
                obstacles.push({x: rx + rw - wall, y: ry, w: wall, h: doorOffset, isWall: true});
                obstacles.push({x: rx + rw - wall, y: ry + doorOffset + doorWidth, w: wall, h: rh - doorOffset - doorWidth, isWall: true});
            } else { obstacles.push({x: rx + rw - wall, y: ry, w: wall, h: rh, isWall: true}); }

            if (labelText) labels.push({x: rx + rw/2, y: ry + rh/2, text: labelText});

            if (!isEmptyRoom) {
                let cols = Math.floor((rw - wall*2) / 220);
                let rows = Math.floor((rh - wall*2) / 220);
                let padX = (rw - wall*2 - (cols * 220)) / 2;
                let padY = (rh - wall*2 - (rows * 220)) / 2;
                for (let r=0; r<rows; r++) {
                    for (let c=0; c<cols; c++) {
                        let tx = rx + wall + padX + c*220 + 70; let ty = ry + wall + padY + r*220 + 70;
                        obstacles.push({x: tx, y: ty, w: 80, h: 40, isTable: true});
                        obstacles.push({x: tx + 10, y: ty - 25, w: 20, h: 20, isChair: true, dir: 'up'});
                        obstacles.push({x: tx + 50, y: ty - 25, w: 20, h: 20, isChair: true, dir: 'up'});
                        obstacles.push({x: tx + 10, y: ty + 45, w: 20, h: 20, isChair: true, dir: 'down'});
                        obstacles.push({x: tx + 50, y: ty + 45, w: 20, h: 20, isChair: true, dir: 'down'});
                    }
                }
            }
        }

        buildRoom(100, 100, 1000, 800, 'right', 300, 200, 'MATHE (EG)');
        buildRoom(1500, 100, 1400, 800, 'left', 300, 200, 'BIOLOGIE (EG)');
        buildRoom(100, 1200, 1000, 700, 'top', 400, 200, 'MENSA (EG)');
        buildRoom(1500, 1200, 1400, 700, 'top', 500, 200, 'TURNHALLE (EG)', true); 

        buildRoom(100, 2100, 1000, 800, 'right', 300, 200, 'CHEMIE (OG)');
        buildRoom(1500, 2100, 1400, 800, 'left', 300, 200, 'PHYSIK (OG)');
        buildRoom(100, 3200, 1000, 700, 'top', 400, 200, 'LEHRERZIMMER (OG)');
        buildRoom(1500, 3200, 1400, 700, 'top', 500, 200, 'BIBLIOTHEK (OG)');

        stairs.push({ x: 1225, y: 400, w: 150, h: 150, targetY: 2400, label: 'ZUM OG' });
        stairs.push({ x: 1225, y: 2400, w: 150, h: 150, targetY: 400, label: 'ZUM EG' });
        stairs.push({ x: 1225, y: 1500, w: 150, h: 150, targetY: 3500, label: 'ZUM OG' });
        stairs.push({ x: 1225, y: 3500, w: 150, h: 150, targetY: 1500, label: 'ZUM EG' });

        // --- NPC GENERATOR (100 Personen) ---
        function mulberry32(a) {
            return function() {
              var t = a += 0x6D2B79F5;
              t = Math.imul(t ^ t >>> 15, t | 1);
              t ^= t + Math.imul(t ^ t >>> 7, t | 61);
              return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }
        const prng = mulberry32(12345); 

        for (let i = 0; i < 100; i++) {
            let type, sx, sy, mx, my, spd;
            if (i < 5) { // 5 Lehrer
                type = 'teacher';
                sx = 1300 + prng() * 400; sy = 800 + prng() * 2000;
                mx = (prng() - 0.5) * 600; my = (prng() - 0.5) * 600; spd = 0.001;
            } else if (i < 15) { // 10 Cheerleader in der Turnhalle
                type = 'cheerleader';
                sx = 1600 + prng() * 1200; sy = 1300 + prng() * 500;
                mx = 0; my = 0; spd = 0.005 + prng()*0.002;
            } else { // 85 Schüler (Hindernisse)
                type = 'student';
                let valid = false;
                while(!valid) {
                    sx = 100 + prng() * (MAP_WIDTH - 200);
                    sy = prng() * (MAP_HEIGHT - 200);
                    if (sy > 1900 && sy < 2100) continue; // Nicht in der Trennwand spawnen
                    // Grober Wand Check
                    valid = !obstacles.some(o => o.isWall && sx < o.x+o.w && sx+40>o.x && sy<o.y+o.h && sy+40>o.y);
                }
                mx = (prng() - 0.5) * 400; my = (prng() - 0.5) * 400; spd = 0.0005 + prng() * 0.001;
            }
            npcs.push({ id: i, startX: sx, startY: sy, moveX: mx, moveY: my, speed: spd, type: type, currentX: sx, currentY: sy });
        }

        function createPixelSprite(type, frame=0) {
            const canvas = document.createElement('canvas');
            canvas.width = 12; canvas.height = 12;
            const ctx = canvas.getContext('2d');
            
            let skin = '#ffcba4', shirt = '#00ffcc', pants = '#1a1a24', hair = '#1a1a24';

            if (type === 'gabri') { skin = '#ff99aa'; shirt = '#ff3366'; }
            else if (type === 'teacher') { skin = '#eebb99'; shirt = '#555555'; hair = '#cccccc'; }
            else if (type === 'boss') { skin = '#ff4444'; shirt = '#220000'; pants = '#110000'; hair = '#ffaa00'; }
            else if (type === 'cheerleader') { skin = '#ffcba4'; shirt = '#ff66b2'; pants = '#ffffff'; hair = '#ffee66'; }
            else if (type === 'student') { shirt = '#3366ff'; pants = '#444444'; hair = '#5c3a21'; } // Standard Schüler

            let layout = [
                [0,0,0,0,6,6,6,6,0,0,0,0], [0,0,0,6,2,2,2,2,6,0,0,0], [0,0,6,2,0,2,2,0,2,6,0,0],

        function setupFirebaseListeners() {
            if (!user || !currentRoomId) return; 
            
            const playersRef = collection(db, 'artifacts', appId, 'public', 'data', 'players');
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);

            onSnapshot(playersRef, (snapshot) => {
                const now = Date.now();
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.roomId === currentRoomId && now - data.lastSeen < 10000) {
                        serverPlayers[doc.id] = data;
                        if (!gameEntities[doc.id] && doc.id !== user.uid) gameEntities[doc.id] = { x: data.x, y: data.y };
                    } else {
                        delete serverPlayers[doc.id]; 
                        if (doc.id !== user.uid) delete gameEntities[doc.id];
                    }
                });
                updateLobbyUI();
            });

            onSnapshot(roomRef, (docSnap) => {
                if (docSnap.exists()) {
                    const newState = docSnap.data();
                    if (newState.isPlaying && newState.roundId !== currentRoundId) {
                        currentRoundId = newState.roundId;
                        localCurrentGabri = newState.currentGabri;
                        localGabriSince = Date.now();
                        localTagCounter = newState.tagCounter;
                        
                        myLocalPlayer.x = 1300 + Math.random()*100;
                        myLocalPlayer.y = 1000 + Math.random()*100;
                    } else if (newState.isPlaying && newState.tagCounter !== localTagCounter) {
                        localTagCounter = newState.tagCounter;
                        localCurrentGabri = newState.currentGabri;
                        localGabriSince = Date.now();
                    }
                    
                    // Knockback Check für Laser-Treffer
                    if (newState[`knockback_${user.uid}`]) {
                        const kb = newState[`knockback_${user.uid}`];
                        if (kb.ts !== lastKnockbackTs) {
                            lastKnockbackTs = kb.ts;
                            kb_vx = kb.vx; kb_vy = kb.vy;
                            createParticles(myLocalPlayer.x, myLocalPlayer.y, '#ff0000');
                        }
                    }

                    // Item Sync Check
                    if (myHeldItem === 'ball' && newState.ball_owner !== user.uid) myHeldItem = null;
                    if (myHeldItem === 'mg' && newState.mg_owner !== user.uid) myHeldItem = null;
                    if (myHeldItem && myHeldItem.startsWith('sword') && newState[myHeldItem+'_owner'] !== user.uid) myHeldItem = null;

                    // Ball Physics Start Check
                    if (newState.ball_ts !== lastBallTs) {
                        lastBallTs = newState.ball_ts;
                        localBall.active = true;
                        localBall.x = newState.ball_x; localBall.y = newState.ball_y;
                        localBall.vx = newState.ball_vx || 0; localBall.vy = newState.ball_vy || 0;
                        localBall.z = 40; localBall.vz = 350; // Wurfstärke nach oben
                    }

                    gameState = newState;
                    handleStateChange();
                } else {
                    gameState.isPlaying = false;
                    handleStateChange();
                }
            });
        }

        function handleStateChange() {

                screensLayer.style.display = 'none';
                uiLayer.style.display = 'flex';
                document.body.classList.add('game-running');

        // --- 8. INPUT HANDLING (FESTE UI JOYSTICKS & BUTTONS) ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let joyBase = { x: 120, y: window.innerHeight - 120, r: 70 };
        let btnA = { x: window.innerWidth - 100, y: window.innerHeight - 100, r: 45, active: false };
        let btnB = { x: window.innerWidth - 200, y: window.innerHeight - 150, r: 45, active: false };
        
        let joystick = { active: false, id: null, nx: joyBase.x, ny: joyBase.y, dx: 0, dy: 0 };
        let keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false, ' ': false, 'shift': false };

        window.addEventListener('resize', () => { 
            canvas.width = window.innerWidth; canvas.height = window.innerHeight; 
            joyBase = { x: 120, y: window.innerHeight - 120, r: 70 };
            btnA = { x: window.innerWidth - 100, y: window.innerHeight - 100, r: 45, active: false };
            btnB = { x: window.innerWidth - 200, y: window.innerHeight - 150, r: 45, active: false };
        });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        document.body.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

        window.addEventListener('keydown', (e) => {
            let key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key) || key === 'shift') {
                if (key === 'shift') keys['shift'] = true;
                else keys[key] = true;
                
                if (key === ' ' || key === 'spacebar') { if(!btnA.active) doActionA(); btnA.active = true; }
                if (key === 'shift') { if(!btnB.active) doActionB(); btnB.active = true; }
            }
        });
        window.addEventListener('keyup', (e) => {
            let key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key) || key === 'shift') {
                if (key === 'shift') { keys['shift'] = false; btnB.active = false; }
                else keys[key] = false;
                if (key === ' ' || key === 'spacebar') btnA.active = false;
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for(let t of e.changedTouches) {
                if (Math.hypot(t.clientX - joyBase.x, t.clientY - joyBase.y) < joyBase.r * 2.5 && !joystick.active) {
                    joystick.active = true; joystick.id = t.identifier;
                    joystick.nx = t.clientX; joystick.ny = t.clientY;
                    clampJoy();
                } else if (Math.hypot(t.clientX - btnA.x, t.clientY - btnA.y) < btnA.r * 1.5) {
                    btnA.active = true; doActionA();
                } else if (Math.hypot(t.clientX - btnB.x, t.clientY - btnB.y) < btnB.r * 1.5) {
                    btnB.active = true; doActionB();
                }
            }
        }, {passive: false});

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for(let t of e.changedTouches) {
                if(t.identifier === joystick.id) {
                    joystick.nx = t.clientX; joystick.ny = t.clientY;
                    clampJoy();
                }
            }
        }, {passive: false});

        function endJoyTouch(e) {
            e.preventDefault();
            for(let t of e.changedTouches) {
                if(t.identifier === joystick.id) { 
                    joystick.active = false; joystick.id = null; 
                    joystick.nx = joyBase.x; joystick.ny = joyBase.y;
                    joystick.dx = 0; joystick.dy = 0; 
                }
                if (Math.hypot(t.clientX - btnA.x, t.clientY - btnA.y) < btnA.r * 2) btnA.active = false;
                if (Math.hypot(t.clientX - btnB.x, t.clientY - btnB.y) < btnB.r * 2) btnB.active = false;
            }
        }
        canvas.addEventListener('touchend', endJoyTouch, {passive: false});
        canvas.addEventListener('touchcancel', endJoyTouch, {passive: false});

        function clampJoy() {
            const dist = Math.hypot(joystick.nx - joyBase.x, joystick.ny - joyBase.y);
            if (dist > joyBase.r) {
                const angle = Math.atan2(joystick.ny - joyBase.y, joystick.nx - joyBase.x);
                joystick.nx = joyBase.x + Math.cos(angle) * joyBase.r;
                joystick.ny = joyBase.y + Math.sin(angle) * joyBase.r;
            }
            if (dist > 10) { joystick.dx = (joystick.nx - joyBase.x) / joyBase.r; joystick.dy = (joystick.ny - joyBase.y) / joyBase.r; } 
            else { joystick.dx = 0; joystick.dy = 0; }
        }

        function getMovementVector() {
            let kx = 0; let ky = 0;
            if (keys.w || keys.arrowup) ky -= 1;
            if (keys.s || keys.arrowdown) ky += 1;
            if (keys.a || keys.arrowleft) kx -= 1;
            if (keys.d || keys.arrowright) kx += 1;

            if (kx !== 0 && ky !== 0) { const len = Math.hypot(kx, ky); kx /= len; ky /= len; }
            return { dx: joystick.active ? joystick.dx : kx, dy: joystick.active ? joystick.dy : ky };
        }

        // --- 9. GAME ENGINE / ACTIONS ---

        function spawnConfetti(cx, cy) {
            const colors = ['#ff3366', '#00ffcc', '#ffcc00', '#3366ff'];
            for(let i=0; i<50; i++) {
                particles.push({
                    x: cx, y: cy,
                    vx: (Math.random() - 0.5) * 800, vy: (Math.random() - 1.0) * 800,
                    life: 1.5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    isConfetti: true
                });
            }
        }

        function doActionA() {
            if (!gameState.isPlaying || !currentRoomId) return;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            const cx = myLocalPlayer.x + PLAYER_SIZE/2;
            const cy = myLocalPlayer.y + PLAYER_SIZE/2;
            const isGabri = (localCurrentGabri === user.uid);
            const now = Date.now();
            
            // PRIO 1: PALLETS (DbD Style)
            let nearestPallet = null; let minDistP = 120;
            for (let p of mapPallets) {
                let pcx = p.dropRect.x + p.dropRect.w/2; let pcy = p.dropRect.y + p.dropRect.h/2;
                let d = Math.hypot(cx - pcx, cy - pcy);
                if (d < minDistP) { minDistP = d; nearestPallet = p; }
            }

            if (nearestPallet) {
                const pState = gameState['pallet_'+nearestPallet.id] || 0;
                if (pState === 0) {
                    let up = {}; up['pallet_'+nearestPallet.id] = 1; updateDoc(roomRef, up);
                    createParticles(nearestPallet.dropRect.x + nearestPallet.dropRect.w/2, nearestPallet.dropRect.y + nearestPallet.dropRect.h/2, '#8b5a2b');
                    return; 
                } else if (pState === 1) {
                    const moveVec = getMovementVector();
                    const isMoving = (Math.abs(moveVec.dx) > 0.1 || Math.abs(moveVec.dy) > 0.1);

                    if (isGabri || !isMoving) {
                        let up = {}; up['pallet_'+nearestPallet.id] = 2; updateDoc(roomRef, up);
                        createParticles(nearestPallet.dropRect.x + nearestPallet.dropRect.w/2, nearestPallet.dropRect.y + nearestPallet.dropRect.h/2, '#ffcc00');
                        return;
                    } else {
                        const isVert = nearestPallet.dir === 'v';
                        if (isVert) {
                            if (myLocalPlayer.x < nearestPallet.dropRect.x) myLocalPlayer.x = nearestPallet.dropRect.x + nearestPallet.dropRect.w + 10;
                            else myLocalPlayer.x = nearestPallet.dropRect.x - PLAYER_SIZE - 10;
                        } else {
                            if (myLocalPlayer.y < nearestPallet.dropRect.y) myLocalPlayer.y = nearestPallet.dropRect.y + nearestPallet.dropRect.h + 10;
                            else myLocalPlayer.y = nearestPallet.dropRect.y - PLAYER_SIZE - 10;
                        }
                        createParticles(cx, cy, '#00ffcc');
                        return;
                    }
                }
            }

            // PRIO 2: ITEMS BENUTZEN
            if (myHeldItem === 'ball') {
                // Ball werfen mit Velocity
                myHeldItem = null;
                updateDoc(roomRef, {
                    'ball_owner': null, 
                    'ball_x': cx, 'ball_y': cy, 
                    'ball_vx': myFacing.x * 1200, 'ball_vy': myFacing.y * 1200,
                    'ball_ts': now
                });
                return;
            } else if (myHeldItem === 'mg') {
                // MG Schießen (Hitscan Laser + Knockback)
                if (now - lastMgShot < 150) return; // Feuerrate
                lastMgShot = now;
                
                let hitTarget = null;
                let lx = cx; let ly = cy;
                
                // Raycast in Blickrichtung
                for(let i=0; i<20; i++) {
                    lx += myFacing.x * 40; ly += myFacing.y * 40;
                    if (checkWall(lx, ly)) break; // Wand getroffen
                    
                    // Boss getroffen?
                    if (gameState.boss_active && gameState.boss_hp > 0 && cy > 2000) {
                        if (Math.hypot(lx - (gameState.boss_x+60), ly - (gameState.boss_y+60)) < 70) {
                            hitTarget = 'boss'; break;
                        }
                    }
                    // NPC getroffen?
                    for(let npc of npcs) {
                        if (gameState.dead_npcs && gameState.dead_npcs[npc.id]) continue;
                        let sameFloor = (cy > 2000 && npc.currentY > 2000) || (cy < 2000 && npc.currentY < 2000);
                        if (sameFloor && Math.hypot(lx - (npc.currentX+20), ly - (npc.currentY+20)) < 30) {
                            hitTarget = 'npc_' + npc.id; break;
                        }
                    }
                    // Spieler getroffen?
                    for(let id in serverPlayers) {
                        if (id === user.uid) continue;
                        let p = serverPlayers[id];
                        let sameFloor = (cy > 2000 && p.y > 2000) || (cy < 2000 && p.y < 2000);
                        if (sameFloor && Math.hypot(lx - (p.x+20), ly - (p.y+20)) < 30) {
                            hitTarget = id; break;
                        }
                    }
                    if (hitTarget) break;
                }

                let updates = { last_laser: { x1: cx, y1: cy, x2: lx, y2: ly, ts: now } };
                if (hitTarget) {
                    if (hitTarget === 'boss') {
                        updates.boss_hp = increment(-50); // MG zerschreddert Boss
                    } else if (hitTarget.startsWith('npc_')) {
                        let npcId = hitTarget.split('_')[1];
                        updates['dead_npcs.' + npcId] = true;
                    } else {
                        // Spieler extrem stark wegstoßen
                        updates[`knockback_${hitTarget}`] = { vx: myFacing.x * 1800, vy: myFacing.y * 1800, ts: now };
                    }
                }
                updateDoc(roomRef, updates);
                return;

            } else if (myHeldItem && myHeldItem.startsWith('sword')) {
                lastSwordAttack = now; // Starte Schweranimation lokal
                swordStartAngle = Math.atan2(myFacing.y, myFacing.x) - Math.PI/2;
                createParticles(cx + myFacing.x*30, cy + myFacing.y*30, '#ffffff'); 
                
                let updates = {};

                // Hit Boss
                if (gameState.boss_active && gameState.boss_hp > 0) {
                    const distToBoss = Math.hypot(cx - (gameState.boss_x + 60), cy - (gameState.boss_y + 60));
                    if (distToBoss < 150) {
                        updates.boss_hp = increment(-50); // 50 Damage pro Schlag
                        createParticles(gameState.boss_x + 60, gameState.boss_y + 60, '#ffcc00'); 
                    }
                }

                // Hit NPCs
                for(let npc of npcs) {
                    if (gameState.dead_npcs && gameState.dead_npcs[npc.id]) continue;
                    let sameFloor = (cy > 2000 && npc.currentY > 2000) || (cy < 2000 && npc.currentY < 2000);
                    // Schwert Reichweite
                    if (sameFloor && Math.hypot(cx + myFacing.x*50 - (npc.currentX+20), cy + myFacing.y*50 - (npc.currentY+20)) < 60) {
                        updates['dead_npcs.' + npc.id] = true;
                        createParticles(npc.currentX + 20, npc.currentY + 20, '#ff0000');
                    }
                }
                if (Object.keys(updates).length > 0) updateDoc(roomRef, updates);
                return;
            }

            // PRIO 3: ITEMS AUFHEBEN
            if (!gameState.ball_owner && Math.hypot(cx - gameState.ball_x, cy - gameState.ball_y) < 100) {
                myHeldItem = 'ball'; updateDoc(roomRef, { 'ball_owner': user.uid }); return;
            }
            if (gameState.mg_dropped && !gameState.mg_owner && Math.hypot(cx - gameState.mg_x, cy - gameState.mg_y) < 100) {
                myHeldItem = 'mg'; updateDoc(roomRef, { mg_owner: user.uid }); return;
            }
            for (let i = 1; i <= 4; i++) {
                const sKey = 'sword' + i; const sBase = swordBases[sKey];
                if (!gameState[sKey+'_owner'] && Math.hypot(cx - sBase.x, cy - sBase.y) < 100) {
                    myHeldItem = sKey;
                    let update = {}; update[sKey+'_owner'] = user.uid; updateDoc(roomRef, update); return;
                }
            }
        }

        function doActionB() {
            const now = Date.now();
            if (now - lastDashTime > 2000 && (Math.abs(myFacing.x) > 0 || Math.abs(myFacing.y) > 0)) {
                dashSpeedMult = 4.0; 
                lastDashTime = now;
                createParticles(myLocalPlayer.x + PLAYER_SIZE/2, myLocalPlayer.y + PLAYER_SIZE/2, '#00ffcc');
            }
        }

        function checkWall(nx, ny) {
            if (nx < 0 || ny < 0 || nx + PLAYER_SIZE > MAP_WIDTH || ny + PLAYER_SIZE > MAP_HEIGHT) return true;
            for (let obs of obstacles) {
                if (nx < obs.x + obs.w && nx + PLAYER_SIZE > obs.x && ny < obs.y + obs.h && ny + PLAYER_SIZE > obs.y) return true;
            }
            for (let p of mapPallets) {
                if (gameState['pallet_'+p.id] === 1) { 
                    if (nx < p.dropRect.x + p.dropRect.w && nx + PLAYER_SIZE > p.dropRect.x && ny < p.dropRect.y + p.dropRect.h && ny + PLAYER_SIZE > p.dropRect.y) return true;
                }
            }
            for (let npc of npcs) {
                if (gameState.dead_npcs && gameState.dead_npcs[npc.id]) continue;
                if (nx < npc.currentX + PLAYER_SIZE && nx + PLAYER_SIZE > npc.currentX && ny < npc.currentY + PLAYER_SIZE && ny + PLAYER_SIZE > npc.currentY) return true;
            }
            return false;
        }

        function checkStairs(px, py, now) {
            if (now - lastStairTime < 1000) return; 
            for (let s of stairs) {
                if (px < s.x + s.w && px + PLAYER_SIZE > s.x && py < s.y + s.h && py + PLAYER_SIZE > s.y) {
                    myLocalPlayer.y = s.targetY;
                    lastStairTime = now;
                    createParticles(myLocalPlayer.x, myLocalPlayer.y, '#00ffcc');
                    break;
                }
            }
        }

        function createParticles(x, y, color) {
            for(let i=0; i<15; i++) particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 400, vy: (Math.random() - 0.5) * 400, life: 1.0, color: color });
        }

        async function checkTags() {
            if (!user || !gameState.isPlaying || localCurrentGabri !== user.uid) return;
            const now = Date.now();
            if (now < localGabriSince + TAG_COOLDOWN_MS) return;

            for (let id in serverPlayers) {
                if (id === user.uid) continue;
                const p = gameEntities[id] || serverPlayers[id];
                const cx1 = myLocalPlayer.x + PLAYER_SIZE/2; const cy1 = myLocalPlayer.y + PLAYER_SIZE/2;
                const cx2 = p.x + PLAYER_SIZE/2; const cy2 = p.y + PLAYER_SIZE/2;
                
                if (Math.hypot(cx2 - cx1, cy2 - cy1) < PLAYER_SIZE * 0.9) { 
                    createParticles(p.x, p.y, '#ff3366'); 
                    const timeGained = now - localGabriSince;
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
                    const myRef = doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid);
                    
                    try {
                        Promise.all([
                            updateDoc(myRef, { timeAsGabri: increment(timeGained) }),
                            updateDoc(roomRef, { currentGabri: id, tagCounter: increment(1) })
                        ]);
                    } catch(e) {}
                    break;
                }
            }
        }

        function gameLoop(timestamp) {
            const dt = Math.min((timestamp - lastUpdateTime) / 1000, 0.1); 
            lastUpdateTime = timestamp;
            const now = Date.now();

            if (user) {
                if (gameState.isPlaying && gameState.hostId === user.uid && gameState.timeLeft > 0) {
                    if (now - lastHostTick > 1000) {
                        lastHostTick = now;
                        let updates = { timeLeft: gameState.timeLeft - 1 };
                        
                        if (updates.timeLeft <= 60 && !gameState.boss_active && gameState.boss_hp > 0 && !gameState.mg_dropped) {
                            updates.boss_active = true;
                        }
                        
                        // Boss Defeat Drop
                        if (gameState.boss_active && gameState.boss_hp <= 0 && !gameState.mg_dropped) {
                            updates.boss_active = false;
                            updates.mg_dropped = true;
                            updates.mg_x = gameState.boss_x + 60;
                            updates.mg_y = gameState.boss_y + 60;
                        }

                        if (gameState.boss_active && gameState.boss_hp > 0) {
                            let nearestId = null; let minDist = 9999;
                            for (let id in serverPlayers) {
                                if (serverPlayers[id].y > 2000) {
                                    let d = Math.hypot(serverPlayers[id].x - gameState.boss_x, serverPlayers[id].y - gameState.boss_y);
                                    if (d < minDist) { minDist = d; nearestId = id; }
                                }
                            }
                            if (nearestId) {
                                const target = serverPlayers[nearestId];
                                const angle = Math.atan2(target.y - gameState.boss_y, target.x - gameState.boss_x);
                                updates.boss_tx = gameState.boss_x + Math.cos(angle) * 180; 
                                updates.boss_ty = gameState.boss_y + Math.sin(angle) * 180;
                                updates.boss_x = updates.boss_tx; 
                            }
                        }
                        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
                        updateDoc(roomRef, updates).catch(()=>{});
                    }
                }

                if (gameState.isPlaying && gameState.timeLeft > 0 && screensLayer.style.display === 'none') {
                    
                    const move = getMovementVector();
                    
                    if (dashSpeedMult > 1.0) { dashSpeedMult -= dt * 6; if (dashSpeedMult < 1.0) dashSpeedMult = 1.0; }

                    let mx = (move.dx * BASE_SPEED * dashSpeedMult + kb_vx) * dt;
                    let my = (move.dy * BASE_SPEED * dashSpeedMult + kb_vy) * dt;
                    kb_vx *= 0.85; kb_vy *= 0.85; // Knockback Friction

                    if (Math.abs(move.dx) > 0.1 || Math.abs(move.dy) > 0.1) {
                        const len = Math.hypot(move.dx, move.dy);
                        myFacing = { x: move.dx/len, y: move.dy/len };
                    }

                    if (!checkWall(myLocalPlayer.x + mx, myLocalPlayer.y)) myLocalPlayer.x += mx;
                    if (!checkWall(myLocalPlayer.x, myLocalPlayer.y + my)) myLocalPlayer.y += my;

                    checkStairs(myLocalPlayer.x, myLocalPlayer.y, now);

                    if (gameState.boss_active && gameState.boss_hp > 0 && myLocalPlayer.y > 2000) {
                        if (Math.hypot(myLocalPlayer.x - gameState.boss_x, myLocalPlayer.y - gameState.boss_y) < 100) {
                            myLocalPlayer.x -= myFacing.x * 200; 
                            myLocalPlayer.y -= myFacing.y * 200;
                            createParticles(myLocalPlayer.x, myLocalPlayer.y, '#ff0000');
                        }
                    }

                    // LOKALE BALL PHYSIK (Smooth & Bouncy)
                    if (!gameState.ball_owner && localBall.active) {
                        let bnx = localBall.x + localBall.vx * dt;
                        let bny = localBall.y + localBall.vy * dt;
                        let hitX = checkWall(bnx, localBall.y);
                        let hitY = checkWall(localBall.x, bny);
                        
                        if (hitX) localBall.vx *= -0.7; else localBall.x = bnx;
                        if (hitY) localBall.vy *= -0.7; else localBall.y = bny;
                        
                        localBall.vx *= 0.98; localBall.vy *= 0.98; // Friction
                        
                        localBall.vz -= 800 * dt; // Gravity
                        localBall.z += localBall.vz * dt;
                        if (localBall.z < 0) {
                            localBall.z = 0;
                            if (localBall.vz < -50) localBall.vz *= -0.6; else { localBall.vz = 0; localBall.vx *= 0.9; localBall.vy *= 0.9; }
                        }

                        // Korb Check
                        if (localBall.z > 80 && Math.hypot(localBall.x - (hoop.x + hoop.w/2), localBall.y - (hoop.y + 10)) < 40) {
                            if (now - lastConfettiTs > 1000) {
                                spawnConfetti(hoop.x + hoop.w/2, hoop.y + 10);
                                lastConfettiTs = now;
                            }
                        }
                    }

                    const targetCamX = myLocalPlayer.x + PLAYER_SIZE/2 - canvas.width/2;
                    const targetCamY = myLocalPlayer.y + PLAYER_SIZE/2 - canvas.height/2;
                    camera.x += (targetCamX - camera.x) * 10 * dt;
                    if (Math.abs(targetCamY - camera.y) > 1000) camera.y = targetCamY; 
                    else camera.y += (targetCamY - camera.y) * 10 * dt;
                    
                    camera.x = Math.max(0, Math.min(camera.x, MAP_WIDTH - canvas.width));
                    camera.y = Math.max(0, Math.min(camera.y, MAP_HEIGHT - canvas.height));

                    for(let id in serverPlayers) {
                        if (id !== user.uid && gameEntities[id]) {
                            if (Math.abs(serverPlayers[id].y - gameEntities[id].y) > 1000) gameEntities[id].y = serverPlayers[id].y;
                            else gameEntities[id].y += (serverPlayers[id].y - gameEntities[id].y) * 15 * dt;
                            gameEntities[id].x += (serverPlayers[id].x - gameEntities[id].x) * 15 * dt;
                        }
                    }

                    if (now - lastSyncTime > 100) { 
                        lastSyncTime = now;
                        const myRef = doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid);
                        updateDoc(myRef, { x: Math.round(myLocalPlayer.x), y: Math.round(myLocalPlayer.y), lastSeen: now, roomId: currentRoomId }).catch(()=>{});
                    }

                    checkTags();

                    const min = Math.floor(gameState.timeLeft / 60);
                    const sec = gameState.timeLeft % 60;
                    document.getElementById('timerDisplay').innerText = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
                    document.getElementById('myTimeDisplay').innerText = `Zeit als Gabri: ${(getTotalGabriTime(user.uid)/1000).toFixed(1)}s`;
                    floorDisplay.innerText = myLocalPlayer.y > 2000 ? "OBERGESCHOSS (OG)" : "ERDGESCHOSS (EG)";
                
                    render(dt, now);
                }
            }
            requestAnimationFrame(gameLoop);
        }

        function render(dt, nowTime) {
            // NPCs Update
            npcs.forEach(npc => {
                const offset = Math.sin(nowTime * npc.speed);
                npc.currentX = npc.startX + npc.moveX * offset;
                npc.currentY = npc.startY + npc.moveY * offset;
            });

            const isInOG = camera.y > 1500;
            ctx.fillStyle = isInOG ? '#0b111a' : '#0d0d12'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 2;
            const gridSize = 100;
            const startX = Math.floor(camera.x / gridSize) * gridSize; const startY = Math.floor(camera.y / gridSize) * gridSize;
            ctx.beginPath();
            for(let x = startX; x < camera.x + canvas.width; x += gridSize) if(x >= 0 && x <= MAP_WIDTH) { ctx.moveTo(x, 0); ctx.lineTo(x, MAP_HEIGHT); }
            for(let y = startY; y < camera.y + canvas.height; y += gridSize) if(y >= 0 && y <= MAP_HEIGHT) { ctx.moveTo(0, y); ctx.lineTo(MAP_WIDTH, y); }
            ctx.stroke();

            for(let s of stairs) {
                if ((isInOG && s.y < 2000) || (!isInOG && s.y > 2000)) continue;
                ctx.fillStyle = '#222'; ctx.fillRect(s.x, s.y, s.w, s.h);
                ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 4; ctx.strokeRect(s.x, s.y, s.w, s.h);
                ctx.beginPath();
                for(let i=0; i<10; i++) { ctx.moveTo(s.x, s.y + (i * s.h/10)); ctx.lineTo(s.x + s.w, s.y + (i * s.h/10)); }
                ctx.stroke();
                ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(s.x, s.y + s.h/2 - 15, s.w, 30);
                ctx.fillStyle = '#ffcc00'; ctx.font = '14px "Press Start 2P"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(s.label, s.x + s.w/2, s.y + s.h/2);
            }

            for(let obs of obstacles) {
                if (obs.x + (obs.w||0) < camera.x - 200 || obs.x > camera.x + canvas.width + 200 || obs.y + (obs.h||0) < camera.y - 200 || obs.y > camera.y + canvas.height + 200) continue;

                if (obs.isWall) {
                    ctx.fillStyle = '#1a1a24'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                    ctx.strokeStyle = 'rgba(0, 255, 204, 0.4)'; ctx.lineWidth = 2; ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
                } else if (obs.isTable) {
                    ctx.fillStyle = '#5D4037'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                    ctx.strokeStyle = '#3E2723'; ctx.lineWidth = 3; ctx.strokeRect(obs.x+1, obs.y+1, obs.w-2, obs.h-2);
                } else if (obs.isChair) {
                    ctx.fillStyle = '#4E342E'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                    ctx.fillStyle = '#3E2723';
                    if (obs.dir === 'up') ctx.fillRect(obs.x, obs.y, obs.w, 5); else ctx.fillRect(obs.x, obs.y + obs.h - 5, obs.w, 5);
                }
            }

            for(let p of mapPallets) {
                const pState = gameState['pallet_'+p.id] || 0;
                if (pState === 0) { 
                    ctx.fillStyle = '#5c3a21'; ctx.fillRect(p.upRect.x, p.upRect.y, p.upRect.w, p.upRect.h);
                } else if (pState === 1) { 
                    ctx.fillStyle = '#8b5a2b'; ctx.fillRect(p.dropRect.x, p.dropRect.y, p.dropRect.w, p.dropRect.h);
                    ctx.fillStyle = '#5c3a21';
                    if (p.dropRect.w > p.dropRect.h) { for(let i=0; i<5; i++) ctx.fillRect(p.dropRect.x + i*40 + 10, p.dropRect.y, 10, p.dropRect.h); } 
                    else { for(let i=0; i<5; i++) ctx.fillRect(p.dropRect.x, p.dropRect.y + i*40 + 10, p.dropRect.w, 10); }
                } else if (pState === 2) { 
                    ctx.fillStyle = '#8b5a2b';
                    ctx.fillRect(p.dropRect.x + 10, p.dropRect.y + 10, 20, 10);
                    ctx.fillRect(p.dropRect.x + p.dropRect.w - 30, p.dropRect.y + p.dropRect.h - 20, 20, 10);
                }
            }

            if (!isInOG) {
                ctx.fillStyle = '#ffffff'; ctx.fillRect(hoop.x, hoop.y - 10, hoop.w, 10); 
                ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 4; ctx.beginPath();
                ctx.arc(hoop.x + hoop.w/2, hoop.y + 10, 30, 0, Math.PI*2); ctx.stroke(); 
            }

            for(let l of labels) {
                if (l.x < camera.x - 200 || l.x > camera.x + canvas.width + 200 || l.y < camera.y - 200 || l.y > camera.y + canvas.height + 200) continue;
                ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.font = 'bold 36px "Outfit"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(l.text, l.x, l.y);
            }

            // NPCs (Schüler & Lehrer & Cheerleader)
            for(let npc of npcs) {
                if (gameState.dead_npcs && gameState.dead_npcs[npc.id]) continue; // Überspringen wenn tot
                if ((isInOG && npc.currentY < 2000) || (!isInOG && npc.currentY > 2000)) continue;

                ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 10; ctx.imageSmoothingEnabled = false;
                
                let isMoving = Math.abs(npc.moveX) > 0 || Math.abs(npc.moveY) > 0;
                let frame = isMoving ? Math.floor(nowTime / 150) % 2 : 0;
                let sprite = texStudent[frame];
                if (npc.type === 'teacher') sprite = texTeacher[frame];
                else if (npc.type === 'cheerleader') sprite = texCheer[frame];

                ctx.drawImage(sprite, npc.currentX, npc.currentY, PLAYER_SIZE, PLAYER_SIZE); ctx.shadowBlur = 0;
            }

            if (isInOG) {
                for(let i=1; i<=4; i++) {
                    let sKey = 'sword'+i;
                    if (!gameState[sKey+'_owner']) {
                        let sx = swordBases[sKey].x; let sy = swordBases[sKey].y;
                        ctx.fillStyle = '#aaaaaa'; ctx.fillRect(sx, sy, 6, 30); 
                        ctx.fillStyle = '#ffcc00'; ctx.fillRect(sx-6, sy+20, 18, 6); 
                    }
                }
            }

            // MG Drop Rendern
            if (isInOG && gameState.mg_dropped && !gameState.mg_owner) {
                ctx.fillStyle = '#444'; ctx.fillRect(gameState.mg_x - 15, gameState.mg_y, 30, 8); 
                ctx.fillStyle = '#222'; ctx.fillRect(gameState.mg_x - 5, gameState.mg_y + 8, 10, 10); 
            }

            if (isInOG && gameState.boss_active && gameState.boss_hp > 0) {
                let bx = gameState.boss_x; let by = gameState.boss_y;
                if (gameEntities['boss']) {
                    gameEntities['boss'].x += (gameState.boss_tx - gameEntities['boss'].x) * 5 * dt;
                    gameEntities['boss'].y += (gameState.boss_ty - gameEntities['boss'].y) * 5 * dt;
                    bx = gameEntities['boss'].x; by = gameEntities['boss'].y;
                } else { gameEntities['boss'] = {x: bx, y: by}; }

                ctx.imageSmoothingEnabled = false;
                let bFrame = Math.floor(nowTime / 250) % 2;
                ctx.drawImage(texBoss[bFrame], bx, by, 120, 120); 
                
                if (gameState.timeLeft > 55) {
                    ctx.fillStyle = 'rgba(255,0,0,0.5)';
                    ctx.font = 'bold 60px "Press Start 2P"'; ctx.textAlign = 'center';
                    ctx.fillText("ISHIN IST ERWACHT!", camera.x + canvas.width/2, camera.y + 200);
                }
                
                ctx.fillStyle = '#ff0000'; ctx.fillRect(bx, by - 20, 120, 12);
                ctx.fillStyle = '#00ffcc'; ctx.fillRect(bx, by - 20, 120 * (Math.max(0, gameState.boss_hp)/500), 12);
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 16px "Outfit"'; ctx.textAlign = 'center';
                ctx.fillText("ISHIN", bx + 60, by - 30);
            }

            // Laser Strahl Rendern
            if (gameState.last_laser && nowTime - gameState.last_laser.ts < 150) {
                ctx.strokeStyle = 'rgba(255, 51, 102, 0.8)'; 
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(gameState.last_laser.x1, gameState.last_laser.y1);
                ctx.lineTo(gameState.last_laser.x2, gameState.last_laser.y2);
                ctx.stroke();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke(); 
            }

            // Ball Rendern 
            let drawBallX = localBall.x; let drawBallY = localBall.y; let drawBallZ = localBall.z;
            if (gameState.ball_owner) {
                const owner = serverPlayers[gameState.ball_owner] || (gameState.ball_owner === user.uid ? myLocalPlayer : null);
                if (owner) { drawBallX = owner.x + 20; drawBallY = owner.y - 20; drawBallZ = 0; } 
            }
            if ((isInOG && drawBallY > 2000) || (!isInOG && drawBallY < 2000)) {
                ctx.fillStyle = '#ff6600';
                ctx.beginPath(); ctx.arc(drawBallX, drawBallY - drawBallZ, 16, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
            }

            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
                if(p.isConfetti) p.vy += 600 * dt; 
                if(p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life; 
                ctx.fillRect(p.x, p.y, 8, 8); ctx.globalAlpha = 1.0;
            }

            for(let id in serverPlayers) {
                const sp = serverPlayers[id];
                const isMe = (id === user?.uid);
                const isGabri = (id === localCurrentGabri);
                
                let px = isMe ? myLocalPlayer.x : (gameEntities[id]?.x || sp.x);
                let py = isMe ? myLocalPlayer.y : (gameEntities[id]?.y || sp.y);

                if (!isMe && ((isInOG && py < 2000) || (!isInOG && py > 2000))) continue;

                if (isGabri) { ctx.shadowColor = '#ff3366'; ctx.shadowBlur = 20 + Math.abs(Math.sin(nowTime * 0.005)) * 10; } 
                else { ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 10; }

                ctx.imageSmoothingEnabled = false;
                
                let isMoving = isMe ? (Math.abs(getMovementVector().dx) > 0 || Math.abs(getMovementVector().dy) > 0) : (Math.hypot(sp.x - px, sp.y - py) > 5);
                let frame = isMoving ? Math.floor(nowTime / 150) % 2 : 0;
                
                ctx.drawImage(isGabri ? texGabri[frame] : texNormal[frame], px, py, PLAYER_SIZE, PLAYER_SIZE);
                ctx.shadowBlur = 0; 

                let playerHeldItem = null;
                if (isMe) playerHeldItem = myHeldItem;
                else { 
                    for(let i=1; i<=4; i++) if (gameState['sword'+i+'_owner'] === id) playerHeldItem = 'sword'; 
                    if (gameState.mg_owner === id) playerHeldItem = 'mg';
                }
                
                if (playerHeldItem && playerHeldItem.startsWith('sword')) {
                    // Schwert Animation Zeichnen
                    if (isMe && nowTime - lastSwordAttack < 200) {
                        let prog = (nowTime - lastSwordAttack) / 200;
                        ctx.save();
                        ctx.translate(px + 20, py + 20);
                        ctx.rotate(swordStartAngle + (prog * Math.PI)); 
                        ctx.fillStyle = '#aaaaaa'; ctx.fillRect(15, -3, 30, 6);
                        ctx.fillStyle = '#ffcc00'; ctx.fillRect(10, -9, 6, 18);
                        ctx.restore();
                    } else {
                        ctx.fillStyle = '#aaaaaa'; ctx.fillRect(px + 35, py - 5, 6, 30);
                        ctx.fillStyle = '#ffcc00'; ctx.fillRect(px + 31, py + 20, 14, 6); // Guard
                    }
                } else if (playerHeldItem === 'mg') {
                    ctx.fillStyle = '#444'; ctx.fillRect(px + 10, py + 15, 30, 6);
                }

                if (isGabri && nowTime < localGabriSince + TAG_COOLDOWN_MS) {
                    const progress = (nowTime - localGabriSince) / TAG_COOLDOWN_MS;
                    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 3; ctx.beginPath();
                    ctx.arc(px + PLAYER_SIZE/2, py + PLAYER_SIZE/2, PLAYER_SIZE*0.8, -Math.PI/2, (-Math.PI/2) + (Math.PI*2*progress)); ctx.stroke();
                }

                ctx.fillStyle = isGabri ? '#ff99aa' : (isMe ? '#00ffcc' : 'white');
                ctx.font = '600 14px "Outfit"'; ctx.textAlign = 'center';
                const textWidth = ctx.measureText(sp.name).width;
                ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(px + PLAYER_SIZE/2 - textWidth/2 - 4, py - 24, textWidth + 8, 18);
                ctx.fillStyle = isGabri ? '#ff99aa' : (isMe ? '#00ffcc' : 'white');
                ctx.fillText(sp.name, px + PLAYER_SIZE/2, py - 10);
            }

            ctx.restore(); 

            // UI OVERLAY: JOYSTICKS & BUTTONS
            ctx.save();
            ctx.beginPath(); ctx.arc(joyBase.x, joyBase.y, joyBase.r, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(joystick.nx, joystick.ny, 25, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(0, 255, 204, 0.4)'; ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 15; ctx.fill();
            
            // A Button
            ctx.beginPath(); ctx.arc(btnA.x, btnA.y, btnA.r, 0, Math.PI*2);
            ctx.fillStyle = btnA.active ? 'rgba(255,51,102,0.6)' : 'rgba(255,51,102,0.2)'; 
            ctx.strokeStyle = 'rgba(255,51,102,0.4)'; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = 'bold 16px "Outfit"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText("A", btnA.x, btnA.y-8);
            ctx.font = '10px "Outfit"'; ctx.fillText("(SPACE)", btnA.x, btnA.y+8);

            // B Button
            ctx.beginPath(); ctx.arc(btnB.x, btnB.y, btnB.r, 0, Math.PI*2);
            ctx.fillStyle = btnB.active ? 'rgba(0,255,204,0.6)' : 'rgba(0,255,204,0.2)'; 
            ctx.strokeStyle = 'rgba(0,255,204,0.4)'; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = 'bold 16px "Outfit"'; 
            ctx.fillText("B", btnB.x, btnB.y-8);
            ctx.font = '10px "Outfit"'; ctx.fillText("(SHIFT)", btnB.x, btnB.y+8);
            ctx.restore();
        }
    </script>
</body>
</html>
