<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d0d12">
    <title>Gabri-Flucht - Elite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #00ffcc;
            --gabri: #ff3366;
            --glass-bg: rgba(20, 20, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            font-family: 'Outfit', sans-serif;
            touch-action: none; 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0d12;
            overflow: hidden;
            position: fixed; 
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            opacity: 0; 
            transition: opacity 0.5s;
        }

        .game-running canvas {
            opacity: 1;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border-radius: 16px;
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: env(safe-area-inset-top, 20px) 20px 20px 20px;
            z-index: 10;
        }

        #screens-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0d12; 
            z-index: 50;
            transition: opacity 0.3s ease;
        }

        .screen { display: none; width: 100%; max-width: 400px; padding: 20px; pointer-events: auto; }
        .screen.active { display: block; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            color: white;
            text-shadow: 0 0 10px var(--primary);
            font-size: 24px;
            margin-bottom: 10px; 
            line-height: 1.4;
        }

        .input-elite {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1);
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            text-align: center;
            outline: none;
            transition: all 0.2s;
        }
        .input-elite:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,255,204,0.3); }

        .btn-elite {
            width: 100%;
            background: linear-gradient(135deg, #00ffcc 0%, #00b38f 100%);
            color: #000;
            font-weight: 800;
            font-size: 18px;
            padding: 15px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.1s, box-shadow 0.1s;
            pointer-events: auto;
        }
        .btn-elite:active { transform: scale(0.96); }
        .btn-elite:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .btn-danger { background: linear-gradient(135deg, #ff3366 0%, #cc0033 100%); color: white; }

        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: auto;
        }

        .hud-box {
            padding: 10px 20px;
            border-radius: 12px;
            color: white;
        }

        .timer-text { font-family: 'Press Start 2P', cursive; font-size: 18px; color: var(--primary); }
        .status-text { font-size: 16px; font-weight: 600; text-align: right; }
        
        .is-gabri-alert {
            animation: pulse-gabri 1s infinite alternate;
            color: var(--gabri) !important;
            text-shadow: 0 0 10px var(--gabri);
        }

        @keyframes pulse-gabri {
            from { box-shadow: 0 0 10px var(--gabri), inset 0 0 10px var(--gabri); border-color: var(--gabri); }
            to { box-shadow: 0 0 30px var(--gabri), inset 0 0 20px var(--gabri); border-color: transparent; }
        }

        .player-list { max-height: 200px; overflow-y: auto; margin-bottom: 20px; pointer-events: auto; }
        .player-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #ccc;
        }
        .player-item:last-child { border: none; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #00ffcc; box-shadow: 0 0 8px #00ffcc; }

        .rank-row {
            display: flex; justify-content: space-between; padding: 12px;
            background: rgba(255,255,255,0.05); margin-bottom: 8px; border-radius: 8px;
            font-weight: 600; color: white;
        }
        .rank-loser { background: rgba(255, 51, 102, 0.2); border: 1px solid var(--gabri); color: #ff99aa;}
        .rank-winner { background: rgba(0, 255, 204, 0.1); border: 1px solid var(--primary); color: var(--primary);}

        #floorDisplay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            text-shadow: 0 0 5px var(--primary);
            pointer-events: none;
            display: none;
        }
        .game-running #floorDisplay { display: block; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="floorDisplay">EG</div>

    <div id="ui-layer" style="display: none;">
        <div class="hud-header">
            <div class="glass-panel hud-box" id="hudTimerBox">
                <div class="timer-text" id="timerDisplay">03:00</div>
            </div>
            <div class="glass-panel hud-box" id="hudStatusBox">

            </div>

    </div>

    <div id="screens-layer">
        <div id="screen-login" class="screen glass-panel active">
            <h1>GABRI<br><span style="color:white; font-size: 16px;">FLUCHT</span></h1>
            <p class="text-gray-300 text-center mb-6 text-sm">
                Überlebe den Schulhof.<br>
                <span class="text-xs text-primary">(Touch-Joysticks oder WASD/Leertaste)</span>
            </p>
            <input type="text" id="playerNameInput" class="input-elite" placeholder="Dein Name" maxlength="12" autocomplete="off">

        </div>

        <div id="screen-room" class="screen glass-panel">
            <h2 class="text-2xl font-bold text-center text-white mb-2">SERVER RAUM</h2>
            <p class="text-gray-300 text-center mb-6 text-sm">Gib einen Code ein, um mit deinen Freunden zu spielen.</p>
            <input type="text" id="roomCodeInput" class="input-elite uppercase" placeholder="Z.B. 1234" maxlength="6" autocomplete="off" style="text-transform: uppercase;">
            <button id="btnJoinRoom" class="btn-elite">RAUM BETRETEN</button>
        </div>

        <div id="screen-lobby" class="screen glass-panel">
            <h2 id="lobbyTitle" class="text-2xl font-bold text-center text-primary mb-2">LOBBY</h2>
            <p class="text-center text-gray-400 text-sm mb-4">Warte auf Mitspieler... (Namen in der Liste)</p>
            <div class="glass-panel player-list p-2" id="lobbyPlayerList"></div>
            <button id="btnStartGame" class="btn-elite">RUNDE STARTEN (3 MIN)</button>
        </div>

        <div id="screen-leaderboard" class="screen glass-panel">
            <h2 class="text-2xl font-bold text-center mb-1 text-white">RUNDE BEENDET</h2>
            <p class="text-center text-red-400 text-sm mb-6 font-semibold">Wer am längsten Gabri war, verliert!</p>
            <div id="leaderboardList" class="mb-6 max-h-[250px] overflow-y-auto pointer-events-auto"></div>
            <button id="btnRestart" class="btn-elite btn-danger">ZURÜCK ZUR LOBBY</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gabri-elite-game';
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            firebaseConfig = {
                apiKey: "AIzaSyDWM2Dnq72MeWuZcV3uT4YXg0G9nyZIVAc",
                authDomain: "gabri-4f94c.firebaseapp.com",
                projectId: "gabri-4f94c",
                storageBucket: "gabri-4f94c.firebasestorage.app",
                messagingSenderId: "415746495575",
                appId: "1:415746495575:web:c9730e19c9ac3e6d923f12"
            };
        }
        
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (error) {
            console.error("Firebase:", error);
        }

        const GAME_DURATION_SEC = 180; 
        const MAP_WIDTH = 2500;
        const MAP_HEIGHT = 4000; 
        const PLAYER_SIZE = 40;
        const BASE_SPEED = 300; 
        const TAG_COOLDOWN_MS = 2000;

        let user = null;
        let myName = "Player";
        let currentRoomId = null; 
        
        let serverPlayers = {}; 
        let gameEntities = {};  
        let gameState = { 
            isPlaying: false, timeLeft: 0, currentGabri: null, hostId: null, roundId: null, tagCounter: 0,
            ball_x: 1850, ball_y: 1500, ball_owner: null, ball_ts: 0, ball_startX: 1850, ball_startY: 1500,
            boss_active: false, boss_hp: 100, boss_x: 1250, boss_y: 3000, boss_tx: 1250, boss_ty: 3000,
            sword1_owner: null, sword2_owner: null, sword3_owner: null, sword4_owner: null
        };
        
        let currentRoundId = null;
        let localCurrentGabri = null;
        let localGabriSince = 0;
        let localTagCounter = 0;
        let lastHostTick = 0;
        let lastStairTime = 0; 
        let lastConfettiTs = 0;

        let myLocalPlayer = { x: 0, y: 0, vx: 0, vy: 0 };
        let myFacing = { x: 1, y: 0 }; 
        let myHeldItem = null; // 'ball' oder 'swordX'
        
        let lastUpdateTime = performance.now();
        let lastSyncTime = 0;
        let particles = [];

        const screensLayer = document.getElementById('screens-layer');
        const uiLayer = document.getElementById('ui-layer');
        const floorDisplay = document.getElementById('floorDisplay');
        const canvasElement = document.getElementById('gameCanvas');
        let camera = { x: 0, y: 0 };

        // --- MAP BUILDER ---
        let obstacles = [];
        let labels = [];
        let stairs = [];
        
        // Basketballkorb (Turnhalle)
        const hoop = { x: 1850, y: 1115, w: 80, h: 20 };

        // Schwert Spawnpunkte (um den Boss im OG)
        const swordBases = {
            sword1: {x: 1150, y: 2900},
            sword2: {x: 1350, y: 2900},
            sword3: {x: 1150, y: 3100},
            sword4: {x: 1350, y: 3100}
        };

        obstacles.push({x: -50, y: -50, w: MAP_WIDTH+100, h: 50, isWall: true});
        obstacles.push({x: -50, y: -50, w: 50, h: 2000+100, isWall: true});
        obstacles.push({x: MAP_WIDTH, y: -50, w: 50, h: 2000+100, isWall: true});
        obstacles.push({x: -50, y: 1980, w: MAP_WIDTH+100, h: 40, isWall: true});
        obstacles.push({x: -50, y: MAP_HEIGHT, w: MAP_WIDTH+100, h: 50, isWall: true});
        obstacles.push({x: -50, y: 2000, w: 50, h: 2000+100, isWall: true});
        obstacles.push({x: MAP_WIDTH, y: 2000, w: 50, h: 2000+100, isWall: true});

        function buildRoom(rx, ry, rw, rh, doorEdge, doorOffset, doorWidth, labelText, isEmptyRoom=false) {
            const wall = 20; 
            if (doorEdge === 'top') {
                obstacles.push({x: rx, y: ry, w: doorOffset, h: wall, isWall: true});
                obstacles.push({x: rx + doorOffset + doorWidth, y: ry, w: rw - doorOffset - doorWidth, h: wall, isWall: true});
            } else { obstacles.push({x: rx, y: ry, w: rw, h: wall, isWall: true}); }

            if (doorEdge === 'bottom') {
                obstacles.push({x: rx, y: ry + rh - wall, w: doorOffset, h: wall, isWall: true});
                obstacles.push({x: rx + doorOffset + doorWidth, y: ry + rh - wall, w: rw - doorOffset - doorWidth, h: wall, isWall: true});
            } else { obstacles.push({x: rx, y: ry + rh - wall, w: rw, h: wall, isWall: true}); }

            if (doorEdge === 'left') {
                obstacles.push({x: rx, y: ry, w: wall, h: doorOffset, isWall: true});
                obstacles.push({x: rx, y: ry + doorOffset + doorWidth, w: wall, h: rh - doorOffset - doorWidth, isWall: true});
            } else { obstacles.push({x: rx, y: ry, w: wall, h: rh, isWall: true}); }

            if (doorEdge === 'right') {
                obstacles.push({x: rx + rw - wall, y: ry, w: wall, h: doorOffset, isWall: true});
                obstacles.push({x: rx + rw - wall, y: ry + doorOffset + doorWidth, w: wall, h: rh - doorOffset - doorWidth, isWall: true});
            } else { obstacles.push({x: rx + rw - wall, y: ry, w: wall, h: rh, isWall: true}); }

            if (labelText) labels.push({x: rx + rw/2, y: ry + rh/2, text: labelText});

            if (!isEmptyRoom) {
                let cols = Math.floor((rw - wall*2) / 140);
                let rows = Math.floor((rh - wall*2) / 140);
                let padX = (rw - wall*2 - (cols * 140)) / 2;
                let padY = (rh - wall*2 - (rows * 140)) / 2;
                for (let r=0; r<rows; r++) {
                    for (let c=0; c<cols; c++) {
                        let tx = rx + wall + padX + c*140 + 30; let ty = ry + wall + padY + r*140 + 30;
                        obstacles.push({x: tx, y: ty, w: 80, h: 40, isTable: true});
                        obstacles.push({x: tx + 10, y: ty - 25, w: 20, h: 20, isChair: true, dir: 'up'});
                        obstacles.push({x: tx + 50, y: ty - 25, w: 20, h: 20, isChair: true, dir: 'up'});
                        obstacles.push({x: tx + 10, y: ty + 45, w: 20, h: 20, isChair: true, dir: 'down'});
                        obstacles.push({x: tx + 50, y: ty + 45, w: 20, h: 20, isChair: true, dir: 'down'});
                    }
                }
            }
        }

        buildRoom(100, 100, 800, 500, 'right', 200, 120, 'MATHE (EG)');
        buildRoom(1500, 100, 900, 500, 'left', 200, 120, 'BIOLOGIE (EG)');
        buildRoom(100, 1300, 700, 600, 'top', 300, 150, 'MENSA (EG)');
        buildRoom(1300, 1100, 1100, 800, 'left', 400, 200, 'TURNHALLE (EG)', true); 

        buildRoom(100, 2100, 800, 500, 'right', 200, 120, 'CHEMIE (OG)');
        buildRoom(1500, 2100, 900, 500, 'left', 200, 120, 'PHYSIK (OG)');
        buildRoom(100, 3300, 1000, 600, 'top', 400, 120, 'LEHRERZIMMER (OG)');
        buildRoom(1500, 3300, 900, 600, 'top', 300, 120, 'BIBLIOTHEK (OG)');

        stairs.push({ x: 1000, y: 300, w: 120, h: 160, targetY: 2300, label: 'ZUM OG' });
        stairs.push({ x: 1000, y: 2300, w: 120, h: 160, targetY: 300, label: 'ZUM EG' });
        stairs.push({ x: 900, y: 1700, w: 160, h: 120, targetY: 3700, label: 'ZUM OG' });
        stairs.push({ x: 900, y: 3700, w: 160, h: 120, targetY: 1700, label: 'ZUM EG' });

        const teachers = [
            { startX: 1150, startY: 800, moveX: 0, moveY: 600, speed: 0.001, name: "Herr Müller", currentX: 0, currentY: 0 },
            { startX: 200, startY: 800, moveX: 600, moveY: 0, speed: 0.0015, name: "Frau Schmidt", currentX: 0, currentY: 0 },
            { startX: 1150, startY: 2800, moveX: 0, moveY: 500, speed: 0.0012, name: "Herr Weber", currentX: 0, currentY: 0 }
        ];

        // ANIMIERTE SPRITES (Frame 0 und 1)
        function createPixelSprite(type, frame=0) {
            const canvas = document.createElement('canvas');
            canvas.width = 12; canvas.height = 12;
            const ctx = canvas.getContext('2d');
            
            const isGabri = type === 'gabri';
            const isTeacher = type === 'teacher';
            const isBoss = type === 'boss';

            const skin = isGabri ? '#ff99aa' : (isTeacher ? '#eebb99' : (isBoss ? '#ff0000' : '#ffcba4'));
            const shirt = isGabri ? '#ff3366' : (isTeacher ? '#555555' : (isBoss ? '#220000' : '#00ffcc'));
            const pants = isBoss ? '#440000' : '#1a1a24';
            const hair = isTeacher ? '#cccccc' : (isBoss ? '#ffaa00' : '#1a1a24');

            let layout = [
                [0,0,0,0,6,6,6,6,0,0,0,0], [0,0,0,6,2,2,2,2,6,0,0,0], [0,0,6,2,0,2,2,0,2,6,0,0],
                [0,0,6,2,2,2,2,2,2,6,0,0], [0,0,0,6,2,2,2,2,6,0,0,0], [0,0,3,3,3,3,3,3,3,3,0,0],
                [0,3,3,3,3,3,3,3,3,3,3,0], [0,3,3,3,3,3,3,3,3,3,3,0], [0,3,0,4,4,4,4,4,4,0,3,0],
                [0,0,0,4,4,0,0,4,4,0,0,0], [0,0,5,5,0,0,0,0,5,5,0,0]
            ];

            // Gehanimation: Beine verschieben
            if (frame === 1) {
                layout[9] = [0,0,0,4,4,0,0,0,0,0,0,0];
                layout[10]= [0,0,5,5,0,0,0,4,4,0,0,0];
            }

            for(let y=0; y<11; y++) {
                for(let x=0; x<12; x++) {
                    let p = layout[y][x];
                    if(p!==0){
                        switch(p){
                            case 6: ctx.fillStyle = hair; break; case 1: case 4: ctx.fillStyle = pants; break; 
                            case 2: ctx.fillStyle = skin; break; case 3: ctx.fillStyle = shirt; break;
                            case 5: ctx.fillStyle = '#111'; break;
                        }
                        ctx.fillRect(x, y, 1, 1);
                    }
                }
            }
            return canvas;
        }
        const texNormal = [createPixelSprite('normal', 0), createPixelSprite('normal', 1)];
        const texGabri = [createPixelSprite('gabri', 0), createPixelSprite('gabri', 1)];
        const texTeacher = [createPixelSprite('teacher', 0), createPixelSprite('teacher', 1)];
        const texBoss = [createPixelSprite('boss', 0), createPixelSprite('boss', 1)];

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                user = auth.currentUser;
                if (user) switchScreen('screen-room');
            } catch (e) {
                alert("Firebase Fehler beim Login: " + e.message);
                document.getElementById('btnJoin').innerText = "WEITER";
                document.getElementById('btnJoin').disabled = false;
            }
        };

        document.getElementById('btnJoin').addEventListener('click', async () => {
            const name = document.getElementById('playerNameInput').value.trim();
            if (!name) return;
            myName = name.substring(0, 12);
            document.getElementById('btnJoin').innerText = "LÄDT...";
            document.getElementById('btnJoin').disabled = true; 
            await initAuth(); 
        });

        if (auth) {
            onAuthStateChanged(auth, (currentUser) => {
                if (currentUser) user = currentUser;
            });
        }

        document.getElementById('btnJoinRoom').addEventListener('click', () => {
            let code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if (!code) code = Math.random().toString(36).substring(2, 6).toUpperCase();
            currentRoomId = code;
            document.getElementById('lobbyTitle').innerText = "RAUM: " + currentRoomId;

            myLocalPlayer.x = 1150 + Math.random()*100;
            myLocalPlayer.y = 800 + Math.random()*100;
            camera.x = myLocalPlayer.x - window.innerWidth/2;
            camera.y = myLocalPlayer.y - window.innerHeight/2;

            const playerRef = doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid);
            setDoc(playerRef, { id: user.uid, name: myName, roomId: currentRoomId, x: myLocalPlayer.x, y: myLocalPlayer.y, timeAsGabri: 0, lastSeen: Date.now() });

            setupFirebaseListeners();
            requestAnimationFrame(gameLoop);
            switchScreen('screen-lobby');
        });

        function setupFirebaseListeners() {
            if (!user || !currentRoomId) return; 
            
            const playersRef = collection(db, 'artifacts', appId, 'public', 'data', 'players');
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);

            onSnapshot(playersRef, (snapshot) => {
                const now = Date.now();
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.roomId === currentRoomId && now - data.lastSeen < 10000) {
                        serverPlayers[doc.id] = data;
                        if (!gameEntities[doc.id] && doc.id !== user.uid) gameEntities[doc.id] = { x: data.x, y: data.y };
                    } else {
                        delete serverPlayers[doc.id]; 
                        if (doc.id !== user.uid) delete gameEntities[doc.id];
                    }
                });
                updateLobbyUI();
            });

            onSnapshot(roomRef, (docSnap) => {
                if (docSnap.exists()) {
                    const newState = docSnap.data();
                    if (newState.isPlaying && newState.roundId !== currentRoundId) {
                        currentRoundId = newState.roundId;
                        localCurrentGabri = newState.currentGabri;
                        localGabriSince = Date.now();
                        localTagCounter = newState.tagCounter;
                        
                        myLocalPlayer.x = 1150 + Math.random()*100;
                        myLocalPlayer.y = 800 + Math.random()*100;
                    } else if (newState.isPlaying && newState.tagCounter !== localTagCounter) {
                        localTagCounter = newState.tagCounter;
                        localCurrentGabri = newState.currentGabri;
                        localGabriSince = Date.now();
                    }
                    
                    // Inventar-Check (Wurde mir etwas weggenommen?)
                    if (myHeldItem === 'ball' && newState.ball_owner !== user.uid) myHeldItem = null;
                    if (myHeldItem && myHeldItem.startsWith('sword') && newState[myHeldItem+'_owner'] !== user.uid) myHeldItem = null;

                    gameState = newState;
                    handleStateChange();
                } else {
                    gameState.isPlaying = false;
                    handleStateChange();
                }
            });
        }

        document.getElementById('btnStartGame').addEventListener('click', async () => {
            if (!user || !currentRoomId) return;
            try {
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
                const activeIds = Object.keys(serverPlayers);
                if(activeIds.length === 0) activeIds.push(user.uid);
                const randomGabri = activeIds[Math.floor(Math.random() * activeIds.length)];

                await setDoc(roomRef, {
                    isPlaying: true,
                    roundId: Math.random().toString(36).substring(2, 9),
                    currentGabri: randomGabri,
                    tagCounter: 0,
                    hostId: user.uid,
                    timeLeft: GAME_DURATION_SEC,
                    // Items und Boss init
                    ball_x: 1850, ball_y: 1500, ball_owner: null, ball_ts: 0, ball_startX: 1850, ball_startY: 1500,
                    boss_active: false, boss_hp: 100, boss_x: 1250, boss_y: 3000, boss_tx: 1250, boss_ty: 3000,
                    sword1_owner: null, sword2_owner: null, sword3_owner: null, sword4_owner: null
                });

                for(let id of activeIds) {
                    const pRef = doc(db, 'artifacts', appId, 'public', 'data', 'players', id);
                    updateDoc(pRef, { timeAsGabri: 0, lastSeen: Date.now() });
                }
            } catch (error) {
                alert("Konnte das Spiel nicht starten: " + error.message);
            }
        });

        document.getElementById('btnRestart').addEventListener('click', () => {
            if (!currentRoomId) return;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            updateDoc(roomRef, { isPlaying: false });
        });

        function handleStateChange() {
            if (gameState.isPlaying && gameState.timeLeft > 0) {
                screensLayer.style.display = 'none';
                uiLayer.style.display = 'flex';
                document.body.classList.add('game-running'); 
                
                if (localCurrentGabri === user.uid) {
                    hudStatusBox.classList.add('is-gabri-alert');
                    document.getElementById('roleDisplay').innerText = "DU BIST GABRI! FANG SIE!";
                } else {
                    hudStatusBox.classList.remove('is-gabri-alert');
                    const gName = serverPlayers[localCurrentGabri]?.name || "Jemand";
                    document.getElementById('roleDisplay').innerHTML = `<span style="color:var(--primary)">LAUF! ${gName} ist Gabri!</span>`;
                }
            } else if (gameState.isPlaying && gameState.timeLeft <= 0) {
                if (screensLayer.style.display === 'none') showLeaderboard();
                document.body.classList.remove('game-running');
            } else {
                switchScreen('screen-lobby');
                uiLayer.style.display = 'none';
                document.body.classList.remove('game-running');
            }
        }

        function switchScreen(screenId) {
            screensLayer.style.display = 'flex';
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function updateLobbyUI() {
            const list = document.getElementById('lobbyPlayerList');
            if(!list) return;
            list.innerHTML = '';
            for(let id in serverPlayers) {
                const p = serverPlayers[id];
                const isMe = id === user?.uid;
                list.innerHTML += `<div class="player-item"><div class="flex items-center gap-3"><div class="status-dot"></div><span class="font-semibold ${isMe ? 'text-primary' : 'text-white'}">${p.name} ${isMe ? '(Du)' : ''}</span></div></div>`;
            }
        }

        function getTotalGabriTime(playerId) {
            const p = serverPlayers[playerId];
            if (!p) return 0;
            let total = p.timeAsGabri || 0;
            if (gameState.isPlaying && gameState.timeLeft > 0 && localCurrentGabri === playerId) {
                total += (Date.now() - localGabriSince);
            }
            return total;
        }

        function showLeaderboard() {
            switchScreen('screen-leaderboard');
            uiLayer.style.display = 'none';
            let results = [];
            for (let id in serverPlayers) results.push({ name: serverPlayers[id].name, time: getTotalGabriTime(id), id: id });
            results.sort((a, b) => b.time - a.time);

            const list = document.getElementById('leaderboardList');
            list.innerHTML = '';
            results.forEach((r, index) => {
                let rowClass = "rank-row";
                let medal = "";
                if (index === 0) { rowClass += " rank-loser"; medal = "💀 VERLIERER"; } 
                else if (index === results.length - 1 && results.length > 1) { rowClass += " rank-winner"; medal = "👑 GEWINNER"; }
                const timeSec = (r.time / 1000).toFixed(1);
                list.innerHTML += `<div class="${rowClass}"><span>${index + 1}. ${r.name} <span class="text-xs ml-2 opacity-80">${medal}</span></span><span>${timeSec}s</span></div>`;
            });
        }

        // --- 8. INPUT HANDLING (FESTE JOYSTICKS) ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let joyBase = { x: 120, y: window.innerHeight - 120, r: 60 };
        let actBase = { x: window.innerWidth - 120, y: window.innerHeight - 120, r: 50 };
        
        let joystick = { active: false, id: null, nx: joyBase.x, ny: joyBase.y, dx: 0, dy: 0 };
        let keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false, ' ': false };

        window.addEventListener('resize', () => { 
            canvas.width = window.innerWidth; canvas.height = window.innerHeight; 
            joyBase.y = window.innerHeight - 120;
            actBase.x = window.innerWidth - 120; actBase.y = window.innerHeight - 120;
        });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        document.body.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key) || keys.hasOwnProperty(e.key.toLowerCase())) {
                let key = e.key.toLowerCase();
                keys[key] = true;
                if (key === ' ' || key === 'spacebar') doAction(); // Action via Leertaste
            }
        });
        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key) || keys.hasOwnProperty(e.key.toLowerCase())) {
                keys[e.key.toLowerCase()] = false;
            }
        });

        // Touch Control (Fixiert auf linke/rechte Bildschirmhälfte)
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for(let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2 && !joystick.active) {
                    joystick.active = true; joystick.id = t.identifier;
                    joystick.nx = t.clientX; joystick.ny = t.clientY;
                    clampJoy();
                } else if (t.clientX > window.innerWidth / 2) {
                    if (Math.hypot(t.clientX - actBase.x, t.clientY - actBase.y) < actBase.r * 2) {
                        doAction(); // Action Button berührt
                    }
                }
            }
        }, {passive: false});

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for(let t of e.changedTouches) {
                if(t.identifier === joystick.id) {
                    joystick.nx = t.clientX; joystick.ny = t.clientY;
                    clampJoy();
                }
            }
        }, {passive: false});

        function endJoyTouch(e) {
            e.preventDefault();
            for(let t of e.changedTouches) {
                if(t.identifier === joystick.id) { 
                    joystick.active = false; joystick.id = null; 
                    joystick.nx = joyBase.x; joystick.ny = joyBase.y;
                    joystick.dx = 0; joystick.dy = 0; 
                }
            }
        }
        canvas.addEventListener('touchend', endJoyTouch, {passive: false});
        canvas.addEventListener('touchcancel', endJoyTouch, {passive: false});

        function clampJoy() {
            const dist = Math.hypot(joystick.nx - joyBase.x, joystick.ny - joyBase.y);
            if (dist > joyBase.r) {
                const angle = Math.atan2(joystick.ny - joyBase.y, joystick.nx - joyBase.x);
                joystick.nx = joyBase.x + Math.cos(angle) * joyBase.r;
                joystick.ny = joyBase.y + Math.sin(angle) * joyBase.r;
            }
            if (dist > 10) { joystick.dx = (joystick.nx - joyBase.x) / joyBase.r; joystick.dy = (joystick.ny - joyBase.y) / joyBase.r; } 
            else { joystick.dx = 0; joystick.dy = 0; }
        }

        function getMovementVector() {
            let kx = 0; let ky = 0;
            if (keys.w || keys.arrowup) ky -= 1;
            if (keys.s || keys.arrowdown) ky += 1;
            if (keys.a || keys.arrowleft) kx -= 1;
            if (keys.d || keys.arrowright) kx += 1;

            if (kx !== 0 && ky !== 0) { const len = Math.hypot(kx, ky); kx /= len; ky /= len; }
            return { dx: joystick.active ? joystick.dx : kx, dy: joystick.active ? joystick.dy : ky };
        }

        // --- 9. GAME ENGINE / ACTIONS ---

        // Konfetti Animation für Basketball (8-Bit Quadrate)
        function spawnConfetti(cx, cy) {
            const colors = ['#ff3366', '#00ffcc', '#ffcc00', '#3366ff'];
            for(let i=0; i<40; i++) {
                particles.push({
                    x: cx, y: cy,
                    vx: (Math.random() - 0.5) * 600, vy: (Math.random() - 1.0) * 600, // Eher nach oben
                    life: 1.5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    isConfetti: true
                });
            }
        }

        function doAction() {
            if (!gameState.isPlaying || !currentRoomId) return;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            const cx = myLocalPlayer.x + PLAYER_SIZE/2;
            const cy = myLocalPlayer.y + PLAYER_SIZE/2;

            if (myHeldItem === 'ball') {
                // Werfen!
                const tgtX = cx + myFacing.x * 400;
                const tgtY = cy + myFacing.y * 400;
                myHeldItem = null;
                updateDoc(roomRef, {
                    'ball_owner': null, 'ball_x': tgtX, 'ball_y': tgtY,
                    'ball_startX': cx, 'ball_startY': cy, 'ball_ts': Date.now()
                });
            } else if (myHeldItem && myHeldItem.startsWith('sword')) {
                // Boss attackieren
                createParticles(cx + myFacing.x*30, cy + myFacing.y*30, '#ffffff'); // Swing visual
                if (gameState.boss_active && gameState.boss_hp > 0) {
                    const distToBoss = Math.hypot(cx - (gameState.boss_x + 40), cy - (gameState.boss_y + 40));
                    if (distToBoss < 120) {
                        updateDoc(roomRef, { 'boss_hp': increment(-15) });
                        createParticles(gameState.boss_x + 40, gameState.boss_y + 40, '#ffcc00'); // Treffer Visual
                    }
                }
            } else {
                // Item Aufheben (Ball oder Schwert)
                // 1. Ball Check
                if (!gameState.ball_owner && Math.hypot(cx - gameState.ball_x, cy - gameState.ball_y) < 80) {
                    myHeldItem = 'ball';
                    updateDoc(roomRef, { 'ball_owner': user.uid });
                    return;
                }
                // 2. Schwerter Check
                for (let i = 1; i <= 4; i++) {
                    const sKey = 'sword' + i;
                    const sBase = swordBases[sKey];
                    if (!gameState[sKey+'_owner'] && Math.hypot(cx - sBase.x, cy - sBase.y) < 80) {
                        myHeldItem = sKey;
                        let update = {}; update[sKey+'_owner'] = user.uid;
                        updateDoc(roomRef, update);
                        return;
                    }
                }
            }
        }

        function checkWall(nx, ny) {
            if (nx < 0 || ny < 0 || nx + PLAYER_SIZE > MAP_WIDTH || ny + PLAYER_SIZE > MAP_HEIGHT) return true;
            for (let obs of obstacles) {
                if (nx < obs.x + obs.w && nx + PLAYER_SIZE > obs.x && ny < obs.y + obs.h && ny + PLAYER_SIZE > obs.y) return true;
            }
            return false;
        }

        function checkStairs(px, py, now) {
            if (now - lastStairTime < 1000) return; 
            for (let s of stairs) {
                if (px < s.x + s.w && px + PLAYER_SIZE > s.x && py < s.y + s.h && py + PLAYER_SIZE > s.y) {
                    myLocalPlayer.y = s.targetY;
                    lastStairTime = now;
                    createParticles(myLocalPlayer.x, myLocalPlayer.y, '#00ffcc');
                    break;
                }
            }
        }

        function createParticles(x, y, color) {
            for(let i=0; i<10; i++) particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 300, vy: (Math.random() - 0.5) * 300, life: 1.0, color: color });
        }

        async function checkTags() {
            if (!user || !gameState.isPlaying || localCurrentGabri !== user.uid) return;
            const now = Date.now();
            if (now < localGabriSince + TAG_COOLDOWN_MS) return;

            for (let id in serverPlayers) {
                if (id === user.uid) continue;
                const p = gameEntities[id] || serverPlayers[id];
                const cx1 = myLocalPlayer.x + PLAYER_SIZE/2; const cy1 = myLocalPlayer.y + PLAYER_SIZE/2;
                const cx2 = p.x + PLAYER_SIZE/2; const cy2 = p.y + PLAYER_SIZE/2;
                
                if (Math.hypot(cx2 - cx1, cy2 - cy1) < PLAYER_SIZE * 0.9) { 
                    createParticles(p.x, p.y, '#ff3366'); 
                    const timeGained = now - localGabriSince;
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
                    const myRef = doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid);
                    
                    try {
                        Promise.all([
                            updateDoc(myRef, { timeAsGabri: increment(timeGained) }),
                            updateDoc(roomRef, { currentGabri: id, tagCounter: increment(1) })
                        ]);
                    } catch(e) {}
                    break;
                }
            }
        }

        function gameLoop(timestamp) {
            const dt = Math.min((timestamp - lastUpdateTime) / 1000, 0.1); 
            lastUpdateTime = timestamp;
            const now = Date.now();

            if (user) {
                // Host Tasks (Timer & Boss KI)
                if (gameState.isPlaying && gameState.hostId === user.uid && gameState.timeLeft > 0) {
                    if (now - lastHostTick > 1000) {
                        lastHostTick = now;
                        let updates = { timeLeft: gameState.timeLeft - 1 };
                        
                        // Boss Spawnt bei 60s
                        if (updates.timeLeft <= 60 && !gameState.boss_active && gameState.boss_hp > 0) {
                            updates.boss_active = true;
                        }
                        
                        // Boss KI (Verfolgt nächsten Spieler im OG)
                        if (gameState.boss_active && gameState.boss_hp > 0) {
                            let nearestId = null; let minDist = 9999;
                            for (let id in serverPlayers) {
                                if (serverPlayers[id].y > 2000) {
                                    let d = Math.hypot(serverPlayers[id].x - gameState.boss_x, serverPlayers[id].y - gameState.boss_y);
                                    if (d < minDist) { minDist = d; nearestId = id; }
                                }
                            }
                            if (nearestId) {
                                const target = serverPlayers[nearestId];
                                const angle = Math.atan2(target.y - gameState.boss_y, target.x - gameState.boss_x);
                                updates.boss_tx = gameState.boss_x + Math.cos(angle) * 150; // Bewege dich 150px auf Ziel zu
                                updates.boss_ty = gameState.boss_y + Math.sin(angle) * 150;
                                updates.boss_x = gameState.boss_tx; // Aktuelle Position fürs nächste Mal setzen
                            }
                        }

                        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
                        updateDoc(roomRef, updates).catch(()=>{});
                    }
                }

                if (gameState.isPlaying && gameState.timeLeft > 0 && screensLayer.style.display === 'none') {
                    
                    const move = getMovementVector();
                    let mx = move.dx * BASE_SPEED * dt;
                    let my = move.dy * BASE_SPEED * dt;

                    // Facing merken für Werfen
                    if (Math.abs(move.dx) > 0.1 || Math.abs(move.dy) > 0.1) {
                        const len = Math.hypot(move.dx, move.dy);
                        myFacing = { x: move.dx/len, y: move.dy/len };
                    }

                    if (!checkWall(myLocalPlayer.x + mx, myLocalPlayer.y)) myLocalPlayer.x += mx;
                    if (!checkWall(myLocalPlayer.x, myLocalPlayer.y + my)) myLocalPlayer.y += my;

                    checkStairs(myLocalPlayer.x, myLocalPlayer.y, now);

                    // Boss Kollision (Knockback lokal)
                    if (gameState.boss_active && gameState.boss_hp > 0 && myLocalPlayer.y > 2000) {
                        if (Math.hypot(myLocalPlayer.x - gameState.boss_x, myLocalPlayer.y - gameState.boss_y) < 80) {
                            myLocalPlayer.x -= myFacing.x * 100; // Zurückstoßen
                            myLocalPlayer.y -= myFacing.y * 100;
                            createParticles(myLocalPlayer.x, myLocalPlayer.y, '#ff0000');
                        }
                    }

                    // Kamera Interpolation
                    const targetCamX = myLocalPlayer.x + PLAYER_SIZE/2 - canvas.width/2;
                    const targetCamY = myLocalPlayer.y + PLAYER_SIZE/2 - canvas.height/2;
                    camera.x += (targetCamX - camera.x) * 10 * dt;
                    if (Math.abs(targetCamY - camera.y) > 1000) camera.y = targetCamY; 
                    else camera.y += (targetCamY - camera.y) * 10 * dt;
                    
                    camera.x = Math.max(0, Math.min(camera.x, MAP_WIDTH - canvas.width));
                    camera.y = Math.max(0, Math.min(camera.y, MAP_HEIGHT - canvas.height));

                    for(let id in serverPlayers) {
                        if (id !== user.uid && gameEntities[id]) {
                            if (Math.abs(serverPlayers[id].y - gameEntities[id].y) > 1000) gameEntities[id].y = serverPlayers[id].y;
                            else gameEntities[id].y += (serverPlayers[id].y - gameEntities[id].y) * 15 * dt;
                            gameEntities[id].x += (serverPlayers[id].x - gameEntities[id].x) * 15 * dt;
                        }
                    }

                    if (now - lastSyncTime > 100) { 
                        lastSyncTime = now;
                        const myRef = doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid);
                        updateDoc(myRef, { x: Math.round(myLocalPlayer.x), y: Math.round(myLocalPlayer.y), lastSeen: now, roomId: currentRoomId }).catch(()=>{});
                    }

                    checkTags();

                    const min = Math.floor(gameState.timeLeft / 60);
                    const sec = gameState.timeLeft % 60;
                    document.getElementById('timerDisplay').innerText = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
                    document.getElementById('myTimeDisplay').innerText = `Zeit als Gabri: ${(getTotalGabriTime(user.uid)/1000).toFixed(1)}s`;
                    floorDisplay.innerText = myLocalPlayer.y > 2000 ? "OBERGESCHOSS (OG)" : "ERDGESCHOSS (EG)";
                
                    render(dt, now);
                }
            }
            requestAnimationFrame(gameLoop);
        }

        function render(dt, nowTime) {
            const isInOG = camera.y > 1500;
            ctx.fillStyle = isInOG ? '#0b111a' : '#0d0d12'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Gitterboden
            ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 2;
            const gridSize = 100;
            const startX = Math.floor(camera.x / gridSize) * gridSize; const startY = Math.floor(camera.y / gridSize) * gridSize;
            ctx.beginPath();
            for(let x = startX; x < camera.x + canvas.width; x += gridSize) if(x >= 0 && x <= MAP_WIDTH) { ctx.moveTo(x, 0); ctx.lineTo(x, MAP_HEIGHT); }
            for(let y = startY; y < camera.y + canvas.height; y += gridSize) if(y >= 0 && y <= MAP_HEIGHT) { ctx.moveTo(0, y); ctx.lineTo(MAP_WIDTH, y); }
            ctx.stroke();

            // Treppen
            for(let s of stairs) {
                if ((isInOG && s.y < 2000) || (!isInOG && s.y > 2000)) continue;
                ctx.fillStyle = '#222'; ctx.fillRect(s.x, s.y, s.w, s.h);
                ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 4; ctx.strokeRect(s.x, s.y, s.w, s.h);
                ctx.beginPath();
                for(let i=0; i<10; i++) { ctx.moveTo(s.x, s.y + (i * s.h/10)); ctx.lineTo(s.x + s.w, s.y + (i * s.h/10)); }
                ctx.stroke();
                ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(s.x, s.y + s.h/2 - 15, s.w, 30);
                ctx.fillStyle = '#ffcc00'; ctx.font = '14px "Press Start 2P"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(s.label, s.x + s.w/2, s.y + s.h/2);
            }

            // Gebäude / Interieur
            for(let obs of obstacles) {
                if (obs.x + (obs.w||0) < camera.x - 200 || obs.x > camera.x + canvas.width + 200 || obs.y + (obs.h||0) < camera.y - 200 || obs.y > camera.y + canvas.height + 200) continue;

                if (obs.isWall) {
                    ctx.fillStyle = '#1a1a24'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                    ctx.strokeStyle = 'rgba(0, 255, 204, 0.4)'; ctx.lineWidth = 2; ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
                } else if (obs.isTable) {
                    ctx.fillStyle = '#5D4037'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                    ctx.strokeStyle = '#3E2723'; ctx.lineWidth = 3; ctx.strokeRect(obs.x+1, obs.y+1, obs.w-2, obs.h-2);
                } else if (obs.isChair) {
                    ctx.fillStyle = '#4E342E'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                    ctx.fillStyle = '#3E2723';
                    if (obs.dir === 'up') ctx.fillRect(obs.x, obs.y, obs.w, 5); else ctx.fillRect(obs.x, obs.y + obs.h - 5, obs.w, 5);
                }
            }

            // Basketballkorb (Turnhalle)
            if (!isInOG) {
                ctx.fillStyle = '#ffffff'; ctx.fillRect(hoop.x, hoop.y - 10, hoop.w, 10); // Backboard
                ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 4; ctx.beginPath();
                ctx.arc(hoop.x + hoop.w/2, hoop.y + 10, 20, 0, Math.PI*2); ctx.stroke(); // Ring
            }

            for(let l of labels) {
                if (l.x < camera.x - 200 || l.x > camera.x + canvas.width + 200 || l.y < camera.y - 200 || l.y > camera.y + canvas.height + 200) continue;
                ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.font = 'bold 36px "Outfit"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(l.text, l.x, l.y);
            }

            // Schwerter am Boden (OG)
            if (isInOG) {
                for(let i=1; i<=4; i++) {
                    let sKey = 'sword'+i;
                    if (!gameState[sKey+'_owner']) {
                        let sx = swordBases[sKey].x; let sy = swordBases[sKey].y;
                        ctx.fillStyle = '#aaaaaa'; ctx.fillRect(sx, sy, 4, 20); // Klinge
                        ctx.fillStyle = '#ffcc00'; ctx.fillRect(sx-4, sy+15, 12, 4); // Parierstange
                    }
                }
            }

            // Boss Rendern (OG)
            if (isInOG && gameState.boss_active && gameState.boss_hp > 0) {
                let bx = gameState.boss_x; let by = gameState.boss_y;
                // Interpolation für geschmeidiges Bewegen des Bosses
                if (gameEntities['boss']) {
                    gameEntities['boss'].x += (gameState.boss_tx - gameEntities['boss'].x) * 5 * dt;
                    gameEntities['boss'].y += (gameState.boss_ty - gameEntities['boss'].y) * 5 * dt;
                    bx = gameEntities['boss'].x; by = gameEntities['boss'].y;
                } else { gameEntities['boss'] = {x: bx, y: by}; }

                ctx.imageSmoothingEnabled = false;
                let bFrame = Math.floor(nowTime / 250) % 2;
                ctx.drawImage(texBoss[bFrame], bx, by, 80, 80); // Boss ist doppelt so groß!
                
                // Boss HP Bar & Name
                ctx.fillStyle = '#ff0000'; ctx.fillRect(bx, by - 20, 80, 8);
                ctx.fillStyle = '#00ffcc'; ctx.fillRect(bx, by - 20, 80 * (gameState.boss_hp/100), 8);
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 12px "Outfit"'; ctx.textAlign = 'center';
                ctx.fillText("ISHIN", bx + 40, by - 30);
            }

            // Ball Rendern
            let drawBallX = gameState.ball_x; let drawBallY = gameState.ball_y; let drawBallZ = 0;
            if (gameState.ball_owner) {
                // Ball ist beim Besitzer
                const owner = serverPlayers[gameState.ball_owner] || (gameState.ball_owner === user.uid ? myLocalPlayer : null);
                if (owner) { drawBallX = owner.x + 20; drawBallY = owner.y + 20; }
            } else if (nowTime - gameState.ball_ts < 800) {
                // Ball fliegt! (800ms Flugzeit)
                const p = (nowTime - gameState.ball_ts) / 800;
                drawBallX = gameState.ball_startX + (gameState.ball_x - gameState.ball_startX) * p;
                drawBallY = gameState.ball_startY + (gameState.ball_y - gameState.ball_startY) * p;
                drawBallZ = Math.sin(p * Math.PI) * 150; // Parabel-Höhe
                
                // Konfetti Check am Ende des Flugs
                if (p > 0.9 && gameState.ball_ts !== lastConfettiTs) {
                    if (Math.hypot(drawBallX - (hoop.x + hoop.w/2), drawBallY - (hoop.y + 10)) < 50) {
                        spawnConfetti(hoop.x + hoop.w/2, hoop.y + 10);
                    }
                    lastConfettiTs = gameState.ball_ts;
                }
            }
            // Ball zeichnen, wenn er auf unserer Etage ist
            if ((isInOG && drawBallY > 2000) || (!isInOG && drawBallY < 2000)) {
                ctx.fillStyle = '#ff6600';
                ctx.beginPath(); ctx.arc(drawBallX, drawBallY - drawBallZ, 12, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
            }

            // Partikel (Konfetti, Hits)
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
                if(p.isConfetti) p.vy += 400 * dt; // Gravitation für Konfetti
                if(p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life; 
                ctx.fillRect(p.x, p.y, 8, 8); ctx.globalAlpha = 1.0;
            }

            // Spieler rendern
            for(let id in serverPlayers) {
                const sp = serverPlayers[id];
                const isMe = (id === user?.uid);
                const isGabri = (id === localCurrentGabri);
                
                let px = isMe ? myLocalPlayer.x : (gameEntities[id]?.x || sp.x);
                let py = isMe ? myLocalPlayer.y : (gameEntities[id]?.y || sp.y);

                if (!isMe && ((isInOG && py < 2000) || (!isInOG && py > 2000))) continue;

                if (isGabri) { ctx.shadowColor = '#ff3366'; ctx.shadowBlur = 20 + Math.abs(Math.sin(nowTime * 0.005)) * 10; } 
                else { ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 10; }

                ctx.imageSmoothingEnabled = false;
                
                // Einfache Lauf-Animation: Wackelt, wenn sich Koordinaten ändern
                let isMoving = isMe ? (Math.abs(getMovementVector().dx) > 0 || Math.abs(getMovementVector().dy) > 0) : (Math.hypot(sp.x - px, sp.y - py) > 5);
                let frame = isMoving ? Math.floor(nowTime / 150) % 2 : 0;
                
                ctx.drawImage(isGabri ? texGabri[frame] : texNormal[frame], px, py, PLAYER_SIZE, PLAYER_SIZE);
                ctx.shadowBlur = 0; 

                // Hält dieser Spieler ein Schwert?
                let playerHeldItem = null;
                if (isMe) playerHeldItem = myHeldItem;
                else {
                    for(let i=1; i<=4; i++) if (gameState['sword'+i+'_owner'] === id) playerHeldItem = 'sword';
                }
                if (playerHeldItem && playerHeldItem.startsWith('sword')) {
                    ctx.fillStyle = '#aaaaaa'; ctx.fillRect(px + 30, py + 10, 4, 25);
                }

                if (isGabri && nowTime < localGabriSince + TAG_COOLDOWN_MS) {
                    const progress = (nowTime - localGabriSince) / TAG_COOLDOWN_MS;
                    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 3; ctx.beginPath();
                    ctx.arc(px + PLAYER_SIZE/2, py + PLAYER_SIZE/2, PLAYER_SIZE*0.8, -Math.PI/2, (-Math.PI/2) + (Math.PI*2*progress)); ctx.stroke();
                }

                ctx.fillStyle = isGabri ? '#ff99aa' : (isMe ? '#00ffcc' : 'white');
                ctx.font = '600 14px "Outfit"'; ctx.textAlign = 'center';
                const textWidth = ctx.measureText(sp.name).width;
                ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(px + PLAYER_SIZE/2 - textWidth/2 - 4, py - 24, textWidth + 8, 18);
                ctx.fillStyle = isGabri ? '#ff99aa' : (isMe ? '#00ffcc' : 'white');
                ctx.fillText(sp.name, px + PLAYER_SIZE/2, py - 10);
            }

            ctx.restore(); 

            // FESTE JOYSTICKS AUF DEM BILDSCHIRM
            ctx.save();
            // Bewegungs-Joystick (Links)
            ctx.beginPath(); ctx.arc(joyBase.x, joyBase.y, joyBase.r, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(joystick.nx, joystick.ny, 25, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(0, 255, 204, 0.4)'; ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 15; ctx.fill();
            
            // Aktions-Button (Rechts)
            ctx.beginPath(); ctx.arc(actBase.x, actBase.y, actBase.r, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,51,102,0.2)'; ctx.strokeStyle = 'rgba(255,51,102,0.4)'; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = 'bold 12px "Outfit"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText("AKTION", actBase.x, actBase.y);
            ctx.restore();
        }
    </script>
</body>
</html>
